<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location — San Diego Specialty Coffee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,400;0,600;0,800;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --espresso: #3D2817;
            --coffee-brown: #6B4E3D;
            --cream: #F8F5F0;
            --white: #FFFFFF;
            --latte: #C4A77D;
            --accent-red: #B85C38;
            --warm-brown: #5C4033;
            --light-tan: #E8DED2;
            --green: #2D6A4F;
            --green-light: #EAF4EE;
            --roaster-color: #0F9D58;
            --cafe-color: #0288D1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Libre Franklin', sans-serif;
            color: var(--espresso);
            background: var(--cream);
            line-height: 1.6;
        }

        /* ── Nav ────────────────────────────────────────────────────────── */
        nav {
            background: var(--espresso);
            border-bottom: 3px solid var(--accent-red);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Crimson Pro', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--white);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            gap: 0.25rem;
        }

        .nav-links a {
            color: var(--latte);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.4rem 0.85rem;
            border-radius: 3px;
            transition: all 0.2s;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.1);
            color: var(--white);
        }

        .nav-links a.submit {
            background: var(--accent-red);
            color: white;
        }

        .nav-links a.submit:hover { background: #a04e30; }

        /* ── Loading / Error states ─────────────────────────────────────── */
        .state-container {
            max-width: 700px;
            margin: 6rem auto;
            text-align: center;
            padding: 0 2rem;
        }

        .state-container h2 {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--espresso);
        }

        .state-container p { color: var(--coffee-brown); margin-bottom: 2rem; }

        .btn-back {
            display: inline-block;
            background: var(--coffee-brown);
            color: white;
            padding: 0.75rem 1.75rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 3px;
        }

        /* ── Hero ───────────────────────────────────────────────────────── */
        .hero {
            background: linear-gradient(135deg, var(--espresso) 0%, var(--warm-brown) 100%);
            padding: 3rem 2rem 0;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 40px,
                rgba(255,255,255,0.015) 40px,
                rgba(255,255,255,0.015) 41px
            );
        }

        .hero-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--latte);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: white; }

        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.85rem;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.85rem;
        }

        .type-badge.roaster {
            background: rgba(15, 157, 88, 0.2);
            color: #6FCF97;
            border: 1px solid rgba(15, 157, 88, 0.3);
        }

        .type-badge.cafe {
            background: rgba(2, 136, 209, 0.2);
            color: #7EC8E3;
            border: 1px solid rgba(2, 136, 209, 0.3);
        }

        .hero h1 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 600;
            color: var(--white);
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            padding-bottom: 2rem;
        }

        .rating-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            width: 16px;
            height: 16px;
            fill: #FFA000;
        }

        .star.half { fill: url(#halfGrad); }
        .star.empty { fill: rgba(255,255,255,0.2); }

        .rating-num {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
        }

        .rating-count {
            font-size: 0.85rem;
            color: var(--latte);
        }

        .rating-link {
            font-size: 0.78rem;
            color: var(--latte);
            text-decoration: underline;
            transition: color 0.2s;
        }

        .rating-link:hover { color: white; }

        .hero-address {
            color: var(--latte);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* ── Photo Gallery ──────────────────────────────────────────────── */
        .gallery-section {
            background: var(--espresso);
            border-bottom: 3px solid var(--accent-red);
        }

        .gallery-track {
            display: flex;
            gap: 3px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            max-width: 100%;
        }

        .gallery-track::-webkit-scrollbar { display: none; }

        .gallery-photo {
            flex-shrink: 0;
            height: 320px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .gallery-photo:first-child { flex: 2; min-width: 400px; }
        .gallery-photo:not(:first-child) { flex: 1; min-width: 220px; }

        .gallery-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }

        .gallery-photo:hover img { transform: scale(1.04); }

        .gallery-placeholder {
            background: linear-gradient(135deg, var(--warm-brown) 0%, var(--espresso) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            height: 320px;
            color: var(--latte);
        }

        .gallery-placeholder .placeholder-icon {
            font-size: 4rem;
            opacity: 0.4;
        }

        .gallery-placeholder p {
            font-size: 0.85rem;
            opacity: 0.5;
            font-style: italic;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.open { display: flex; }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .lightbox-close:hover { opacity: 1; }

        /* ── Main Content ───────────────────────────────────────────────── */
        .content-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 3rem;
            align-items: start;
        }

        /* ── Left Column ────────────────────────────────────────────────── */

        /* Hours */
        .section {
            margin-bottom: 2.5rem;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent-red);
            margin-bottom: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--light-tan);
        }

        .hours-grid {
            display: grid;
            gap: 0;
        }

        .hours-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.85rem;
            border-bottom: 1px solid var(--light-tan);
            font-size: 0.88rem;
            transition: background 0.15s;
        }

        .hours-row:first-child { border-top: 1px solid var(--light-tan); }

        .hours-row.today {
            background: var(--cream);
            border-left: 3px solid var(--accent-red);
            font-weight: 600;
        }

        .hours-row .day { color: var(--coffee-brown); }
        .hours-row.today .day { color: var(--espresso); }

        .hours-row .time { color: var(--espresso); font-variant-numeric: tabular-nums; }

        .today-tag {
            background: var(--accent-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.15rem 0.4rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 2px;
            margin-left: 0.5rem;
        }

        .open-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .open-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .open-status.open .dot { background: #0F9D58; }
        .open-status.open { color: #0F9D58; }
        .open-status.closed .dot { background: #E53935; }
        .open-status.closed { color: #E53935; }

        /* Contact */
        .contact-grid {
            display: grid;
            gap: 0.75rem;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--white);
            border: 1px solid var(--light-tan);
            border-left: 3px solid transparent;
            transition: border-left-color 0.2s;
        }

        .contact-item:hover { border-left-color: var(--accent-red); }

        .contact-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

        .contact-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--coffee-brown);
            margin-bottom: 0.15rem;
        }

        .contact-value {
            font-size: 0.9rem;
            color: var(--espresso);
            word-break: break-all;
        }

        .contact-value a {
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-value a:hover { text-decoration: underline; }

        /* Description */
        .description-text {
            font-family: 'Lora', serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--coffee-brown);
            font-style: italic;
            padding: 1.25rem 1.5rem;
            background: var(--white);
            border-left: 3px solid var(--accent-red);
        }

        /* ── Right Column — Coffee Details Card ─────────────────────────── */
        .details-card {
            background: var(--white);
            border: 1px solid var(--light-tan);
            border-top: 3px solid var(--accent-red);
            position: sticky;
            top: 72px;
        }

        .suggest-edit-btn {
            display: block;
            margin-top: 0.75rem;
            padding: 0.7rem 1rem;
            background: transparent;
            border: 2px solid var(--light-tan);
            color: var(--coffee-brown);
            text-align: center;
            text-decoration: none;
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: all 0.2s;
        }
        .suggest-edit-btn:hover {
            border-color: var(--coffee-brown);
            background: var(--cream);
        }

        .details-card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--light-tan);
            background: var(--cream);
        }

        .details-card-header h2 {
            font-family: 'Lora', serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--espresso);
        }

        .details-card-header p {
            font-size: 0.78rem;
            color: #999;
            margin-top: 0.2rem;
        }

        .detail-rows { padding: 0.5rem 0; }

        .detail-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--light-tan);
        }

        .detail-row:last-child { border-bottom: none; }

        .detail-key {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--coffee-brown);
            flex-shrink: 0;
            padding-top: 1px;
        }

        .detail-val {
            font-size: 0.88rem;
            color: var(--espresso);
            text-align: right;
            line-height: 1.4;
        }

        .detail-val.unknown { color: #bbb; font-style: italic; }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            justify-content: flex-end;
        }

        .tag {
            background: var(--cream);
            border: 1px solid var(--light-tan);
            color: var(--coffee-brown);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.55rem;
            border-radius: 2px;
        }

        .bool-yes {
            color: var(--green);
            font-weight: 700;
        }

        .bool-no { color: #bbb; }

        /* ── Map Embed ──────────────────────────────────────────────────── */
        .map-section {
            background: var(--white);
            border-top: 2px solid var(--light-tan);
        }

        .map-section-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .map-section h2 {
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: var(--espresso);
        }

        .map-embed {
            width: 100%;
            height: 340px;
            border: none;
            border-top: 3px solid var(--accent-red);
        }

        /* ── Action Buttons ─────────────────────────────────────────────── */
        .action-strip {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem 3rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 1.75rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 3px;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }

        .action-btn.primary {
            background: var(--accent-red);
            color: white;
        }

        .action-btn.primary:hover { background: #a04e30; transform: translateY(-1px); }

        .action-btn.secondary {
            background: var(--white);
            color: var(--coffee-brown);
            border: 2px solid var(--coffee-brown);
        }

        .action-btn.secondary:hover { background: var(--cream); }

        /* ── Footer ─────────────────────────────────────────────────────── */
        footer {
            background: var(--espresso);
            color: var(--latte);
            text-align: center;
            padding: 2rem;
            font-size: 0.85rem;
            border-top: 3px solid var(--accent-red);
        }

        footer a { color: var(--latte); }
        footer a:hover { color: white; }

        /* ── Responsive ─────────────────────────────────────────────────── */
        @media (max-width: 900px) {
            .content-wrap {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .details-card { position: static; }
            .gallery-photo:first-child { min-width: 280px; }
            .gallery-photo:not(:first-child) { min-width: 180px; }
            .gallery-photo { height: 220px; }
        }

        @media (max-width: 600px) {
            .hero { padding: 2rem 1.25rem 0; }
            .content-wrap { padding: 2rem 1.25rem; }
            .action-strip { padding: 0 1.25rem 2rem; flex-direction: column; }
            .action-btn { justify-content: center; }
            nav { padding: 0 1.25rem; }
            .nav-logo { font-size: 1rem; }
            .nav-links a { padding: 0.35rem 0.6rem; font-size: 0.78rem; }
        }

        /* Animate in */
        .fade-up {
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up:nth-child(1) { animation-delay: 0.05s; }
        .fade-up:nth-child(2) { animation-delay: 0.1s; }
        .fade-up:nth-child(3) { animation-delay: 0.15s; }
        .fade-up:nth-child(4) { animation-delay: 0.2s; }
    </style>
</head>
<body>

    <!-- SVG defs for half-star gradient -->
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <linearGradient id="halfGrad">
                <stop offset="50%" stop-color="#FFA000"/>
                <stop offset="50%" stop-color="rgba(255,255,255,0.2)"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- Nav -->
    <nav>
        <a href="index.html" class="nav-logo">San Diego Specialty Coffee</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="map.html">Map</a>
            <a href="submit.html" class="submit">+ Submit</a>
        </div>
    </nav>

    <!-- Dynamic content injected here -->
    <div id="pageContent">
        <div class="state-container">
            <h2>Loading...</h2>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <!-- Footer -->
    <footer>
        <p>Community-driven guide for <a href="https://reddit.com/r/SanDiegoCoffeeBeans" target="_blank">r/SanDiegoCoffeeBeans</a></p>
        <p style="margin-top:0.5rem; opacity:0.5; font-size:0.78rem;">148 locations and counting</p>
    </footer>

    <script src="locations.js"></script>
    <script>
        const API_KEY = 'AIzaSyDFVEZE3Q0NBXY15rL6muwB8nNATPftOmI';
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbw_r5rgwohLWHtizzAEhad9NNGG0pbnEiF23fg1-jxs7VgYbb2DfTyQQ--S7in8wZgD/exec';
        const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

        // ── Get location from URL ──────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const locationId = params.get('id');

        if (!locationId) {
            showError('No location specified.', 'Head back to the map to find a location.');
        } else {
            const location = (window.COFFEE_LOCATIONS || []).find(l => l.id === locationId);
            if (!location) {
                showError('Location not found.', 'This location may have been removed or the link is incorrect.');
            } else {
                document.title = location.basicInfo.name + ' — San Diego Specialty Coffee';

                // Use coffeeDetails already merged into locations.js by sync-locations.js
                // Fall back to live sheet fetch if not present
                const merged = location.coffeeDetails;
                if (merged) {
                    renderPage(location, merged);
                } else {
                    const isRoasterType = location.basicInfo.type === 'roaster';
                    const sheetTab = isRoasterType ? 'Roasters' : 'Cafes';
                    fetch(SHEET_URL + '?sheet=' + sheetTab)
                        .then(r => r.json())
                        .then(rows => {
                            const row = rows.find(r => r.id === locationId) || {};
                            const custom = {
                                yearEstablished:   row.yearEstablished   || '',
                                multipleLocations: row.multipleLocations || '',
                                amenities: row.amenities ? row.amenities.split(',').map(s => s.trim()).filter(Boolean) : [],
                                notes: row.notes || '',
                            };
                            if (isRoasterType) {
                                custom.roastScale        = row.roastScale        || '';
                                custom.roastStyle        = row.roastStyle        || '';
                                custom.visitorExperience = row.visitorExperience || '';
                            } else {
                                custom.specialtyBarista = row.specialtyBarista || '';
                                custom.roastersServed = row.roastersServed ? row.roastersServed.split(',').map(s => s.trim()).filter(Boolean) : [];
                                custom.brewingOptions = row.brewingOptions ? row.brewingOptions.split(',').map(s => s.trim()).filter(Boolean) : [];
                            }
                            renderPage(location, custom);
                        })
                        .catch(() => renderPage(location, {}));
                }
            }
        }

        // ── Render ─────────────────────────────────────────────────────────
        function renderPage(loc, custom) {
            custom = custom || {};
            const info = loc.basicInfo;
            const isRoaster = info.type === 'roaster';
            const rating = loc.googleRating || {};
            const hours = loc.hours || {};
            const contact = info.contact || {};
            const placeId = loc.googleData?.placeId || '';
            const photos = loc.googlePhotos || [];
            const today = new Date().getDay(); // 0=Sun

            document.getElementById('pageContent').innerHTML = `
                ${renderHero(loc, isRoaster, rating, info, contact, today, hours)}
                ${renderGallery(photos, placeId, info.name)}
                <div class="content-wrap">
                    <div class="left-col fade-up">
                        ${renderDescription(custom, loc.legacyData)}
                        ${renderHours(hours, today)}
                        ${renderContact(contact, info)}
                    </div>
                    <div class="right-col fade-up">
                        ${renderDetailsCard(isRoaster, custom, loc)}
                    </div>
                </div>
                ${renderActions(contact, placeId)}
                ${renderMapEmbed(placeId)}
            `;
        }

        function renderHero(loc, isRoaster, rating, info, contact, today, hours) {
            const typeLabel = isRoaster ? '📍 Roaster' : '☕ Multi-Roaster Cafe';
            const typeClass = isRoaster ? 'roaster' : 'cafe';
            const starsHtml = renderStars(rating.rating || 0);
            const reviewUrl = contact.googleMapsUrl || '#';
            const city = (info.address.fullAddress || '').split(',').slice(1, 3).join(',').trim();

            return `
                <div class="hero">
                    <div class="hero-inner">
                        <a href="map.html" class="back-link">← Back to Map</a>
                        <div class="type-badge ${typeClass}">${typeLabel}</div>
                        <h1>${info.name}</h1>
                        <div class="hero-meta">
                            ${rating.rating ? `
                                <div class="rating-display">
                                    <div class="stars">${starsHtml}</div>
                                    <span class="rating-num">${rating.rating}</span>
                                    <span class="rating-count">(${(rating.reviewCount || 0).toLocaleString()} reviews)</span>
                                    <a href="${reviewUrl}" target="_blank" class="rating-link">See on Google →</a>
                                </div>
                            ` : ''}
                            ${city ? `<div class="hero-address">📍 ${city}</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStars(rating) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                const diff = rating - (i - 1);
                let cls = 'empty';
                if (diff >= 1) cls = 'full';
                else if (diff >= 0.4) cls = 'half';
                html += `<svg class="star ${cls}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
                </svg>`;
            }
            return html;
        }

        function renderGallery(photos, placeId, name) {
            if (!photos || !photos.length) {
                return `
                    <div class="gallery-section">
                        <div class="gallery-placeholder">
                            <div class="placeholder-icon">☕</div>
                            <p>No photos available yet for ${name}</p>
                        </div>
                    </div>
                `;
            }

            const shown = photos.slice(0, 5);
            const photoHtml = shown.map((photo, i) => {
                // Build Google Places photo URL from photo name
                const url = `https://places.googleapis.com/v1/${photo.name}/media?maxWidthPx=1200&key=${API_KEY}`;
                return `
                    <div class="gallery-photo" onclick="openLightbox('${url}')">
                        <img src="${url}" alt="Photo of location" loading="${i === 0 ? 'eager' : 'lazy'}"
                             onerror="this.parentElement.style.display='none'">
                    </div>
                `;
            }).join('');

            return `
                <div class="gallery-section">
                    <div class="gallery-track">${photoHtml}</div>
                </div>
            `;
        }

        function renderDescription(custom, legacyData) {
            const desc = custom.description || legacyData?.originalDescription || '';
            const isLegacy = !custom.description && !!legacyData?.originalDescription;
            if (!desc) return '';
            return `
                <div class="section fade-up">
                    <div class="section-label">About</div>
                    <div class="description-text">${desc}</div>
                    ${isLegacy ? '<div style="font-size:0.72rem;color:#bbb;margin-top:0.5rem;font-style:italic;">ℹ️ Description not yet updated — edit in admin panel to refresh.</div>' : ''}
                </div>
            `;
        }

        function renderHours(hours, today) {
            if (!hours.weekdayDescriptions || !hours.weekdayDescriptions.length) {
                return `
                    <div class="section">
                        <div class="section-label">Hours</div>
                        <div style="color:#bbb; font-style:italic; font-size:0.88rem;">Hours not available</div>
                    </div>
                `;
            }

            // weekdayDescriptions starts Monday (index 0 = Monday)
            // JS getDay() 0=Sun, 1=Mon ... 6=Sat
            // Map JS day to weekdayDescriptions index
            const dayMap = [6, 0, 1, 2, 3, 4, 5]; // Sun=6, Mon=0, etc.
            const todayIndex = dayMap[today];

            const rowsHtml = hours.weekdayDescriptions.map((desc, i) => {
                const parts = desc.split(': ');
                const dayName = parts[0];
                const time = parts.slice(1).join(': ') || 'Closed';
                const isToday = i === todayIndex;
                return `
                    <div class="hours-row ${isToday ? 'today' : ''}">
                        <span class="day">
                            ${dayName}
                            ${isToday ? '<span class="today-tag">Today</span>' : ''}
                        </span>
                        <span class="time">${time}</span>
                    </div>
                `;
            }).join('');

            return `
                <div class="section">
                    <div class="section-label">Hours</div>
                    <div class="hours-grid">${rowsHtml}</div>
                </div>
            `;
        }

        function renderContact(contact, info) {
            let html = '';

            if (info.address.fullAddress) {
                html += contactItem('📍', 'Address', info.address.fullAddress);
            }
            if (contact.phone) {
                html += contactItem('📞', 'Phone', `<a href="tel:${contact.phone}">${contact.phone}</a>`);
            }
            if (contact.website) {
                const display = contact.website.replace(/https?:\/\//, '').replace(/\/$/, '');
                html += contactItem('🌐', 'Website', `<a href="${contact.website}" target="_blank">${display}</a>`);
            }
            if (contact.googleMapsUrl) {
                html += contactItem('🗺️', 'Google Maps', `<a href="${contact.googleMapsUrl}" target="_blank">Open in Google Maps →</a>`);
            }

            if (!html) return '';
            return `
                <div class="section">
                    <div class="section-label">Contact & Location</div>
                    <div class="contact-grid">${html}</div>
                </div>
            `;
        }

        function contactItem(icon, label, value) {
            return `
                <div class="contact-item">
                    <span class="contact-icon">${icon}</span>
                    <div>
                        <div class="contact-label">${label}</div>
                        <div class="contact-value">${value}</div>
                    </div>
                </div>
            `;
        }

        function renderDetailsCard(isRoaster, custom, loc) {
            const u = (val) => val
                ? `<span class="detail-val">${val}</span>`
                : `<span class="detail-val unknown">Unknown <span style="font-size:0.72rem;opacity:0.7;">(Edit Below)</span></span>`;

            const bool = (val) => val === true
                ? `<span class="detail-val bool-yes">✓ Yes</span>`
                : val === false
                    ? `<span class="detail-val bool-no">No</span>`
                    : `<span class="detail-val unknown">Unknown</span>`;

            const tags = (arr) => arr && arr.length
                ? `<div class="tag-list">${arr.map(t => `<span class="tag">${t}</span>`).join('')}</div>`
                : `<span class="detail-val unknown">Unknown</span>`;

            let rows = '';

            if (isRoaster) {
                rows = `
                    ${detailRow('Roast Style', u(custom.roastStyle))}
                    ${detailRow('Roast Scale', u(custom.roastScale))}
                    ${detailRow('Visitor Experience', u(custom.visitorExperience))}
                    ${detailRow('Multiple Locations', u(custom.multipleLocations))}
                    ${detailRow('Year Established', u(custom.yearEstablished))}
                    ${custom.amenities && custom.amenities.length ? detailRow('Amenities', tags(custom.amenities)) : ''}
                    ${custom.notes ? detailRow('Notes', u(custom.notes)) : ''}
                `;
            } else {
                rows = `
                    ${detailRow('Specialty Barista Service', u(custom.specialtyBarista))}
                    ${detailRow('Multiple Locations', u(custom.multipleLocations))}
                    ${detailRow('Year Established', u(custom.yearEstablished))}
                    ${custom.roastersServed && custom.roastersServed.length ? detailRow('Roasters Served', tags(custom.roastersServed)) : ''}
                    ${custom.brewingOptions && custom.brewingOptions.length ? detailRow('Brewing Options', tags(custom.brewingOptions)) : ''}
                    ${custom.amenities && custom.amenities.length ? detailRow('Amenities', tags(custom.amenities)) : ''}
                    ${custom.notes ? detailRow('Notes', u(custom.notes)) : ''}
                `;
            }

            const cardTitle = isRoaster ? 'Roaster Details' : 'Cafe Details';
            return `
                <div class="details-card">
                    <div class="details-card-header">
                        <h2>${cardTitle}</h2>
                        <p>Community-sourced coffee details</p>
                    </div>
                    <div class="detail-rows">${rows}</div>
                </div>
                <a href="edit.html?id=${loc.id}&return=location.html?id=${loc.id}" class="suggest-edit-btn">
                    ✏️ Suggest an Edit
                </a>
            `;
        }

        function detailRow(key, valHtml) {
            return `
                <div class="detail-row">
                    <span class="detail-key">${key}</span>
                    ${valHtml}
                </div>
            `;
        }

        function renderActions(contact, placeId) {
            let html = '';
            if (contact.googleMapsUrl) {
                html += `<a href="${contact.googleMapsUrl}" target="_blank" class="action-btn primary">🗺️ Open in Google Maps</a>`;
            }
            if (contact.website) {
                html += `<a href="${contact.website}" target="_blank" class="action-btn secondary">🌐 Visit Website</a>`;
            }
            html += `<a href="map.html" class="action-btn secondary">← Back to Map</a>`;
            return `<div class="action-strip">${html}</div>`;
        }

        function renderMapEmbed(placeId) {
            if (!placeId) return '';
            return `
                <div class="map-section">
                    <div class="map-section-inner">
                        <h2>📍 Find It</h2>
                        <iframe
                            class="map-embed"
                            src="https://www.google.com/maps/embed/v1/place?key=${API_KEY}&q=place_id:${placeId}"
                            allowfullscreen loading="lazy">
                        </iframe>
                    </div>
                </div>
            `;
        }

        function showError(title, msg) {
            document.getElementById('pageContent').innerHTML = `
                <div class="state-container">
                    <h2>${title}</h2>
                    <p>${msg}</p>
                    <a href="map.html" class="btn-back">← Back to Map</a>
                </div>
            `;
        }

        // ── Lightbox ───────────────────────────────────────────────────────
        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>

</body>
</html>
