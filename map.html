<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Diego Specialty Coffee - Specialty Coffee Map</title>
    
    <!-- Marker Clusterer -->
    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;600;800&family=Lora:wght@400;600&family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --espresso: #3D2817;
            --coffee-brown: #6B4E3D;
            --cream: #F8F5F0;
            --white: #FFFFFF;
            --latte: #C4A77D;
            --accent-red: #B85C38;
            --warm-brown: #5C4033;
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Libre Franklin', -apple-system, sans-serif;
            color: var(--espresso);
            background-color: var(--white);
            overflow: hidden;
            height: 100vh;
        }

        /* ── Banner-Inspired Header (compact horizontal) ─────────────── */
        header {
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent, transparent 39px,
                    rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent, transparent 39px,
                    rgba(255,255,255,0.016) 39px, rgba(255,255,255,0.016) 40px
                ),
                linear-gradient(160deg, #2A1508 0%, #4A2C18 45%, #3A2010 75%, #2A1508 100%);
            color: var(--white);
            border-top: 3px solid var(--accent-red);
            border-bottom: 3px solid var(--accent-red);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 120% at 0% 50%, rgba(0,0,0,0.38) 0%, transparent 65%),
                radial-gradient(ellipse 55% 120% at 100% 50%, rgba(0,0,0,0.38) 0%, transparent 65%);
            pointer-events: none;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* Brand: eyebrow line + italic-serif+bold-sans logo */
        .header-brand-eyebrow {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(196,167,125,0.6);
            margin-bottom: 0.3rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.45rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1;
            color: #EDE0CC;
        }

        h1 em {
            font-style: italic;
            color: #C9A97E;
            font-weight: 400;
        }

        h1 strong {
            font-family: 'Playfair Display', serif;
            font-style: normal;
            font-weight: 800;
            color: #EDE0CC;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 0.6rem;
            color: rgba(196, 167, 125, 0.55);
            margin-top: 0.3rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .header-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .header-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
            border: 1px solid rgba(196,167,125,0.32);
            color: rgba(196,167,125,0.8);
            background: transparent;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: 'Libre Franklin', sans-serif;
            border-radius: 0;
        }

        .header-btn:hover {
            border-color: var(--latte);
            color: var(--latte);
            background: rgba(196,167,125,0.07);
            transform: none;
        }

        .header-btn.secondary {
            background: transparent;
        }

        .header-btn.secondary:hover {
            background: rgba(196,167,125,0.07);
        }

        /* The "Submit" button gets accent-red fill */
        .header-btn:last-child {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
        }

        .header-btn:last-child:hover {
            background: #a04a28;
            border-color: #a04a28;
        }

        /* Controls Bar - Compact */
        .controls-bar {
            background: var(--white);
            padding: 1.25rem 2rem;
            border-bottom: 1px solid #E0DBD3;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .search-container {
            flex: 1;
            min-width: 500px;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 0.85rem 1.25rem;
            border: 2px solid var(--coffee-brown);
            border-radius: 0;
            font-size: 1rem;
            background: var(--white);
            transition: all 0.2s;
            font-family: 'Libre Franklin', sans-serif;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--accent-red);
            box-shadow: 0 0 0 3px rgba(184, 92, 56, 0.1);
        }

        /* Autocomplete Dropdown */
        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border: 2px solid var(--coffee-brown);
            border-top: none;
            max-height: 350px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .autocomplete-dropdown.show {
            display: block;
        }

        .autocomplete-item {
            padding: 0.85rem 1.25rem;
            cursor: pointer;
            border-bottom: 1px solid #E0DBD3;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover,
        .autocomplete-item.active {
            background: var(--cream);
        }
            transition: background 0.2s;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover,
        .autocomplete-item.selected {
            background: #f5f5f5;
        }

        .autocomplete-name {
            font-weight: 600;
            color: #333;
            display: block;
        }

        .autocomplete-address {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.2rem;
        }

        .autocomplete-type {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-top: 0.3rem;
        }

        .autocomplete-type.roaster {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .autocomplete-type.cafe {
            background: #e3f2fd;
            color: #1565c0;
        }

        .autocomplete-new {
            border-left: 4px solid #2e7d32;
            background: #f1f8f4;
        }

        #searchBtn, #clearBtn {
            padding: 0.6rem 1.2rem;
            background: #6F4E37;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.3s;
            white-space: nowrap;
        }

        #searchBtn:hover, #clearBtn:hover {
            background: #5a3d2b;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        button {
            padding: 0.7rem 1.25rem;
            background: var(--coffee-brown);
            color: var(--white);
            border: 2px solid var(--coffee-brown);
            border-radius: 0;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: 'Libre Franklin', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        button:hover {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }

        .toggle-filters-btn {
            background: var(--white);
            color: var(--coffee-brown);
        }

        .toggle-filters-btn:hover {
            background: var(--cream);
        }

        #clearBtn {
            background: var(--white) !important;
            color: var(--coffee-brown) !important;
            border-color: var(--coffee-brown) !important;
        }

        #clearBtn:hover {
            background: var(--cream) !important;
        }

        /* Filters Panel */
        .filters-panel {
            background: var(--warm-white);
            border-bottom: 1px solid rgba(107, 78, 61, 0.1);
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s ease;
        }

        .filters-panel.expanded {
            max-height: 200px;
            padding: 2rem;
            overflow-y: auto;
        }

        .filters-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .filters-section {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .filters-section h3 {
            font-family: 'Crimson Pro', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--rich-brown);
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
        }

        .filter-label input[type="checkbox"],
        .filter-label input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .filter-count {
            color: #999;
            font-size: 0.85rem;
            margin-left: 0.25rem;
            font-weight: 400;
        }

        .location-btn {
            padding: 0.6rem 1.2rem;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.3s;
            width: 100%;
        }

        .location-btn:hover {
            background: #1b5e20;
        }

        .location-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .roaster-badge, .cafe-badge {
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .roaster-badge {
            background: var(--coffee-brown);
            color: var(--white);
        }

        .cafe-badge {
            background: var(--accent-red);
            color: var(--white);
        }

        /* Split Layout */
        .map-layout {
            display: flex;
            height: calc(100vh - 70px - 40px); /* header ~70px, footer ~40px */
            overflow: hidden;
        }

        /* Left Panel */
        .list-panel {
            width: 460px;
            min-width: 400px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--cream);
            border-right: 1px solid #E0DBD3;
            overflow: hidden;
        }

        .list-panel-controls {
            background: var(--white);
            padding: 0.65rem 0.85rem;
            border-bottom: 1px solid #E0DBD3;
            flex-shrink: 0;
        }

        .list-panel-controls .search-container {
            position: relative;
            margin-bottom: 0.5rem;
        }

        .list-panel-controls #searchInput {
            width: 100%;
            padding: 0.5rem 0.85rem;
            border: 1.5px solid #c4b8ac;
            font-size: 0.85rem;
            background: var(--cream);
            font-family: 'Libre Franklin', sans-serif;
        }

        .list-panel-controls .button-row {
            display: flex;
            gap: 0.4rem;
        }

        .list-panel-controls button {
            padding: 0.35rem 0.65rem;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            flex: 1;
        }

        /* Location Cards */
        .list-panel-cards {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .list-panel-header {
            padding: 0.6rem 1rem;
            font-size: 0.75rem;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--cream);
            border-bottom: 1px solid #E0DBD3;
            flex-shrink: 0;
        }

        .location-card {
            display: flex;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #E0DBD3;
            background: var(--white);
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
            color: inherit;
        }

        .location-card:hover {
            background: #fdf8f3;
        }

        .location-card.active {
            background: #fdf3eb;
            border-left: 3px solid var(--accent-red);
        }

        .location-card-img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            flex-shrink: 0;
            background: #e8e0d8;
        }

        .location-card-img-placeholder {
            width: 72px;
            height: 72px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #c4a77d 0%, #8b6552 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .location-card-body {
            flex: 1;
            min-width: 0;
        }

        .location-card-name {
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--espresso);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .location-card-type {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
        }

        .location-card-type.roaster { color: #2e7d32; }
        .location-card-type.cafe { color: #1565c0; }

        .location-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-bottom: 0.3rem;
        }

        .location-card-tag {
            background: #f3ece4;
            color: #6F4E37;
            border: 1px solid #d4c4b0;
            border-radius: 2px;
            padding: 0.1rem 0.4rem;
            font-size: 0.68rem;
            font-weight: 500;
        }

        .location-card-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .location-card-badge {
            font-size: 0.67rem;
            padding: 0.1rem 0.4rem;
            border-radius: 2px;
            font-weight: 500;
        }

        .location-card-badge.yes {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .card-detail-line {
            font-size: 0.7rem;
            color: #8a7060;
            margin-bottom: 0.2rem;
            line-height: 1.3;
        }
        .card-description {
            color: #aaa;
            font-style: italic;
            margin-top: 0.15rem;
        }
        .location-card-desc {
            font-size: 0.72rem;
            color: #777;
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Right Map */
        .map-right {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Mobile toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--espresso);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            white-space: nowrap;
        }

        /* Filters panel inside left panel */
        #filtersPanel {
            background: var(--white);
            border-bottom: 1px solid #E0DBD3;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            flex-shrink: 0;
        }

        #filtersPanel.expanded {
            max-height: 240px;
            overflow-y: auto;
        }

        .filters-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding: 1rem 0.85rem;
        }

        .filters-section h3 {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            font-size: 0.8rem;
            margin-bottom: 0.3rem;
        }

        .filter-label input { cursor: pointer; }

        .filter-count {
            color: #aaa;
            font-size: 0.75rem;
        }

        /* Loading Indicator */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: var(--white);
            padding: 2rem 2.5rem;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        #loading.hidden { display: none; }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 1rem;
            border: 3px solid var(--cream);
            border-top: 3px solid var(--coffee-brown);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer */
        footer {
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent, transparent 39px,
                    rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px
                ),
                linear-gradient(160deg, #2A1508 0%, #4A2C18 45%, #2A1508 100%);
            padding: 0.7rem 1.5rem;
            text-align: center;
            font-size: 0.78rem;
            color: rgba(196,167,125,0.7);
            border-top: 3px solid var(--accent-red);
            position: relative;
            z-index: 10;
        }

        footer a {
            color: var(--latte);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(196,167,125,0.2);
        }

        footer a:hover {
            color: #EDE0CC;
            border-bottom-color: var(--latte);
            text-decoration: none;
        }

        #visibleCount { font-weight: 600; color: var(--latte); }

        @media (max-width: 768px) {
            header { padding: 0.75rem 1rem; }
            h1 { font-size: 1.2rem; }
            .subtitle { display: none; }

            .map-layout {
                flex-direction: column;
                height: calc(100vh - 56px);
            }

            .list-panel {
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0; left: 0;
                z-index: 10;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .list-panel.mobile-visible {
                transform: translateX(0);
            }

            .map-right {
                width: 100%;
                height: 100%;
            }

            .mobile-toggle { display: block; }
        }
        .info-window {
            padding: 0.1rem 1rem 1rem 1rem;
            min-width: 320px;
            max-width: 360px;
        }
        .info-window-divider {
            border: none;
            border-top: 1px solid #e8e0d8;
            margin: 0.8rem 0;
        }
        .info-window-coffee-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.25rem 0.5rem;
            font-size: 0.78rem;
            margin-bottom: 0.6rem;
        }
        .info-window-coffee-grid .cg-label {
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.03em;
        }
        .info-window-coffee-grid .cg-val {
            color: #3a2a1a;
        }
        .info-window-brew-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.4rem;
            margin-bottom: 0.6rem;
        }
        .info-window-brew-tag {
            background: #f3ece4;
            color: #6F4E37;
            border: 1px solid #d4c4b0;
            border-radius: 3px;
            padding: 0.15rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .info-window-description {
            font-size: 0.82rem;
            color: #555;
            line-height: 1.5;
            margin-bottom: 0.6rem;
            font-style: italic;
        }
        .info-window-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-weight: 500;
        }
        .info-window-badge.yes {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        .info-window-badge.no {
            background: #fafafa;
            color: #999;
            border: 1px solid #e0e0e0;
        }
        .info-window-badges-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.6rem;
        }

        .info-window h3 {
            color: #6F4E37;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }

        .info-window-section {
            margin-bottom: 0.25rem;
            font-size: 0.72rem;
            line-height: 1.3;
        }

        .info-window-label {
            font-weight: 600;
            color: #555;
            margin-right: 0.3rem;
        }

        .info-window a {
            color: #1565c0;
            text-decoration: none;
        }

    <!-- Locations data -->

    <!-- Map JavaScript -->
    <script>
// Map JavaScript - Embedded
let map, markers = [], markerCluster, infoWindow, allLocations = [], userLocationMarker = null;
// Use coffeeDetails already merged into locations.js by sync-locations.js
// Build lookup from the already-loaded COFFEE_LOCATIONS array
let sheetDataByLocation = {};
function loadSheetData() {
    (window.COFFEE_LOCATIONS || []).forEach(loc => {
        if (loc.coffeeDetails) {
            sheetDataByLocation[loc.id] = loc.coffeeDetails;
        }
    });
    // Re-render cards with coffee details
    const visibleMarkers = markers.filter(m => shouldShowMarker(m));
    renderLocationCards(visibleMarkers);
}
let autocompleteIndex = -1;

function getRegion(location) {
    const address = location.basicInfo.address.fullAddress || '';
    const zip = location.basicInfo.address.zip || '';
    
    if (address.match(/Oceanside|Carlsbad|Encinitas|Solana Beach|Del Mar|Cardiff/i)) return 'north-coastal';
    if (address.match(/San Marcos|Vista|Escondido|Poway|Rancho Bernardo/i) || ['92127', '92128', '92129', '92131'].includes(zip)) return 'north-inland';
    if (address.match(/Downtown|Little Italy|North Park|South Park|Hillcrest|East Village/i) || ['92101', '92103', '92104', '92105', '92116', '92102'].includes(zip)) return 'central';
    if (address.match(/La Jolla|Pacific Beach|Ocean Beach|Mission Beach|Point Loma/i) || ['92107', '92109', '92110'].includes(zip)) return 'coastal';
    if (address.match(/La Mesa|El Cajon|Santee/i) || ['92115', '92119', '92120'].includes(zip)) return 'east';
    if (address.match(/Chula Vista|Imperial Beach|Coronado/i)) return 'south';
    if (address.includes('San Diego')) {
        if (['92106', '92108', '92111', '92117', '92123'].includes(zip)) return 'coastal';
        if (['92113', '92114'].includes(zip)) return 'south';
        return 'central';
    }
    return 'north-coastal';
}

function initMap() {
    // Custom map styling - warm, minimal, coffee-themed
    const mapStyles = [
        {
            "featureType": "all",
            "elementType": "geometry",
            "stylers": [{ "color": "#F5F1E8" }]
        },
        {
            "featureType": "all",
            "elementType": "labels.text.fill",
            "stylers": [{ "color": "#6B4E3D" }]
        },
        {
            "featureType": "all",
            "elementType": "labels.text.stroke",
            "stylers": [{ "color": "#FFFFFF" }, { "weight": 3 }]
        },
        {
            "featureType": "road",
            "elementType": "geometry",
            "stylers": [{ "color": "#FFFFFF" }]
        },
        {
            "featureType": "road",
            "elementType": "geometry.stroke",
            "stylers": [{ "color": "#E8DCC8" }]
        },
        {
            "featureType": "road.highway",
            "elementType": "geometry",
            "stylers": [{ "color": "#F5EFE3" }]
        },
        {
            "featureType": "road.highway",
            "elementType": "geometry.stroke",
            "stylers": [{ "color": "#D4C4A8" }]
        },
        {
            "featureType": "water",
            "elementType": "geometry",
            "stylers": [{ "color": "#B8D4E8" }]
        },
        {
            "featureType": "landscape.natural",
            "elementType": "geometry",
            "stylers": [{ "color": "#EBE7DB" }]
        },
        {
            "featureType": "poi.park",
            "elementType": "geometry",
            "stylers": [{ "color": "#D4E4CD" }]
        },
        {

        }
    ];
    
    map = new google.maps.Map(document.getElementById('map'), {
        zoom: 10,
        center: { lat: 32.9, lng: -117.2 },

        streetViewControl: false,

        zoomControl: true,
        styles: mapStyles,
        mapTypeControlOptions: {
            style: google.maps.MapTypeControlStyle.HORIZONTAL_BAR,
            position: google.maps.ControlPosition.TOP_RIGHT,
        }
    });
    
    infoWindow = new google.maps.InfoWindow();
    loadLocations();
    setupEventListeners();
    loadSheetData();
    document.getElementById('loading').classList.add('hidden');
    updateAllFilterCounts();
    
    // Handle URL parameters for filtering and searching
    const urlParams = new URLSearchParams(window.location.search);
    const searchQuery = urlParams.get('search');
    const filterParam = urlParams.get('filter');
    
    // Apply filter from URL
    if (filterParam === 'roasters') {
        document.getElementById('filterCafes').checked = false;
        applyFilters();
    } else if (filterParam === 'cafes') {
        document.getElementById('filterRoasters').checked = false;
        applyFilters();
    }
    
    // Apply search from URL
    if (searchQuery) {

        performSearch();

}

function loadLocations() {
    allLocations = COFFEE_LOCATIONS;
    allLocations.forEach(location => {
        location.region = getRegion(location);
        createMarker(location);
    });
    
    // Custom renderer for color-coded clusters
    const renderer = {
        render: ({ count, position, markers }) => {
            // Count types in this cluster
            let roasterCount = 0;
            markers.forEach(m => {
                if (m.locationType === 'roaster') roasterCount++;
            });
            
            // Determine color based on majority
            const color = roasterCount > markers.length / 2 ? '#0F9D58' : '#0288D1';
            
            return new google.maps.Marker({
                position,
                icon: {
                    url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
                            <circle cx="30" cy="30" r="28" fill="${color}" opacity="0.3"/>
                            <circle cx="30" cy="30" r="20" fill="${color}" opacity="0.6"/>
                            <circle cx="30" cy="30" r="15" fill="white" stroke="${color}" stroke-width="2"/>
                            <text x="30" y="36" text-anchor="middle" fill="${color}" font-size="14" font-weight="bold" font-family="Arial">${count}</text>
                        </svg>
                    `)}`,
                    scaledSize: new google.maps.Size(60, 60),
                },
                zIndex: Number(google.maps.Marker.MAX_ZINDEX) + count,
            });
        }
    };
    
    markerCluster = new markerClusterer.MarkerClusterer({ 
        map,
        markers: markers,
        algorithmOptions: { maxZoom: 14 },
        renderer: renderer
    });
    
    fitMapToBounds();
    updateVisibleCount(markers.length);
    renderLocationCards(markers);
}

function createMarker(location) {
    const markerColor = location.basicInfo.type === 'roaster' ? 
        'http://maps.google.com/mapfiles/ms/icons/green-dot.png' :
        'http://maps.google.com/mapfiles/ms/icons/blue-dot.png';
    
    const marker = new google.maps.Marker({
        position: {
            lat: location.basicInfo.address.coordinates.lat,
            lng: location.basicInfo.address.coordinates.lng
        },
        map: null,
        title: location.basicInfo.name,
        icon: markerColor,
        locationType: location.basicInfo.type,
        locationData: location,
        region: location.region
    });
    
    marker.addListener('click', () => {
        showInfoWindow(marker, location);
        // Highlight the card
        document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));
        const card = document.querySelector(`.location-card[data-id="${location.id}"]`);
        if (card) card.classList.add('active');
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
    markers.push(marker);
}

function showInfoWindow(marker, location) {
    infoWindow.setContent(createInfoWindowContent(location, sheetDataByLocation[location.id] || {}));
    infoWindow.open(map, marker);
}

function createInfoWindowContent(location, custom) {
    custom = custom || {};
    const info = location.basicInfo;
    const hours = location.hours || {};
    const contact = info.contact || {};
    const jsDay = new Date().getDay(); // 0=Sun, weekdayDescriptions is Mon-indexed
    const monIdx = jsDay === 0 ? 6 : jsDay - 1;
    const todayEntry = hours.weekdayDescriptions ? hours.weekdayDescriptions[monIdx] : '';
    const todayHours = todayEntry ? todayEntry.replace(/^\w+:\s*/, '') : '';
    const isOnline = location.customFlags?.onlineOnly || false;
    const hasUserLocation = userLocationMarker !== null;
    const isRoaster = info.type === 'roaster';
    const typeLabel = isRoaster ? '📍 Roaster' : '☕ Multi-Roaster Cafe';

    let html = `<div class="info-window"><h3>${info.name}</h3>`;
    html += `<div class="info-window-section"><span class="info-window-label">${typeLabel}</span></div>`;

    if (info.address.fullAddress) {
        html += `<div class="info-window-section"><span class="info-window-label">📍</span>${isOnline ? '<strong>Online Only</strong><br>' : ''}${info.address.street || info.address.fullAddress}</div>`;
    }

    if (todayHours) {
        html += `<div class="info-window-section"><span class="info-window-label">🕐</span>${todayHours}</div>`;
    }

    if (contact.website) {
        html += `<div class="info-window-section"><span class="info-window-label">🌐</span><a href="${contact.website}" target="_blank">Visit Website</a></div>`;
    }

    // ── Coffee details from Sheet ──────────────────────────────────────
    const hasAnyCustom = custom.description || custom.roastScale || custom.roastStyle ||
                         custom.visitorExperience || custom.multipleLocations ||
                         custom.amenities?.length || custom.roastersServed?.length;

    if (hasAnyCustom) {
        html += `<hr class="info-window-divider">`;

        if (custom.description) {
            html += `<div class="info-window-description">"${custom.description}"</div>`;
        }

        const gridItems = [];
        if (isRoaster) {
            if (custom.roastScale) gridItems.push(['Roast Scale', custom.roastScale + ' Roaster']);
            if (custom.visitorExperience) gridItems.push(['Experience', custom.visitorExperience]);
        } else {
            if (custom.roastersServed?.length) {
                const preview = custom.roastersServed.slice(0, 2).join(', ') + (custom.roastersServed.length > 2 ? ` +${custom.roastersServed.length - 2} more` : '');
                gridItems.push(['Roasters', preview]);
            }
            if (custom.specialtyBarista) gridItems.push(['Specialty Barista', custom.specialtyBarista]);
        }
        if (custom.multipleLocations) gridItems.push(['Multiple Locations', custom.multipleLocations]);

        if (gridItems.length) {
            html += `<div class="info-window-coffee-grid">`;
            gridItems.forEach(([label, val]) => {
                html += `<span class="cg-label">${label}</span><span class="cg-val">${val}</span>`;
            });
            html += `</div>`;
        }

        if (custom.amenities?.length) {
            const a = custom.amenities;
            const amenityBits = [];
            if (a.some(x => x.includes('Dog')))                             amenityBits.push('🐾 Dog Friendly');
            if (a.some(x => x.includes('Wifi') || x.includes('Working')))   amenityBits.push('💻 WiFi');
            if (a.some(x => x.includes('Food') || x.includes('Pastries')))  amenityBits.push('🥐 Food');
            if (a.some(x => x.includes('Beans Online')))                     amenityBits.push('🛒 Online Beans');
            if (a.some(x => x.includes('Decaf')))                            amenityBits.push('☕ Decaf');
            if (a.some(x => x.includes('Seating')))                          amenityBits.push('🪑 Seating');
            if (amenityBits.length) {
                html += `<div class="info-window-badges-row">`;
                amenityBits.forEach(b => { html += `<span class="info-window-badge yes">${b}</span>`; });
                html += `</div>`;
            }
        }
    }

    // ── Buttons ────────────────────────────────────────────────────────
    html += `<div style="margin-top: 1.2rem; display: flex; flex-direction: column; gap: 0.6rem;">`;
    html += `<a href="location.html?id=${location.id}" class="directions-btn" style="width: 100%; text-align: center; background: #6F4E37; padding: 0.35rem 0.8rem; font-size: 0.78rem;">📋 View Full Details</a>`;
    html += `<a href="edit.html?id=${location.id}&return=map.html" class="directions-btn" style="width: 100%; text-align: center; background: transparent; color: #6B4E3D !important; border: 1.5px solid #C8B9AC; padding: 0.35rem 0.8rem; font-size: 0.78rem;">✏️ Suggest an Edit</a>`;
    html += `<div style="display: flex; gap: 0.6rem;">`;

    if (hasUserLocation && !isOnline) {
        const lat = info.address.coordinates.lat;
        const lng = info.address.coordinates.lng;
        const userPos = userLocationMarker.getPosition();
        const directionsUrl = `https://www.google.com/maps/dir/${userPos.lat()},${userPos.lng()}/${lat},${lng}`;
        html += `<a href="${directionsUrl}" target="_blank" class="directions-btn" style="flex: 1; text-align: center; background: #2e7d32; color: white !important; padding: 0.35rem 0.8rem; font-size: 0.78rem;">🧭 Directions</a>`;
    }

    if (contact.googleMapsUrl) {
        html += `<a href="${contact.googleMapsUrl}" target="_blank" class="directions-btn" style="${hasUserLocation && !isOnline ? 'flex: 1;' : 'width: 100%;'} text-align: center; background: #1976d2; color: white !important; padding: 0.35rem 0.8rem; font-size: 0.78rem;">🗺️ Google Maps</a>`;
    }

    html += `</div></div></div>`;
    return html;
}

function setupAutocomplete() {
    const searchInput = document.getElementById('searchInput');
    const dropdown = document.getElementById('autocompleteDropdown');
    let searchTimeout;
    
    console.log('🔧 Setting up autocomplete (existing locations only)...');
    
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        
        clearTimeout(searchTimeout);
        
        if (query.length < 2) {
            dropdown.classList.remove('show');
            return;
        }
        
        console.log('🔍 Searching for:', query);
        
        // Debounce
        searchTimeout = setTimeout(() => {
            performSearch(query);
        }, 300);
    });
    
    function performSearch(query) {
        // Search our existing locations
        const matches = allLocations.filter(loc => {
            const name = loc.basicInfo.name.toLowerCase();
            const address = loc.basicInfo.address.fullAddress?.toLowerCase() || '';
            return name.includes(query.toLowerCase()) || address.includes(query.toLowerCase());
        }).slice(0, 8); // Show up to 8 results
        
        console.log('📍 Found', matches.length, 'matches');
        
        if (matches.length === 0) {
            dropdown.classList.remove('show');
            return;
        }
        
        let html = '';
        
        matches.forEach((loc) => {
            const typeClass = loc.basicInfo.type === 'roaster' ? 'roaster' : 'cafe';
            const typeLabel = loc.basicInfo.type === 'roaster' ? '📍 Roaster' : '☕ Cafe';
            html += `
                <div class="autocomplete-item" data-type="existing" data-id="${loc.id}" style="cursor: pointer;">
                    <span class="autocomplete-name">${loc.basicInfo.name}</span>
                    <span class="autocomplete-address">${loc.basicInfo.address.street || loc.basicInfo.address.fullAddress}</span>
                    <span class="autocomplete-type ${typeClass}">${typeLabel}</span>
                </div>`;
        });
        
        dropdown.innerHTML = html;
        dropdown.classList.add('show');
        console.log('✅ Dropdown shown with', matches.length, 'results');
        
        // Add click handlers
        dropdown.querySelectorAll('.autocomplete-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const id = item.getAttribute('data-id');
                console.log('📍 Selecting location:', id);
                selectLocation(id);
            });
        });
    }
    
    // Keyboard navigation - Enter key
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const firstItem = dropdown.querySelector('.autocomplete-item');
            if (firstItem) {
                const id = firstItem.getAttribute('data-id');
                selectLocation(id);
            }
        } else if (e.key === 'Escape') {
            dropdown.classList.remove('show');
        }
    });
    
    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('show');
        }
    });
}

function selectLocation(locationId) {
    const location = allLocations.find(loc => loc.id === locationId);
    if (!location) return;
    
    document.getElementById('autocompleteDropdown').classList.remove('show');
    document.getElementById('searchInput').value = location.basicInfo.name;
    
    const marker = markers.find(m => m.locationData.id === locationId);
    if (marker) {
        map.setZoom(16);
        map.panTo(marker.getPosition());
        setTimeout(() => showInfoWindow(marker, location), 300);
    }

    // Highlight and jump card to top of panel
    document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`.location-card[data-id="${locationId}"]`);
    if (card) {
        card.classList.add('active');
        const panelCards = document.getElementById('locationCards');
        if (panelCards) panelCards.scrollTop = card.offsetTop - panelCards.offsetTop;
    }
}

function updateAllFilterCounts() {
    const types = {roasters: 0, cafes: 0};
    const regions = {'central': 0, 'north-coastal': 0, 'coastal': 0, 'north-inland': 0, 'east': 0, 'south': 0};
    
    markers.forEach(marker => {
        if (marker.locationType === 'roaster') types.roasters++;
        else types.cafes++;
        if (regions[marker.region] !== undefined) regions[marker.region]++;
    });
    
    if (document.getElementById('count-roasters')) document.getElementById('count-roasters').textContent = `(${types.roasters})`;
    if (document.getElementById('count-cafes')) document.getElementById('count-cafes').textContent = `(${types.cafes})`;
    
    for (const [region, count] of Object.entries(regions)) {
        const el = document.getElementById(`count-${region}`);
        if (el) el.textContent = `(${count})`;
    }
}

function fitMapToBounds() {
    const bounds = new google.maps.LatLngBounds();
    let hasVisibleMarkers = false;
    
    markers.forEach(marker => {
        if (marker.getMap() !== null) {
            bounds.extend(marker.getPosition());
            hasVisibleMarkers = true;
        }
    });
    
    if (hasVisibleMarkers) {
        map.fitBounds(bounds);
        const listener = google.maps.event.addListener(map, 'idle', () => {
            if (map.getZoom() > 15) map.setZoom(15);
            google.maps.event.removeListener(listener);
        });
    }
}

function setupEventListeners() {
    setupAutocomplete();
    
    document.getElementById('searchBtn').addEventListener('click', performSearch);
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && autocompleteIndex === -1) performSearch();
    });
    document.getElementById('clearBtn').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('autocompleteDropdown').classList.remove('show');
        applyFilters();
    });
    document.getElementById('filterRoasters').addEventListener('change', applyFilters);
    document.getElementById('filterCafes').addEventListener('change', applyFilters);
    
    document.querySelectorAll('input[name="ratingFilter"]').forEach(radio => {
        radio.addEventListener('change', applyFilters);
    });
    
    document.querySelectorAll('.regionFilter').forEach(checkbox => {
        checkbox.addEventListener('change', () => {
            if (checkbox.value === 'all' && checkbox.checked) {
                document.querySelectorAll('.regionFilter').forEach(cb => {
                    if (cb.value !== 'all') cb.checked = false;
                });
            } else if (checkbox.value !== 'all') {
                document.querySelector('.regionFilter[value="all"]').checked = false;
            }
            applyFilters();
        });
    });
    
    document.getElementById('toggleFilters').addEventListener('click', () => {
        document.getElementById('filtersPanel').classList.toggle('expanded');
    });
    
    document.getElementById('showMyLocation').addEventListener('click', showUserLocation);
}

function showUserLocation() {
    const btn = document.getElementById('showMyLocation');
    btn.disabled = true;
    btn.textContent = '⏳';
    
    if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const userPos = { lat: position.coords.latitude, lng: position.coords.longitude };
                userLatLng = userPos; // store globally for distance sorting

                if (userLocationMarker) userLocationMarker.setMap(null);
                
                userLocationMarker = new google.maps.Marker({
                    position: userPos,
                    map: map,
                    title: 'Your Location',
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 10,
                        fillColor: '#4285F4',
                        fillOpacity: 1,
                        strokeColor: '#ffffff',
                        strokeWeight: 2
                    },
                    zIndex: 1000
                });
                
                map.setCenter(userPos);
                map.setZoom(12);
                btn.disabled = false;
                btn.textContent = '📍 Near Me';

                // Re-render cards sorted by distance
                const visibleMarkers = markers.filter(m => shouldShowMarker(m));
                renderLocationCards(visibleMarkers);
            },
            () => {
                alert('Could not get your location. Please enable location services.');
                btn.disabled = false;
                btn.textContent = '📍 Near Me';
            }
        );
    }
}

// Global variable to track Google Places markers
let googlePlacesMarker = null;

function searchGooglePlaces(query) {
    const service = new google.maps.places.PlacesService(map);
    
    // Search for coffee shops in San Diego area with the query
    const request = {
        query: query + ' coffee San Diego',
        fields: ['name', 'geometry', 'formatted_address', 'place_id', 'rating', 'user_ratings_total', 'formatted_phone_number', 'website', 'opening_hours', 'photos', 'types'],
        locationBias: {
            center: { lat: 32.7157, lng: -117.1611 },
            radius: 50000 // 50km radius around San Diego
        }
    };
    
    service.textSearch(request, (results, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
            const place = results[0];
            
            // Check if this place is a coffee-related business
            const isCoffee = place.types?.some(type => 
                type.includes('cafe') || 
                type.includes('coffee') || 
                type.includes('restaurant') ||
                type.includes('food')
            );
            
            if (isCoffee || true) { // Allow all results for now
                displayGooglePlace(place, query);
            } else {
                showNoResults(query);
            }
        } else {
            showNoResults(query);
        }
    });
}

function displayGooglePlace(place, originalQuery) {
    // Remove any existing Google Places marker
    if (googlePlacesMarker) {
        googlePlacesMarker.setMap(null);
    }
    
    // Create a yellow marker for the Google Places result
    googlePlacesMarker = new google.maps.Marker({
        position: place.geometry.location,
        map: map,
        icon: {
            url: 'http://maps.google.com/mapfiles/ms/icons/yellow-dot.png'
        },
        title: place.name,
        zIndex: 1000
    });
    
    // Center map on the result
    map.setCenter(place.geometry.location);
    map.setZoom(16);
    
    // Get detailed place information
    const service = new google.maps.places.PlacesService(map);
    service.getDetails({
        placeId: place.place_id,
        fields: ['name', 'formatted_address', 'formatted_phone_number', 'website', 'rating', 'user_ratings_total', 'opening_hours', 'photos', 'url']
    }, (placeDetails, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK) {
            showGooglePlaceInfo(placeDetails, googlePlacesMarker);
        }
    });
    
    // Add click listener
    googlePlacesMarker.addListener('click', () => {
        service.getDetails({
            placeId: place.place_id,
            fields: ['name', 'formatted_address', 'formatted_phone_number', 'website', 'rating', 'user_ratings_total', 'opening_hours', 'photos', 'url']
        }, (placeDetails, status) => {
            if (status === google.maps.places.PlacesServiceStatus.OK) {
                showGooglePlaceInfo(placeDetails, googlePlacesMarker);
            }
        });
    });
}

function applyFilters() {
    if (document.getElementById('searchInput').value.trim()) {
        performSearch();
        return;
    }
    
    const visibleMarkers = markers.filter(marker => shouldShowMarker(marker));
    markerCluster.clearMarkers();
    markerCluster.addMarkers(visibleMarkers);
    updateVisibleCount(visibleMarkers.length);
    renderLocationCards(visibleMarkers);
    fitMapToBounds();
}

function shouldShowMarker(marker) {
    const location = marker.locationData;
    
    if (marker.locationType === 'roaster' && !document.getElementById('filterRoasters').checked) return false;
    if (marker.locationType === 'cafe' && !document.getElementById('filterCafes').checked) return false;
    
    const allRegionsChecked = document.querySelector('.regionFilter[value="all"]').checked;
    
    if (!allRegionsChecked) {
        const checkedRegions = Array.from(document.querySelectorAll('.regionFilter:checked'))
            .map(cb => cb.value)
            .filter(val => val !== 'all');
        
        if (checkedRegions.length > 0 && !checkedRegions.includes(marker.region)) return false;
    }
    
    return true;
}

function updateVisibleCount(count) {
    document.getElementById('visibleCount').textContent = count;
}

// ── Location Cards ─────────────────────────────────────────────────────────
function renderLocationCards(visibleMarkers) {
    const container = document.getElementById('locationCards');
    if (!container) return;

    let sortedMarkers = [...visibleMarkers];

    // Sort by distance if user location is known
    if (userLatLng) {
        sortedMarkers.sort((a, b) => {
            const ca = a.locationData.basicInfo.address.coordinates;
            const cb = b.locationData.basicInfo.address.coordinates;
            return getDistanceKm(userLatLng.lat, userLatLng.lng, ca.lat, ca.lng)
                 - getDistanceKm(userLatLng.lat, userLatLng.lng, cb.lat, cb.lng);
        });
    }

    if (sortedMarkers.length === 0) {
        container.innerHTML = '<div style="padding:2rem 1rem; text-align:center; color:#999; font-size:0.85rem;">No locations match your search.</div>';
        return;
    }

    container.innerHTML = sortedMarkers.map(marker => {
        const loc = marker.locationData;
        const info = loc.basicInfo;
        const custom = sheetDataByLocation[loc.id] || {};
        const isRoaster = info.type === 'roaster';

        // Photo - googlePhotos entries are objects with a name field
        const photos = loc.googlePhotos || [];
        let photoUrl = null;
        if (photos.length) {
            const photo = photos[0];
            if (typeof photo === 'string') {
                photoUrl = photo;
            } else if (photo.name) {
                photoUrl = `https://places.googleapis.com/v1/${photo.name}/media?key=AIzaSyDFVEZE3Q0NBXY15rL6muwB8nNATPftOmI&maxWidthPx=200`;
            }
        }
        const imgHtml = photoUrl
            ? `<img class="location-card-img" src="${photoUrl}" alt="${info.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
               <div class="location-card-img-placeholder" style="display:none;">☕</div>`
            : `<div class="location-card-img-placeholder">☕</div>`;

        // Distance
        let distHtml = '';
        if (userLatLng && info.address && info.address.coordinates) {
            const coords = info.address.coordinates;
            const km = getDistanceKm(userLatLng.lat, userLatLng.lng, coords.lat, coords.lng);
            const miles = (km * 0.621371).toFixed(1);
            distHtml = `<div style="font-size:0.68rem; color:#aaa; margin-bottom:0.2rem;">📍 ${miles} mi away</div>`;
        }

        // Coffee details lines
        let detailLines = '';
        if (custom && Object.keys(custom).length) {
            const lines = [];

            // Roast scale + visitor experience (roasters)
            if (isRoaster) {
                if (custom.roastScale) lines.push(`<div class="card-detail-line">☕ ${custom.roastScale} Roaster</div>`);
                if (custom.visitorExperience) lines.push(`<div class="card-detail-line">🏠 ${custom.visitorExperience}</div>`);
            } else {
                if (custom.specialtyBarista) lines.push(`<div class="card-detail-line">👨‍🍳 Specialty Barista: ${custom.specialtyBarista}</div>`);
                if (custom.roastersServed && custom.roastersServed.length) {
                    const preview = custom.roastersServed.slice(0, 2).join(', ') + (custom.roastersServed.length > 2 ? ` +${custom.roastersServed.length - 2} more` : '');
                    lines.push(`<div class="card-detail-line">☕ ${preview}</div>`);
                }
            }

            // Multiple locations
            if (custom.multipleLocations) {
                lines.push(`<div class="card-detail-line">📍 Multiple Locations: ${custom.multipleLocations}</div>`);
            }

            // Amenities inline
            if (custom.amenities && custom.amenities.length) {
                const a = custom.amenities;
                const amenityBits = [];
                if (a.some(x => x.includes('Dog')))                             amenityBits.push('🐾 Dog Friendly');
                if (a.some(x => x.includes('Wifi') || x.includes('Working')))   amenityBits.push('💻 WiFi');
                if (a.some(x => x.includes('Food') || x.includes('Pastries')))  amenityBits.push('🥐 Food');
                if (a.some(x => x.includes('Beans Online')))                     amenityBits.push('🛒 Online Beans');
                if (a.some(x => x.includes('Decaf')))                            amenityBits.push('☕ Decaf');
                if (a.some(x => x.includes('Seating')))                          amenityBits.push('🪑 Seating');
                if (amenityBits.length) lines.push(`<div class="card-detail-line" style="color:#888;">${amenityBits.join(' · ')}</div>`);
            }

            // Full description
            if (custom.description) {
                lines.push(`<div class="card-detail-line card-description">"${custom.description}"</div>`);
            }

            detailLines = lines.join('');
        }



        return `
        <div class="location-card" data-id="${loc.id}" onclick="selectLocationCard('${loc.id}')">
            ${imgHtml}
            <div class="location-card-body">
                <div class="location-card-name">${info.name}</div>
                <div class="location-card-type ${isRoaster ? 'roaster' : 'cafe'}">${isRoaster ? '📍 Roaster' : '☕ Multi-Roaster Cafe'}</div>
                ${distHtml}
                ${detailLines}

            </div>
        </div>`;
    }).join('');
}

function selectLocationCard(locationId) {
    // Highlight card
    document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`.location-card[data-id="${locationId}"]`);
    if (card) {
        card.classList.add('active');
        // Scroll card to top of the panel list
        const panelCards = document.getElementById('locationCards');
        if (panelCards) panelCards.scrollTop = card.offsetTop - panelCards.offsetTop;
    }

    // Zoom in and open info window on map
    const marker = markers.find(m => m.locationData?.id === locationId);
    if (marker) {
        map.setZoom(16);
        map.panTo(marker.getPosition());
        setTimeout(() => showInfoWindow(marker, marker.locationData), 300);
    }
}

// ── Distance sorting when "find my location" is used ──────────────────────
let userLatLng = null;

function getDistanceKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
