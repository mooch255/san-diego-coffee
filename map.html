function applyFilters() {
    if (document.getElementById('searchInput').value.trim()) {
        performSearch();
        return;
    }

    const visibleMarkers = markers.filter(marker => shouldShowMarker(marker));
    markerCluster.clearMarkers();
    markerCluster.addMarkers(visibleMarkers);

    // Online roasters only count when zoomed out (city-wide view, zoom < 12)
    const showOnline = (!document.getElementById('filterOnlineOnly') || document.getElementById('filterOnlineOnly').checked)
                       && map.getZoom() < 12;
    const onlineCount = showOnline ? allLocations.filter(loc => loc.basicInfo?.onlineOnly).length : 0;
    updateVisibleCount(visibleMarkers.length + onlineCount);

    renderLocationCards(visibleMarkers);
    // Update filter counts to reflect current visibility (respects Open Now)
    updateAllFilterCounts(openNowActive ? visibleMarkers : null);

    // Auto-zoom to fit neighborhood — only fires once when the user picks from the dropdown,
    // not on every subsequent idle event (so the user can freely zoom out after).
    if (neighborhoodZoomPending) {
        neighborhoodZoomPending = false;
        const nbrFilter = document.getElementById('filterNeighborhood')?.value;
        if (nbrFilter && visibleMarkers.length > 0) {
            suppressIdleFilter = true;
            const bounds = new google.maps.LatLngBounds();
            visibleMarkers.forEach(m => bounds.extend(m.getPosition()));
            map.fitBounds(bounds);
            const listener = google.maps.event.addListener(map, 'idle', () => {
                if (map.getZoom() > 14) map.setZoom(14);
                google.maps.event.removeListener(listener);
                suppressIdleFilter = false;
            });
        }
    }
}

function shouldShowMarker(marker) {
    const location = marker.locationData;

    // Type filters
    if (marker.locationType === 'roaster' && !document.getElementById('filterRoasters').checked) return false;
    if (marker.locationType === 'cafe' && !document.getElementById('filterCafes').checked) return false;

    // Neighborhood filter
    const nbrFilter = document.getElementById('filterNeighborhood')?.value;
    if (nbrFilter && marker.locationData?.coffeeDetails?.neighborhood !== nbrFilter) return false;

    // Bounds filter — list reflects what's visible on the map
    if (map && map.getBounds()) {
        const coords = location.basicInfo?.address?.coordinates;
        if (coords) {
            const inBounds = map.getBounds().contains(new google.maps.LatLng(coords.lat, coords.lng));
            if (!inBounds) return false;
        }
    }

    if (openNowActive && !isLocationOpenNow(location)) return false;

    return true;
}

function updateVisibleCount(count) {
    const el = document.getElementById('visibleCount');
    if (!el) return;
    if (el.textContent !== String(count)) {
        el.textContent = count;
        el.classList.remove('flash');
        void el.offsetWidth;
        el.classList.add('flash');
        setTimeout(() => el.classList.remove('flash'), 450);
    }
    // Show "zoom out for more" nudge when very few results visible
    const nudge = document.getElementById('zoomNudge');
    if (nudge) nudge.style.display = (count > 0 && count < 10) ? 'inline' : 'none';
}

// ── Location Cards ─────────────────────────────────────────────────────────
function renderLocationCards(visibleMarkers) {
    const container = document.getElementById('locationCards');
    if (!container) return;

    // Online roasters only appear in list when zoomed out to city-wide view (zoom < 12)
    const showOnline = (!document.getElementById('filterOnlineOnly') || document.getElementById('filterOnlineOnly').checked)
                       && map.getZoom() < 12;
    const onlineLocations = showOnline ? allLocations.filter(loc => loc.basicInfo?.onlineOnly) : [];

    // Combine: marker locations + online-only as plain location objects
    let combined = [
        ...visibleMarkers.map(m => ({ loc: m.locationData, marker: m })),
        ...onlineLocations.map(loc => ({ loc, marker: null }))
    ];

    // Sort the unified list
    if (currentSort === 'az') {
        combined.sort((a, b) => a.loc.basicInfo.name.localeCompare(b.loc.basicInfo.name));
    } else if (currentSort === 'nearest' && userLatLng) {
        combined.sort((a, b) => {
            const ca = a.loc.basicInfo.address?.coordinates;
            const cb = b.loc.basicInfo.address?.coordinates;
            // Online-only with no coords sort to the end
            if (!ca) return 1;
            if (!cb) return -1;
            return getDistanceKm(userLatLng.lat, userLatLng.lng, ca.lat, ca.lng)
                 - getDistanceKm(userLatLng.lat, userLatLng.lng, cb.lat, cb.lng);
        });
    }

    if (combined.length === 0) {
        container.innerHTML = '<div style="padding:2rem 1rem; text-align:center; color:#999; font-size:0.85rem;">No locations match your search.</div>';
        return;
    }

    container.innerHTML = combined.map(({ loc }) => renderCard(loc)).join('');
    document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));

    // Scroll to top if clear was just pressed
    if (pendingScrollTop) {
        container.scrollTop = 0;
        pendingScrollTop = false;
    }
}

function renderCard(loc) {
        const info = loc.basicInfo;
        const custom = sheetDataByLocation[loc.id] || {};
        const isRoaster = info.type === 'roaster';
        const isOnline = info.onlineOnly || false;

        // Photo - use self-hosted localImage to avoid live Places API calls
        const photoUrl = loc.localImage || null;
        const _initials = getCardInitials(info.name);
        const imgHtml = photoUrl
            ? `<img class="location-card-img" src="${photoUrl}" alt="${info.name}" onerror="this.style.display='none'; this.nextElementSibling.style.removeProperty('display');">
               <div class="location-card-img-placeholder" style="display:none;"><div class="card-initials">${_initials}</div><div class="card-initials-dot"></div></div>`
            : `<div class="location-card-img-placeholder"><div class="card-initials">${_initials}</div><div class="card-initials-dot"></div></div>`;

        // Distance
        let distHtml = '';
        if (userLatLng && info.address && info.address.coordinates) {
            const coords = info.address.coordinates;
            const km = getDistanceKm(userLatLng.lat, userLatLng.lng, coords.lat, coords.lng);
            const miles = (km * 0.621371).toFixed(1);
            distHtml = `<div style="font-size:0.68rem; color:#aaa; margin-bottom:0.2rem;">📍 ${miles} mi away</div>`;
        }

        // Coffee details lines
        let detailLines = '';
        if (custom && Object.keys(custom).length) {
            const lines = [];

            // Roast scale + visitor experience (roasters)
            if (isRoaster) {
                if (custom.roastScale) lines.push(`<div class="card-detail-line">☕ ${custom.roastScale} Roaster</div>`);
                if (custom.visitorExperience) lines.push(`<div class="card-detail-line">🏠 ${custom.visitorExperience}</div>`);
            } else {
                if (custom.specialtyBarista) lines.push(`<div class="card-detail-line">👨‍🍳 Specialty Barista: ${custom.specialtyBarista}</div>`);
                if (custom.roastersServed && custom.roastersServed.length) {
                    const preview = custom.roastersServed.slice(0, 2).join(', ') + (custom.roastersServed.length > 2 ? ` +${custom.roastersServed.length - 2} more` : '');
                    lines.push(`<div class="card-detail-line">☕ ${preview}</div>`);
                }
            }

            // Multiple locations
            if (custom.multipleLocations) {
                lines.push(`<div class="card-detail-line">📍 Multiple Locations: ${custom.multipleLocations}</div>`);
            }

            // Amenities inline
            if (custom.amenities && custom.amenities.length) {
                const a = custom.amenities;
                const amenityBits = [];
                if (a.some(x => x.includes('Dog')))                             amenityBits.push('🐾 Dog Friendly');
                if (a.some(x => x.includes('Wifi') || x.includes('Working')))   amenityBits.push('💻 WiFi');
                if (a.some(x => x.includes('Food') || x.includes('Pastries')))  amenityBits.push('🥐 Food');
                if (a.some(x => x.includes('Beans Online')))                     amenityBits.push('🛒 Online Beans');
                if (a.some(x => x.includes('Decaf')))                            amenityBits.push('☕ Decaf');
                if (a.some(x => x.includes('Seating')))                          amenityBits.push('🪑 Seating');
                if (amenityBits.length) lines.push(`<div class="card-detail-line" style="color:#888;">${amenityBits.join(' · ')}</div>`);
            }

            // Full description
            if (custom.description) {
                lines.push(`<div class="card-detail-line card-description">"${custom.description}"</div>`);
            }

            detailLines = lines.join('');
        }



        return `
        <div class="location-card" data-id="${loc.id}"
             onclick="selectLocationCard('${loc.id}')"
             onmouseenter="highlightMarker('${loc.id}', true)"
             onmouseleave="highlightMarker('${loc.id}', false)">
            ${imgHtml}
            <div class="location-card-body">
                <div class="location-card-name">${info.name}</div>
                <div class="location-card-type ${isRoaster ? 'roaster' : 'cafe'}">${isOnline ? '🌐 Online Roaster' : isRoaster ? '📍 Roaster' : '☕ Multi-Roaster Cafe'}</div>
                ${distHtml}
                ${detailLines}

            </div>
        </div>`;
}

// ── Initials helper (for image fallback) ─────────────────────────────────────
function getCardInitials(name) {
    const clean = name
        .replace(/\s*[-–]\s*.+$/, '')
        .replace(/\s*\(.*?\)\s*$/, '')
        .trim();
    const words = clean.split(/\s+/).filter(w => w.length > 2 || w === w.toUpperCase());
    if (words.length === 0) return name.slice(0, 2).toUpperCase();
    if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
    return (words[0][0] + words[words.length - 1][0]).toUpperCase();
}

// ── Share link helper ──────────────────────────────────────────────────────
function copyShareLink(url, btn) {
    const origText = '🔗 Share Location';
    const copy = () => {
        btn.textContent = '✅ Copied!';
        btn.style.color = '#2e7d32';
        btn.style.borderColor = '#2e7d32';
        setTimeout(() => {
            btn.textContent = origText;
            btn.style.color = '';
            btn.style.borderColor = '';
        }, 2000);
    };
    navigator.clipboard.writeText(url).then(copy).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = url;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copy();
    });
}

function highlightMarker(locationId, on) {
    const marker = markers.find(m => m.locationData?.id === locationId);
    if (!marker) return;
    if (on) {
        marker._origIcon = marker.getIcon();
        marker.setIcon('http://maps.google.com/mapfiles/ms/icons/yellow-dot.png');
        marker.setZIndex(google.maps.Marker.MAX_ZINDEX + 1);
    } else {
        if (marker._origIcon) marker.setIcon(marker._origIcon);
        marker.setZIndex(undefined);
    }
}

function selectLocationCard(locationId) {
    // Highlight card
    document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`.location-card[data-id="${locationId}"]`);
    if (card) {
        card.classList.add('active');
        const panelCards = document.getElementById('locationCards');
        if (panelCards) panelCards.scrollTop = card.offsetTop - panelCards.offsetTop;
    }

    // On mobile: close list panel and show map so the pin is visible
    const panel = document.getElementById('listPanel');
    const toggle = document.getElementById('mobileToggle');
    const floatBtn = document.getElementById('mapFloatNearMe');
    if (panel && panel.classList.contains('mobile-visible') && window.innerWidth <= 768) {
        // Save scroll position before closing
        const cards = document.getElementById('locationCards');
        if (cards) panel.dataset.savedScroll = cards.scrollTop;
        panel.classList.remove('mobile-visible');
        if (toggle) toggle.textContent = '☰ Show List';
        if (floatBtn) floatBtn.classList.remove('hidden');
    }

    // Zoom in and open info window on map
    // Suppress idle-triggered applyFilters during this zoom so the map doesn't flash
    const marker = markers.find(m => m.locationData?.id === locationId);
    if (marker) {
        suppressIdleFilter = true;
        map.setZoom(16);
        map.panTo(marker.getPosition());
        setTimeout(() => {
            showInfoWindow(marker, marker.locationData);
            // Re-enable idle filter once animation has settled
            setTimeout(() => { suppressIdleFilter = false; }, 400);
        }, 300);
    } else {
        // Online-only roasters have no map marker — show info window at map center
        const loc = (window.COFFEE_LOCATIONS || []).find(l => l.id === locationId);
        if (loc) {
            infoWindow.setContent(createInfoWindowContent(loc, sheetDataByLocation[loc.id] || {}));
            infoWindow.setPosition(map.getCenter());
            infoWindow.open(map);
        }
    }
}

// ── Distance sorting when "find my location" is used ──────────────────────
let userLatLng = null;
let currentSort = 'az';

function setSort(mode) {
    if (mode === 'nearest' && !userLatLng) {
        // Show hint briefly on mobile (no hover)
        const hint = document.getElementById('locationHint');
        if (hint) {
            hint.style.display = 'block';
            hint.textContent = '📍 Getting your location…';
        }
        // Trigger geolocation — reuse the existing showUserLocation logic
        showUserLocation();
        return; // showUserLocation will call applyFilters once location is found
    }
    currentSort = mode;
    document.getElementById('sortNearest').classList.toggle('active', mode === 'nearest');
    document.getElementById('sortAZ').classList.toggle('active', mode === 'az');
    applyFilters();
}

function getDistanceKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

document.addEventListener('DOMContentLoaded', () => {
    const toggle = document.getElementById('mobileToggle');
    const panel = document.getElementById('listPanel');
    const floatBtn = document.getElementById('mapFloatNearMe');

    if (toggle && panel) {
        toggle.addEventListener('click', () => {
            const isVisible = panel.classList.toggle('mobile-visible');
            toggle.textContent = isVisible ? '🗺️ Show Map' : '☰ Show List';
            if (floatBtn) floatBtn.classList.toggle('hidden', isVisible);

            // Restore saved scroll position when re-opening list
            if (isVisible) {
                const savedScroll = parseInt(panel.dataset.savedScroll || '0', 10);
                const cards = document.getElementById('locationCards');
                if (cards) requestAnimationFrame(() => { cards.scrollTop = savedScroll; });
            }
        });
    }

    if (floatBtn) {
        floatBtn.addEventListener('click', showUserLocation);
    }

    // Hamburger menu toggle
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileNavMenu = document.getElementById('mobileNavMenu');
    if (hamburgerBtn && mobileNavMenu) {
        hamburgerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = mobileNavMenu.classList.toggle('open');
            hamburgerBtn.textContent = isOpen ? '✕' : '☰';
        });
        document.addEventListener('click', (e) => {
            // Don't close if the click was on the hamburger button itself
            if (e.target === hamburgerBtn || hamburgerBtn.contains(e.target)) return;
            if (mobileNavMenu.classList.contains('open')) {
                mobileNavMenu.classList.remove('open');
                hamburgerBtn.textContent = '☰';
            }
        });
    }

    // Active filter dot — show when any filter is non-default
    function updateFilterDot() {
        const filterBtn = document.getElementById('toggleFilters');
        if (!filterBtn) return;
        const roasters = document.getElementById('filterRoasters');
        const cafes = document.getElementById('filterCafes');
        const online = document.getElementById('filterOnlineOnly');
        const openNow = openNowActive;
        const neighbourhood = document.getElementById('filterNeighborhood');
        const anyNonDefault = (roasters && !roasters.checked) ||
                              (cafes && !cafes.checked) ||
                              (online && !online.checked) ||
                              (neighbourhood && neighbourhood.value !== '') ||
                              openNow;
        filterBtn.classList.toggle('filters-active', anyNonDefault);
    }

    // Attach dot-updater to all filter inputs
    ['filterRoasters','filterCafes','filterOnlineOnly','filterNeighborhood'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', updateFilterDot);
    });
    document.getElementById('openNowBtn')?.addEventListener('click', () => setTimeout(updateFilterDot, 50));
    document.getElementById('clearBtn')?.addEventListener('click', () => setTimeout(updateFilterDot, 50));

    // Location hint on sort nearest button (shown until location is granted)
    const sortNearestBtn = document.getElementById('sortNearest');
    const locationHint = document.getElementById('locationHint');
    if (sortNearestBtn && locationHint) {
        sortNearestBtn.addEventListener('mouseenter', () => {
            if (!userLatLng) locationHint.style.display = 'block';
        });
        sortNearestBtn.addEventListener('mouseleave', () => {
            locationHint.style.display = 'none';
        });
    }
});

window.gm_authFailure = function() {
    document.getElementById('loading').innerHTML = '<div style="color: red; padding: 2rem;"><h3>⚠️ Map Loading Error</h3></div>';
};

// ── Open Now Filter ─────────────────────────────────────────────────────────
let openNowActive = false;
let pendingScrollTop = false; // set by clear to scroll cards to top after render
let suppressIdleFilter = false; // prevents idle re-render during card selection zoom
let neighborhoodZoomPending = false; // one-shot flag: zoom on select, not on every idle

function parseTimeToMinutes(timeStr) {
    const match = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
    if (!match) return null;
    let hours = parseInt(match[1]);
    const mins = parseInt(match[2]);
    const period = match[3].toUpperCase();
    if (period === 'AM' && hours === 12) hours = 0;
    if (period === 'PM' && hours !== 12) hours += 12;
    return hours * 60 + mins;
}

function isLocationOpenNow(location) {
    const weekdayDescriptions = location.hours && location.hours.weekdayDescriptions;
    if (!weekdayDescriptions || weekdayDescriptions.length === 0) return false;

    const now = new Date();
    const jsDay = now.getDay();
    const monIdx = jsDay === 0 ? 6 : jsDay - 1;
    const todayEntry = weekdayDescriptions[monIdx];
    if (!todayEntry) return false;

    const hoursStr = todayEntry.replace(/^[^:]+:\s*/, '').trim();
    if (hoursStr.toLowerCase() === 'closed') return false;
    if (hoursStr.toLowerCase() === 'open 24 hours') return true;

    const currentMins = now.getHours() * 60 + now.getMinutes();
    const ranges = hoursStr.split(',').map(function(s) { return s.trim(); });

    for (let r = 0; r < ranges.length; r++) {
        const parts = ranges[r].split(/\s*[\u2013\-]\s*/);
        if (parts.length !== 2) continue;

        let openStr = parts[0].trim();
        let closeStr = parts[1].trim();

        if (!/AM|PM/i.test(openStr) && /AM|PM/i.test(closeStr)) {
            const m = closeStr.match(/(AM|PM)/i);
            if (m) openStr += ' ' + m[1];
        }

        const openMins = parseTimeToMinutes(openStr);
        let closeMins = parseTimeToMinutes(closeStr);
        if (openMins === null || closeMins === null) continue;

        if (closeMins === 0) closeMins = 24 * 60;

        if (closeMins < openMins) {
            if (currentMins >= openMins || currentMins < closeMins) return true;
        } else {
            if (currentMins >= openMins && currentMins < closeMins) return true;
        }
    }
    return false;
}

// Count how many physical locations (markers) have hours data entered
function countLocationsWithHours() {
    return allLocations.filter(loc => {
        if (loc.basicInfo?.onlineOnly) return false;
        return loc.hours?.weekdayDescriptions?.length > 0;
    }).length;
}

document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('openNowBtn');
    if (!btn) return;
    btn.addEventListener('click', function() {
        openNowActive = !openNowActive;
        btn.style.background = openNowActive ? '#2e7d32' : '';
        btn.style.color = openNowActive ? 'white' : '';
        btn.style.borderColor = openNowActive ? '#2e7d32' : '';
        btn.textContent = '🕐 Open Now';

        // Show coverage hint tooltip briefly when activating
        if (openNowActive) {
            const total = markers.length;
            const withHours = countLocationsWithHours();
            const noHours = total - withHours;
            if (noHours > 0) {
                // Remove any existing hint
                const existing = document.getElementById('openNowHint');
                if (existing) existing.remove();
                const hint = document.createElement('div');
                hint.id = 'openNowHint';
                // Position above the button using body-level fixed positioning
                // so it is never clipped by panel overflow:hidden
                const rect = btn.getBoundingClientRect();
                // Estimate tooltip width to clamp it within the viewport
                const approxWidth = 220;
                const margin = 8;
                let leftPos = rect.left + rect.width / 2 - approxWidth / 2;
                // Clamp so tooltip never goes off either edge
                leftPos = Math.max(margin, Math.min(leftPos, window.innerWidth - approxWidth - margin));
                hint.style.cssText = `
                    position: fixed;
                    bottom: ${window.innerHeight - rect.top + 6}px;
                    left: ${leftPos}px;
                    background: #333;
                    color: #fff;
                    font-size: 0.68rem;
                    padding: 0.35rem 0.7rem;
                    border-radius: 4px;
                    white-space: nowrap;
                    z-index: 99999;
                    pointer-events: none;
                    font-family: 'Libre Franklin', sans-serif;
                    font-weight: 500;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
                `;
                hint.textContent = `Hours data for ${withHours} of ${total} locations`;
                document.body.appendChild(hint);
                setTimeout(() => { hint.remove(); }, 3000);
            }
        }

        applyFilters();
    });
});
