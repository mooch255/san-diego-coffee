    <style>
        :root {
            --espresso: #3D2817;
            --coffee-brown: #6B4E3D;
            --cream: #F8F5F0;
            --white: #FFFFFF;
            --latte: #C4A77D;
            --accent-red: #B85C38;
            --warm-brown: #5C4033;
            --light-tan: #E8DED2;
            --green: #2D6A4F;
            --green-light: #EAF4EE;
            --roaster-color: #0F9D58;
            --cafe-color: #0288D1;
            --text-secondary: #6B5E52;
            --border-subtle: #E8DED2;
            --section-pad: 5rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Libre Franklin', sans-serif;
            color: var(--espresso);
            background: var(--cream);
            line-height: 1.6;
        }

        /* ── Header ─────────────────────────────────────────────────────── */
        header {
            background: #2A1508;
            color: var(--white);
            border-bottom: 1px solid rgba(196,167,125,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.85rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .header-brand-eyebrow {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(196,167,125,0.6);
            margin-bottom: 0.5rem;
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 2.4vw, 2rem);
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1;
            color: #EDE0CC;
            text-decoration: none;
            display: block;
        }

        .header-logo em {
            font-style: italic;
            color: #C9A97E;
            font-weight: 400;
        }

        .header-logo strong {
            font-family: 'Playfair Display', serif;
            font-style: normal;
            font-weight: 800;
            color: #EDE0CC;
            letter-spacing: -0.01em;
        }

        .header-subtitle {
            font-size: 0.6rem;
            color: rgba(196,167,125,0.55);
            margin-top: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        /* ── Hamburger Nav ───────────────────────────────────────────── */
        .nav-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(196,167,125,0.08);
            border: 1px solid rgba(196,167,125,0.4);
            color: rgba(196,167,125,0.9);
            padding: 0.7rem 1.3rem;
            cursor: pointer;
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-radius: 0;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-toggle-icon { font-size: 1.35rem; line-height: 1; }

        .nav-toggle:hover, .nav-toggle.open {
            border-color: var(--latte);
            color: var(--latte);
            background: rgba(196,167,125,0.13);
        }

        /* ── Nav Backdrop ────────────────────────────────────────────── */
        .nav-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(20, 10, 4, 0.55);
            z-index: 9998;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.32s ease, visibility 0s linear 0.32s;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .nav-backdrop.open {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.32s ease, visibility 0s linear 0s;
        }

        /* ── Nav Drawer ──────────────────────────────────────────────── */
        .nav-dropdown {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 82%;
            max-width: 300px;
            background: linear-gradient(160deg, #241308 0%, #1A0D06 100%);
            border-left: 1px solid rgba(196,167,125,0.18);
            z-index: 9999;
            transform: translateX(100%);
            visibility: hidden;
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                        visibility 0s linear 0.32s;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: -8px 0 40px rgba(0,0,0,0.5);
        }

        .nav-dropdown.open {
            transform: translateX(0);
            visibility: visible;
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                        visibility 0s linear 0s;
        }

        .nav-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.5rem 1rem;
            border-bottom: 1px solid rgba(196,167,125,0.12);
            border-top: 3px solid var(--accent-red);
            flex-shrink: 0;
        }

        .nav-drawer-label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(196,167,125,0.45);
        }

        .nav-drawer-close {
            background: none;
            border: 1px solid rgba(196,167,125,0.28);
            color: rgba(196,167,125,0.75);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0.35rem 0.65rem;
            transition: all 0.18s;
            font-family: inherit;
        }

        .nav-drawer-close:hover {
            border-color: var(--latte);
            color: var(--latte);
            background: rgba(196,167,125,0.08);
        }

        .nav-dropdown a {
            display: block;
            padding: 1.05rem 1.5rem;
            color: rgba(196,167,125,0.72);
            text-decoration: none;
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            border-bottom: 1px solid rgba(196,167,125,0.08);
            transition: background 0.15s, color 0.15s, padding-left 0.15s;
        }

        .nav-dropdown > a:last-child { border-bottom: none; }

        .nav-dropdown a:hover {
            background: rgba(196,167,125,0.07);
            color: var(--latte);
            padding-left: 1.85rem;
        }

        .nav-dropdown a.active {
            color: var(--latte);
            border-left: 3px solid var(--accent-red);
            padding-left: calc(1.5rem - 3px);
        }

        .nav-dropdown > a:last-of-type { border-bottom: none; }

        /* ── Nav Social Footer ───────────────────────────────────────── */
        .nav-social {
            margin-top: auto;
            padding: 1.2rem 1.5rem 1.5rem;
            border-top: 1px solid rgba(196,167,125,0.2);
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            flex-shrink: 0;
            background: rgba(0,0,0,0.15);
        }
        .nav-social-label {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(196,167,125,0.75);
        }
        .nav-social-icons { display: flex; gap: 0.65rem; }
        .nav-social .nav-social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2.6rem;
            height: 2.6rem;
            padding: 0;
            border: 1px solid rgba(196,167,125,0.2);
            transition: transform 0.18s, border-color 0.18s, background 0.18s;
            text-decoration: none;
        }
        .nav-social .nav-social-icon.reddit { color: #FF4500; }
        .nav-social .nav-social-icon.instagram { color: #E1306C; }
        .nav-social .nav-social-icon:hover {
            transform: scale(1.08);
            border-color: rgba(196,167,125,0.45);
            background: rgba(196,167,125,0.08);
            padding-left: 0;
        }

        /* ── Loading / Error states ─────────────────────────────────────── */
        .state-container {
            max-width: 700px;
            margin: 6rem auto;
            text-align: center;
            padding: 0 2rem;
        }

        .state-container h2 {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--espresso);
        }

        .state-container p { color: var(--coffee-brown); margin-bottom: 2rem; }

        .btn-back {
            display: inline-block;
            background: var(--coffee-brown);
            color: white;
            padding: 0.75rem 1.75rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 3px;
        }

        /* ── Hero ───────────────────────────────────────────────────────── */
        .hero {
            background: linear-gradient(135deg, var(--espresso) 0%, var(--warm-brown) 100%);
            padding: 1.5rem 2rem 0;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 40px,
                rgba(255,255,255,0.015) 40px,
                rgba(255,255,255,0.015) 41px
            );
        }

        .hero-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--latte);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: white; }

        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.85rem;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.85rem;
        }

        .type-badge.roaster {
            background: rgba(15, 157, 88, 0.2);
            color: #6FCF97;
            border: 1px solid rgba(15, 157, 88, 0.3);
        }

        .type-badge.cafe {
            background: rgba(2, 136, 209, 0.2);
            color: #7EC8E3;
            border: 1px solid rgba(2, 136, 209, 0.3);
        }

        .hero h1 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 600;
            color: var(--white);
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 0.6rem;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            padding-bottom: 1.25rem;
        }

        .rating-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            width: 16px;
            height: 16px;
            fill: #FFA000;
        }

        .star.half { fill: url(#halfGrad); }
        .star.empty { fill: rgba(255,255,255,0.2); }

        .rating-num {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
        }

        .rating-count {
            font-size: 0.85rem;
            color: var(--latte);
        }

        .rating-link {
            font-size: 0.78rem;
            color: var(--latte);
            text-decoration: underline;
            transition: color 0.2s;
        }

        .rating-link:hover { color: white; }

        .hero-address {
            color: var(--latte);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* ── Photo Gallery ──────────────────────────────────────────────── */
        .gallery-section {
            background: var(--espresso);
            border-bottom: 3px solid var(--accent-red);
        }

        /* 2-photo: side by side at fixed height */
        .gallery-track {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            height: 300px;
        }

        /* 3-photo: hero left (wider) + two stacked right */
        .gallery-track-3 {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 3px;
            height: 300px;
        }

        .gallery-photo {
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .gallery-photo--hero {
            grid-row: 1 / 3; /* spans both rows */
        }

        .gallery-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 25%;
            transition: transform 0.4s ease;
            display: block;
        }

        .gallery-photo:hover img { transform: scale(1.04); }

        /* "Tap to expand" hint on hover */
        .gallery-photo::after {
            content: '⛶';
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: rgba(0,0,0,0.45);
            color: #fff;
            font-size: 0.85rem;
            padding: 0.2rem 0.45rem;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(3px);
            pointer-events: none;
        }

        .gallery-photo:hover::after { opacity: 1; }

        .gallery-placeholder {
            background: linear-gradient(135deg, var(--warm-brown) 0%, var(--espresso) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            height: 140px;
            color: var(--latte);
        }

        .gallery-placeholder-initials {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: rgba(196, 167, 125, 0.9);
            letter-spacing: 0.08em;
            line-height: 1;
        }
        .gallery-placeholder .placeholder-icon {
            font-size: 4rem;
            opacity: 0.4;
        }

        .gallery-placeholder p {
            font-size: 0.85rem;
            opacity: 0.5;
            font-style: italic;
        }

        .gallery-hero {
            position: relative;
            width: 100%;
            height: 320px;
            overflow: hidden;
            cursor: pointer;
        }

        .gallery-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 25%;
            transition: transform 0.4s ease;
            display: block;
        }

        .gallery-hero:hover img { transform: scale(1.04); }

        .gallery-hero::after {
            content: '⛶';
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: rgba(0,0,0,0.45);
            color: #fff;
            font-size: 0.85rem;
            padding: 0.2rem 0.45rem;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(3px);
            pointer-events: none;
        }

        .gallery-hero:hover::after { opacity: 1; }

        .gallery-maps-link {
            position: absolute;
            bottom: 0.75rem;
            right: 0.75rem;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 0.78rem;
            padding: 0.35rem 0.7rem;
            border-radius: 4px;
            text-decoration: none;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }

        .gallery-maps-link:hover {
            background: rgba(0,0,0,0.8);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.open { display: flex; }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            user-select: none;
        }

        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .lightbox-close:hover { opacity: 1; }

        .lightbox-prev,
        .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 0.75rem 1.1rem;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s, background 0.2s;
            border-radius: 4px;
            user-select: none;
        }

        .lightbox-prev { left: 1.25rem; }
        .lightbox-next { right: 1.25rem; }
        .lightbox-prev:hover,
        .lightbox-next:hover { opacity: 1; background: rgba(255,255,255,0.2); }
        .lightbox-prev[hidden],
        .lightbox-next[hidden] { display: none; }

        .lightbox-counter {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            font-family: 'Libre Franklin', sans-serif;
            letter-spacing: 0.05em;
        }

        /* ── Main Content ───────────────────────────────────────────────── */
        .content-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 2rem;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 2.5rem;
            align-items: start;
        }
        .content-wrap.has-ig-review {
            grid-template-columns: 1fr 520px;
        }

        /* ── Left Column ────────────────────────────────────────────────── */

        /* Hours */
        .section {
            margin-bottom: 1.75rem;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent-red);
            margin-bottom: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--light-tan);
        }

        .hours-grid {
            display: grid;
            gap: 0;
        }

        .hours-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.85rem;
            border-bottom: 1px solid var(--light-tan);
            font-size: 0.88rem;
            transition: background 0.15s;
        }

        .hours-row:first-child { border-top: 1px solid var(--light-tan); }

        .hours-row.today {
            background: var(--cream);
            border-left: 3px solid var(--accent-red);
            font-weight: 600;
        }

        .hours-row .day { color: var(--coffee-brown); }
        .hours-row.today .day { color: var(--espresso); }

        .hours-row .time { color: var(--espresso); font-variant-numeric: tabular-nums; }

        .today-tag {
            background: var(--accent-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.15rem 0.4rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 2px;
            margin-left: 0.5rem;
        }

        .open-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .open-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .open-status.open .dot { background: #0F9D58; }
        .open-status.open { color: #0F9D58; }
        .open-status.closed .dot { background: #E53935; }
        .open-status.closed { color: #E53935; }

        /* Contact */
        .contact-grid {
            display: grid;
            gap: 0.75rem;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--white);
            border: 1px solid var(--light-tan);
            border-left: 3px solid transparent;
            transition: border-left-color 0.2s;
        }

        .contact-item:hover { border-left-color: var(--accent-red); }

        .contact-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

        .contact-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--coffee-brown);
            margin-bottom: 0.15rem;
        }

        .contact-value {
            font-size: 0.9rem;
            color: var(--espresso);
            word-break: break-all;
        }

        .contact-value a {
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-value a:hover { text-decoration: underline; }

        .shop-link-section {
            background: #fff8f0;
            border: 1px solid #e8d5c0;
            border-left: 3px solid var(--accent-red);
            border-radius: 6px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .shop-link-text { flex: 1; min-width: 0; }

        .shop-link-eyebrow {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-red);
            margin-bottom: 0.3rem;
        }

        .shop-link-offer {
            font-family: 'Lora', serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--espresso);
            line-height: 1.3;
            margin-bottom: 0.4rem;
        }

        .promo-code-badge {
            display: inline-block;
            background: var(--white);
            border: 1px dashed #c4a77d;
            border-radius: 3px;
            padding: 0.15rem 0.5rem;
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--coffee-brown);
            letter-spacing: 0.05em;
        }

        .shop-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--accent-red);
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.6rem 1.1rem;
            border-radius: 3px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s;
        }

        .shop-link-btn:hover {
            background: #a04e30;
            transform: translateY(-1px);
        }

        /* Description */
        .description-text {
            font-family: 'Lora', serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--coffee-brown);
            font-style: italic;
            padding: 1.25rem 1.5rem;
            background: var(--white);
            border-left: 3px solid var(--accent-red);
        }

        /* ── Highlight Callout ───────────────────────────────────────────── */
        .highlight-callout {
            background: #fff8f0;
            border: 1px solid #e8d5c0;
            border-left: 3px solid var(--accent-red);
            border-radius: 6px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.25rem;
        }
        .highlight-callout-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent-red);
            margin-bottom: 0.35rem;
        }
        .highlight-callout-text {
            font-size: 0.9rem;
            color: var(--coffee-brown);
            line-height: 1.5;
            margin-bottom: 0.6rem;
        }
        .highlight-callout-link {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-red);
            text-decoration: none;
        }
        .highlight-callout-link:hover { text-decoration: underline; }

        /* ── Bean Review Callout ─────────────────────────────────────────── */
        .review-callout {
            background: #f6f0ff;
            border: 1px solid #d5c8f0;
            border-left: 3px solid #ff4500;
            border-radius: 6px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.25rem;
        }
        .review-callout-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #cc3700;
            margin-bottom: 0.35rem;
        }
        .review-callout-text {
            font-size: 0.9rem;
            color: var(--coffee-brown);
            line-height: 1.5;
            margin-bottom: 0.6rem;
        }
        .review-callout-link {
            font-size: 0.85rem;
            font-weight: 600;
            color: #ff4500;
            text-decoration: none;
        }
        .review-callout-link:hover { text-decoration: underline; }

        /* ── SDCoffeeGuide Review Embed ──────────────────────────────────── */
        .ig-review-mobile  { display: none; }
        .ig-review-desktop { display: block; }

        @media (max-width: 900px) {
            .ig-review-mobile  { display: block; }
            .ig-review-desktop { display: none; }
        }

        .ig-review-wrap {
            margin-bottom: 1.5rem;
        }
        .ig-review-label {
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #E8720C;
            margin-bottom: 0.65rem;
        }

        /* ── Right Column — Coffee Details Card ─────────────────────────── */
        .details-card {
            background: var(--white);
            border: 1px solid var(--light-tan);
            border-top: 3px solid var(--accent-red);
        }

        .suggest-edit-btn {
            display: block;
            margin-top: 0.75rem;
            margin-bottom: 2rem;
            padding: 0.7rem 1rem;
            background: transparent;
            border: 2px solid var(--light-tan);
            color: var(--coffee-brown);
            text-align: center;
            text-decoration: none;
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: all 0.2s;
        }
        .suggest-edit-btn:hover {
            border-color: var(--coffee-brown);
            background: var(--cream);
        }

        .details-card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--light-tan);
            background: var(--cream);
        }

        .details-card-header h2 {
            font-family: 'Lora', serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--espresso);
        }

        .details-card-header p {
            font-size: 0.78rem;
            color: #999;
            margin-top: 0.2rem;
        }

        .detail-rows { padding: 0.5rem 0; }

        .detail-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--light-tan);
        }

        .detail-row:last-child { border-bottom: none; }

        .detail-key {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--coffee-brown);
            flex-shrink: 0;
            padding-top: 1px;
        }

        .detail-val {
            font-size: 0.88rem;
            color: var(--espresso);
            text-align: right;
            line-height: 1.4;
        }

        .detail-val.unknown { color: #bbb; font-style: italic; }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            justify-content: flex-end;
        }

        .tag {
            background: var(--cream);
            border: 1px solid var(--light-tan);
            color: var(--coffee-brown);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.55rem;
            border-radius: 2px;
        }

        .sibling-links {
            justify-content: flex-end;
        }

        @media (max-width: 768px) {
            .header-brand-eyebrow { display: none; }
            .header-logo { font-size: 1.2rem; }
            .header-subtitle { font-size: 0.6rem; color: rgba(196,167,125,0.85); margin-top: 0.35rem; }
            .detail-row:has(.sibling-links) {
                flex-direction: column;
                gap: 0.5rem;
            }

            .sibling-links {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                width: 100%;
            }
        }

        .sibling-link {
            display: inline-block;
            background: var(--cream);
            border: 1px solid var(--light-tan);
            color: var(--coffee-brown);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.55rem;
            border-radius: 2px;
            text-decoration: none;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
            white-space: normal;
            word-break: break-word;
        }
        .sibling-link:hover {
            border-color: var(--latte);
            color: var(--espresso);
            background: var(--white);
        }

        .bool-yes {
            color: var(--green);
            font-weight: 700;
        }

        .bool-no { color: #bbb; }

        /* ── Map Embed ──────────────────────────────────────────────────── */
        .map-section {
            background: var(--white);
            border-top: 2px solid var(--light-tan);
        }

        .map-section-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .map-section h2 {
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: var(--espresso);
        }

        .map-embed {
            width: 100%;
            height: 340px;
            border: none;
            border-top: 3px solid var(--accent-red);
        }

        /* ── Action Buttons ─────────────────────────────────────────────── */
        .action-strip {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem 3rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 1.75rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 3px;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }

        .action-btn.primary {
            background: var(--accent-red);
            color: white;
        }

        .action-btn.primary:hover { background: #a04e30; transform: translateY(-1px); }

        .action-btn.secondary {
            background: var(--white);
            color: var(--coffee-brown);
            border: 2px solid var(--coffee-brown);
        }

        .action-btn.secondary:hover { background: var(--cream); }

        /* ── Footer ─────────────────────────────────────────────────────── */
        footer {
            background: var(--espresso);
            color: var(--latte);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            padding: 2rem;
            font-size: 0.85rem;
            border-top: 3px solid var(--accent-red);
        }

        footer a { color: var(--latte); }
        footer a:hover { color: white; }
        .footer-row { display: flex; align-items: center; flex-wrap: wrap; justify-content: center; }

        /* Right column — sits in natural layout position, does not follow scroll */
        .right-col {
            position: static;
        }


        /* ── Responsive ─────────────────────────────────────────────────── */
        @media (max-width: 900px) {
            .content-wrap,
            .content-wrap.has-ig-review {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .details-card { position: static; }

        }

        @media (max-width: 600px) {
            .hero { padding: 1rem 1.25rem 0; }
            .content-wrap { padding: 1.5rem 1.25rem; }
            .action-strip { padding: 0 1.25rem 2rem; flex-direction: column; }
            .action-btn { justify-content: center; }
            .header-content { padding: 0.65rem 1rem; }
        }

        /* Animate in */
        .fade-up {
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up:nth-child(1) { animation-delay: 0.05s; }
        .fade-up:nth-child(2) { animation-delay: 0.1s; }
        .fade-up:nth-child(3) { animation-delay: 0.15s; }
        .fade-up:nth-child(4) { animation-delay: 0.2s; }

        /* ── Community Likes ────────────────────────────────────────────── */
        .like-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .like-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.6rem 1.25rem;
            background: transparent;
            border: 2px solid var(--light-tan);
            color: var(--coffee-brown);
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 0;
            line-height: 1;
        }

        .like-btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
            background: rgba(184, 92, 56, 0.04);
        }

        .like-btn.liked {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
        }

        .like-btn:disabled { opacity: 0.6; cursor: default; }

        .like-count-text {
            font-size: 0.82rem;
            color: #aaa;
            font-style: italic;
        }

        /* ── Community Reviews ──────────────────────────────────────────── */
        .review-item {
            padding: 1rem 1.25rem;
            background: var(--white);
            border: 1px solid var(--light-tan);
            border-left: 3px solid var(--latte);
            margin-bottom: 0.75rem;
        }

        .review-text {
            font-family: 'Lora', serif;
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--coffee-brown);
            font-style: italic;
            margin-bottom: 0.35rem;
        }

        .review-meta {
            font-size: 0.72rem;
            color: #aaa;
            font-family: 'Libre Franklin', sans-serif;
        }

        .review-textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--light-tan);
            background: var(--white);
            font-family: 'Lora', serif;
            font-size: 0.95rem;
            color: var(--espresso);
            resize: vertical;
            min-height: 90px;
            outline: none;
            transition: border-color 0.2s;
            display: block;
            box-sizing: border-box;
        }

        .review-textarea:focus { border-color: var(--accent-red); }

        .review-submit-btn {
            margin-top: 0.5rem;
            padding: 0.65rem 1.5rem;
            background: var(--coffee-brown);
            color: white;
            border: 2px solid var(--coffee-brown);
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .review-submit-btn:hover { background: var(--accent-red); border-color: var(--accent-red); }
        .review-submit-btn:disabled { opacity: 0.6; cursor: default; }

        .review-form-msg {
            font-size: 0.82rem;
            color: var(--green);
            margin-top: 0.5rem;
            font-style: italic;
        }

        .review-form-err {
            font-size: 0.82rem;
            color: var(--accent-red);
            margin-top: 0.5rem;
            font-style: italic;
        }

        .review-form { margin-top: 1rem; }

        /* ── Featured Media Section ─────────────────────── */
        .media-feature-section {
            margin-bottom: 1.75rem;
        }
        .yt-embed-wrap {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #1a1a1a;
        }
        .yt-embed-wrap.has-ig {
            margin-bottom: 1.5rem;
        }
        .yt-embed-wrap iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
        }
        .ig-about-wrap {
            display: flex;
            justify-content: center;
        }
        /* ── Explore Nearby ─────────────────────────────── */
        .nearby-section {
            max-width: 900px;
            margin: 0 auto 2.5rem;
            padding: 0 1.5rem;
        }
        .nearby-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 1rem;
            border-top: 1px solid var(--light-tan);
            padding-top: 1.5rem;
        }
        .nearby-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--espresso);
        }
        .nearby-see-all {
            font-size: 0.82rem;
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 600;
        }
        .nearby-see-all:hover { text-decoration: underline; }
        .nearby-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .nearby-card {
            display: flex;
            flex-direction: column;
            background: var(--white);
            border: 1px solid var(--light-tan);
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: var(--espresso);
            transition: box-shadow 0.15s, transform 0.15s;
        }
        .nearby-card:hover { box-shadow: 0 4px 12px rgba(61,40,23,0.1); transform: translateY(-2px); }
        .nearby-img {
            width: 100%;
            aspect-ratio: 4/3;
            overflow: hidden;
            background: var(--light-tan);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nearby-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .nearby-initials {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--coffee-brown);
            opacity: 0.5;
        }
        .nearby-info { padding: 0.75rem; }
        .nearby-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--espresso);
            margin-bottom: 0.35rem;
            line-height: 1.3;
        }
        .nearby-meta { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
        .nearby-type {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .nearby-type.roaster { background: #E8F5E9; color: var(--roaster-color); }
        .nearby-type.cafe    { background: #E3F2FD; color: var(--cafe-color); }
        .nearby-hood { font-size: 0.75rem; color: var(--coffee-brown); opacity: 0.8; }
        @media (max-width: 600px) {
            .nearby-grid { grid-template-columns: repeat(2, 1fr); }
            .nearby-section { padding: 0 1rem; }
        }
    </style>
</head>

        // Nav drawer
        (function() {

        const API_KEY = 'AIzaSyDFVEZE3Q0NBXY15rL6muwB8nNATPftOmI';
        const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

        function slugify(name) {
            return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        }

        function locationSlug(loc) {
            const base = slugify(loc.basicInfo.name);
            const allLocs = window.COFFEE_LOCATIONS || [];
            const nameDupes = allLocs.filter(l => slugify(l.basicInfo.name) === base);
            if (nameDupes.length <= 1) return base;
            const hood = (loc.coffeeDetails && loc.coffeeDetails.neighborhood) || '';
            if (!hood) return `${base}-${loc.id}`;
            const hoodSlug = slugify(hood);
            const withHood = `${base}-${hoodSlug}`;
            // Check if same name + same neighborhood still collides
            const hoodDupes = nameDupes.filter(l => slugify((l.coffeeDetails && l.coffeeDetails.neighborhood) || '') === hoodSlug);
            if (hoodDupes.length <= 1) return withHood;
            // Append street name to break the tie
            const fullAddr = (loc.basicInfo && loc.basicInfo.address && loc.basicInfo.address.fullAddress) || '';
            if (fullAddr) {
                const streetName = fullAddr.split(',')[0].replace(/^\d+\s+/, '').trim();
                const streetS = slugify(streetName);
                if (streetS) return `${withHood}-${streetS}`;
            }
            return `${withHood}-${loc.id}`;
        }

        // ── Get location from URL ──────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        // Support both clean URLs (/locations/slug-or-id) and query string (?id=loc_123)
        const pathMatch = window.location.pathname.match(/\/locations\/([^\/]+)$/);
        const pathSegment = pathMatch && pathMatch[1];
        const locationId = params.get('id') || pathSegment;
        const fromParam = params.get('from');
        const highlightId = params.get('highlightId');
        const fromLocationId = params.get('locationId');
        const guideId = params.get('guideId');

        let backHref, backLabel, useHistoryBack = false;
        if (fromParam === 'home') {
            backHref  = '/index.html';
            backLabel = '← Back to Homepage';
        } else if (fromParam === 'highlight' && highlightId) {
            backHref  = `/highlight.html?id=${highlightId}`;
            backLabel = '← Back to Roaster Highlight';
        } else if (fromParam === 'location' && fromLocationId) {
            const fromLoc = (window.COFFEE_LOCATIONS || []).find(l => l.id === fromLocationId);
            backHref  = `location.html?id=${fromLocationId}`;
            backLabel = `← Back to ${fromLoc ? fromLoc.basicInfo.name : 'Location'}`;
        } else if (fromParam === 'guide' && guideId) {
            const guideMap = window.GUIDE_MAP || {};
            const guide = guideMap[guideId];
            backHref  = `/guide.html?id=${guideId}`;
            backLabel = `← Back to ${guide ? guide.neighborhood + ' Guide' : 'Guide'}`;
        } else {
            backHref  = `/map.html${locationId ? `?location=${locationId}` : ''}`;
            backLabel = '← Back to Map';
            useHistoryBack = false;
        }

        if (!locationId) {
            showError('No location specified.', 'Head back to the map to find a location.');
        } else {
            // Support loc_xxx IDs (query string or legacy) and name slugs (/locations/roaster-name)
            const location = (window.COFFEE_LOCATIONS || []).find(l =>
                l.id === locationId ||
                slugify(l.basicInfo.name) === locationId ||
                locationSlug(l) === locationId
            );
            // Redirect legacy loc_xxx URLs to canonical slug URL
            if (location && locationId.startsWith('loc_')) {
                window.history.replaceState(null, '', `/locations/${locationSlug(location)}`);
            }

            // Ensure back-to-map link always uses loc_XXX id — map.html's ?location= handler
            // matches by id only, and locationId may be a slug when arriving via /locations/slug
            if (location && backHref.startsWith('/map.html')) {
                backHref = `/map.html?location=${location.id}`;
            }

            if (!location) {
                showError('Location not found.', 'This location may have been removed or the link is incorrect.');
            } else {
                // ── Page title & meta ──────────────────────────────────────────────
                const locType   = location.basicInfo.type;
                const hood      = location.coffeeDetails?.neighborhood || location.basicInfo.address?.city || '';
                const typeLabel = locType === 'roaster' ? 'Coffee Roaster' : 'Coffee Shop';
                const hoodSuffix = hood ? ` in ${hood}, San Diego` : ' in San Diego';
                const pageTitle = `${location.basicInfo.name} — ${typeLabel}${hoodSuffix}`;

                function buildMetaDesc(loc) {
                    const cd = loc.coffeeDetails || {};
                    if (cd.description) return cd.description.slice(0, 160);
                    const n = loc.basicInfo.name;
                    const h = cd.neighborhood || loc.basicInfo.address?.city || '';
                    const locationStr = h && h !== 'San Diego' ? `in ${h}, San Diego` : 'in San Diego';
                    if (loc.basicInfo.type === 'roaster') {
                        const parts = [`${n} is a specialty coffee roaster ${locationStr}.`];
                        if (cd.roastScale) parts.push(`Known for ${cd.roastScale.toLowerCase()} roasts.`);
                        if (cd.roastStyle) parts.push(cd.roastStyle + '.');
                        return parts.join(' ').slice(0, 160);
                    }
                    const parts = [`${n} is a specialty coffee shop ${locationStr}.`];
                    if (cd.roastersServed?.length) parts.push(`Serving ${cd.roastersServed.slice(0, 2).join(' and ')}.`);
                    if (cd.brewingOptions?.length) parts.push(`Brewing: ${cd.brewingOptions.slice(0, 3).join(', ')}.`);
                    return parts.join(' ').slice(0, 160);
                }
                const metaDescription = buildMetaDesc(location);

                document.title = pageTitle;
                const ogTitle = document.querySelector('meta[property="og:title"]');
                if (ogTitle) ogTitle.content = pageTitle;
                // Set canonical to clean URL
                let canonical = document.querySelector('link[rel="canonical"]');
                if (!canonical) { canonical = document.createElement('link'); canonical.rel = 'canonical'; document.head.appendChild(canonical); }
                canonical.href = `https://sandiegocoffee.co/locations/${locationSlug(location)}`;
                const ogDesc = document.querySelector('meta[property="og:description"]');
                if (ogDesc) ogDesc.content = metaDescription;
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) metaDesc.content = metaDescription;
                const ogUrl = document.querySelector('meta[property="og:url"]');
                if (ogUrl) ogUrl.content = `https://sandiegocoffee.co/locations/${location.id}`;
                const ogImage = document.querySelector('meta[property="og:image"]');
                if (ogImage && location.localImage) ogImage.content = 'https://sandiegocoffee.co' + location.localImage;
                const twTitle = document.querySelector('meta[name="twitter:title"]');
                if (twTitle) twTitle.content = pageTitle;
                const twDesc = document.querySelector('meta[name="twitter:description"]');
                if (twDesc) twDesc.content = metaDescription;
                const twImage = document.querySelector('meta[name="twitter:image"]');
                if (twImage && location.localImage) twImage.content = 'https://sandiegocoffee.co' + location.localImage;

                // ── JSON-LD LocalBusiness schema ──────────────────────────
                (function injectSchema(loc) {
                    function parseTime(str) {
                        var m = str.match(/(\d+):(\d+)\s*(AM|PM)/i);
                        if (!m) return null;
                        var h = parseInt(m[1]), mins = m[2], ampm = m[3].toUpperCase();
                        if (ampm === 'PM' && h !== 12) h += 12;
                        if (ampm === 'AM' && h === 12) h = 0;
                        return String(h).padStart(2, '0') + ':' + mins;
                    }
                    var dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
                    var hoursSpecs = [];
                    (loc.hours && loc.hours.weekdayDescriptions || []).forEach(function(desc) {
                        var ci = desc.indexOf(':');
                        if (ci === -1) return;
                        var day = desc.slice(0, ci).trim();
                        var range = desc.slice(ci + 1).trim();
                        if (range.toLowerCase() === 'closed') return;
                        var parts = range.split(/\s*[–—-]\s*/);
                        if (parts.length !== 2) return;
                        var opens = parseTime(parts[0].trim());
                        var closes = parseTime(parts[1].trim());
                        if (!opens || !closes) return;
                        if (dayNames.indexOf(day) === -1) return;
                        hoursSpecs.push({
                            '@type': 'OpeningHoursSpecification',
                            dayOfWeek: 'https://schema.org/' + day,
                            opens: opens,
                            closes: closes
                        });
                    });

                    var addr = loc.basicInfo.address || {};
                    var contact = loc.basicInfo.contact || {};
                    var rating = loc.googleRating || {};
                    var type = loc.basicInfo.type === 'cafe' ? 'CafeOrCoffeeShop' : 'LocalBusiness';

                    var schema = {
                        '@context': 'https://schema.org',
                        '@type': type,
                        '@id': 'https://sandiegocoffee.co/locations/' + slugify(loc.basicInfo.name),
                        name: loc.basicInfo.name,
                        url: contact.website || ('https://sandiegocoffee.co/locations/' + loc.id),
                        description: metaDescription || undefined,
                        image: loc.localImage ? 'https://sandiegocoffee.co' + loc.localImage : undefined,
                        telephone: contact.phone || undefined,
                        address: {
                            '@type': 'PostalAddress',
                            streetAddress: addr.street || undefined,
                            addressLocality: addr.city || undefined,
                            addressRegion: addr.state || undefined,
                            postalCode: addr.zip || undefined,
                            addressCountry: 'US'
                        },
                        geo: (addr.coordinates && addr.coordinates.lat) ? {
                            '@type': 'GeoCoordinates',
                            latitude: addr.coordinates.lat,
                            longitude: addr.coordinates.lng
                        } : undefined,
                        aggregateRating: (rating.rating && rating.reviewCount) ? {
                            '@type': 'AggregateRating',
                            ratingValue: rating.rating,
                            reviewCount: rating.reviewCount,
                            bestRating: 5
                        } : undefined,
                        openingHoursSpecification: hoursSpecs.length ? hoursSpecs : undefined,
                        sameAs: contact.googleMapsUrl || undefined
                    };

                    // Strip undefined values
                    schema = JSON.parse(JSON.stringify(schema));

                    var tag = document.getElementById('ld-schema');
                    if (tag) tag.textContent = JSON.stringify(schema);
                })(location);

                // ── JSON-LD BreadcrumbList ─────────────────────────────────
                (function injectBreadcrumb(loc) {
                    var slug = slugify(loc.basicInfo.name);
                    var breadcrumb = {
                        '@context': 'https://schema.org',
                        '@type': 'BreadcrumbList',
                        itemListElement: [
                            { '@type': 'ListItem', position: 1, name: 'Home', item: 'https://sandiegocoffee.co/' },
                            { '@type': 'ListItem', position: 2, name: 'Explore Map', item: 'https://sandiegocoffee.co/map.html' },
                            { '@type': 'ListItem', position: 3, name: loc.basicInfo.name, item: 'https://sandiegocoffee.co/locations/' + slug }
                        ]
                    };
                    var tag = document.getElementById('ld-breadcrumb');
                    if (tag) tag.textContent = JSON.stringify(breadcrumb);
                })(location);

                // coffeeDetails is always populated by sync-locations.js — no live Sheets fetch needed
                renderPage(location, location.coffeeDetails || {});
                if (window.location.hash === '#sdcoffeeguide') {
                    setTimeout(() => {
                        const isMobile = window.innerWidth <= 768;
                        const target = document.getElementById(isMobile ? 'ig-review-mobile' : 'ig-review');
                        if (target) {
                            const headerH = document.querySelector('header')?.offsetHeight || 0;
                            const top = target.getBoundingClientRect().top + window.pageYOffset - headerH - 16;
                            window.scrollTo({ top, behavior: 'smooth' });
                        }
                    }, 300);
                }
                loadCommunityData(location.id);
            }
        }

        // ── Highlight callout ──────────────────────────────────────────────
        function findHighlightForLocation(locationId) {
            const loc = (window.COFFEE_LOCATIONS || []).find(l => l.id === locationId);
            const locSlug = loc ? slugify(loc.basicInfo.name) : null;
            return (window.highlights || []).find(h => {
                if (h.relatedLocationIds?.includes(locationId)) return true;
                // Support old ?id=loc_xxx format and new /locations/slug format
                const idMatch = h.locationUrl?.match(/[?&]id=([^&]+)/);
                if (idMatch) return idMatch[1] === locationId;
                const slugMatch = h.locationUrl?.match(/\/locations\/([^/?#]+)/);
                return slugMatch && locSlug && slugMatch[1] === locSlug;
            });
        }

        function renderHighlightCallout(locationId) {
            const h = findHighlightForLocation(locationId);
            if (!h) return '';
            return `
                <div class="highlight-callout">
                    <div class="highlight-callout-label">🎙️ Roaster Deep Dive</div>
                    <div class="highlight-callout-text">${h.excerpt}</div>
                    <a href="/highlight.html?id=${h.id}&from=location&locationId=${locationId}" class="highlight-callout-link">Read the Interview →</a>
                </div>
            `;
        }

        // ── Blog callout ───────────────────────────────────────────────
        function renderBlogCallout(locationId) {
            const posts = (window.BLOG_POSTS || []).filter(p => p.relatedLocationId === locationId);
            if (!posts.length) return '';
            return posts.map(p => `
                <div class="highlight-callout">
                    <div class="highlight-callout-label">📝 From the Blog</div>
                    <div class="highlight-callout-text">${p.excerpt}</div>
                    <a href="/blog-post.html?id=${p.id}" class="highlight-callout-link">Read the Post →</a>
                </div>
            `).join('');
        }

        // ── Bean Review callout ────────────────────────────────────────────
        function renderReviewCallout(custom) {
            if (!custom || !custom.reviewUrl) return '';
            return `
                <div class="review-callout">
                    <div class="review-callout-label">☕ Bean Review</div>
                    <div class="review-callout-text">A detailed roast review of this roaster's beans, posted to r/SanDiegoCoffeeBeans.</div>
                    <a href="${custom.reviewUrl}" target="_blank" rel="noopener" class="review-callout-link">Read the Review on Reddit →</a>
                </div>
            `;
        }

        function renderInstagramReview(custom, variant) {
            const raw = custom && custom.instagramReviewUrl;
            if (!raw) return '';
            const urls = raw.split(',').map(u => u.trim()).filter(Boolean);
            const multi = urls.length > 1;
            const cls   = variant === 'desktop' ? 'ig-review-desktop' : 'ig-review-mobile';
            const id    = variant === 'desktop' ? 'id="ig-review"'    : 'id="ig-review-mobile"';
            const blockquoteStyle = variant === 'desktop'
                ? 'background:#FFF;border:0;border-radius:3px;box-shadow:0 0 1px 0 rgba(0,0,0,.5),0 1px 10px 0 rgba(0,0,0,.15);margin:0;min-width:326px;max-width:540px;padding:0;width:calc(100% - 2px);'
                : 'background:#FFF;border:0;border-radius:3px;box-shadow:0 0 1px 0 rgba(0,0,0,.5),0 1px 10px 0 rgba(0,0,0,.15);margin:0;min-width:326px;max-width:540px;padding:0;width:calc(100% - 2px);';
            const embedsHtml = urls.map((u, i) => `
                ${multi ? `<div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#E8720C;margin:${i > 0 ? '1rem' : '0'} 0 0.4rem;">Part ${i + 1}</div>` : ''}
                <blockquote class="instagram-media"
                    data-instgrm-captioned
                    data-instgrm-permalink="${u}"
                    data-instgrm-version="14"
                    style="${blockquoteStyle}">
                    <a href="${u}" target="_blank" rel="noopener noreferrer">View this post on Instagram</a>
                </blockquote>
            `).join('');
            return `
                <div class="${cls} ig-review-wrap" ${id}>
                    <div class="ig-review-label">📸 @sdcoffeeguide Review${multi ? 's' : ''}</div>
                    ${embedsHtml}

        function renderHero(loc, isRoaster, rating, info, contact, today, hours) {

        function renderStars(rating) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                const diff = rating - (i - 1);
                let cls = 'empty';
                if (diff >= 1) cls = 'full';
                else if (diff >= 0.4) cls = 'half';
                html += `<svg class="star ${cls}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
                </svg>`;
            }
            return html;
        }

        function getLocationInitials(name) {
            const FILLER = new Set(['the','a','an','of','and','&','at','by','for','in','on','to']);
                const clean = name
                    .replace(/\s*[-\u2013]\s*.+$/, '')
                    .replace(/\s*\(.*?\)\s*$/, '')
                    .trim();
                const words = clean.split(/\s+/).filter(w => w.length > 0 && !FILLER.has(w.toLowerCase()));
                if (words.length === 0) return name.slice(0, 2).toUpperCase();
                if (words.length === 1) return words[0].slice(0, Math.min(4, words[0].length)).toUpperCase();
                return words.map(w => w[0]).join('').toUpperCase().slice(0, 4);
        }

        function siblingLinks(loc) {
            if (loc.coffeeDetails?.multipleLocations !== 'Yes') return '';
            const siblings = (window.COFFEE_LOCATIONS || []).filter(l =>
                l.basicInfo.name === loc.basicInfo.name && l.id !== loc.id
            );
            if (!siblings.length) return '';
            const links = siblings.map(s => {
                const hood = s.coffeeDetails?.neighborhood

                          || s.id;
                return `<a href="location.html?id=${s.id}&from=location&locationId=${loc.id}" class="sibling-link">${hood}&nbsp;↗</a>`;

        function renderNearby(loc) {
            const all = window.COFFEE_LOCATIONS || [];
            const curHood = loc.coffeeDetails?.neighborhood;
            const curLat = loc.basicInfo.address?.coordinates?.lat;
            const curLng = loc.basicInfo.address?.coordinates?.lng;
            const candidates = all.filter(l => l.id !== loc.id && l.metadata?.status !== 'inactive');

            function haversine(lat1, lng1, lat2, lng2) {
                const R = 3958.8;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLng = (lng2 - lng1) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }

            function distTo(l) {
                const lat = l.basicInfo.address?.coordinates?.lat;
                const lng = l.basicInfo.address?.coordinates?.lng;
                return (curLat && curLng && lat && lng) ? haversine(curLat, curLng, lat, lng) : 9999;
            }

            let sameHood = curHood ? candidates.filter(l => l.coffeeDetails?.neighborhood === curHood) : [];
            let others = candidates.filter(l => !curHood || l.coffeeDetails?.neighborhood !== curHood);
            others.sort((a, b) => distTo(a) - distTo(b));

            const picks = [...sameHood, ...others].slice(0, 3);
            if (!picks.length) return '';

            const label = curHood ? `More in ${curHood}` : 'Explore Nearby';
            const cardsHtml = picks.map(l => {
                const n = l.basicInfo.name;
                const typeClass = l.basicInfo.type === 'roaster' ? 'roaster' : 'cafe';
                const typeLabel = l.basicInfo.type === 'roaster' ? 'Roaster' : 'Cafe';
                const hood = l.coffeeDetails?.neighborhood || '';
                const initials = getLocationInitials(n);
                const imgHtml = l.localImage
                    ? `<img src="${l.localImage}" alt="${n}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'nearby-initials\\'>${initials}</div>'">`
                    : `<div class="nearby-initials">${initials}</div>`;
                return `
                    <a href="/location.html?id=${l.id}&from=location&locationId=${loc.id}" class="nearby-card">
                        <div class="nearby-img">${imgHtml}</div>
                        <div class="nearby-info">
                            <div class="nearby-name">${n}</div>
                            <div class="nearby-meta">
                                <span class="nearby-type ${typeClass}">${typeLabel}</span>
                                ${hood ? `<span class="nearby-hood">${hood}</span>` : ''}
                            </div>
                        </div>
                    </a>`;
            }).join('');

            const nearbyHood = loc.coffeeDetails?.neighborhood || '';
            const nhPage = nearbyHood && window.NEIGHBORHOOD_MAP && window.NEIGHBORHOOD_MAP[
                nearbyHood.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '')
            ];
            const seeAllHref = nhPage ? `/neighborhoods/${nhPage.id}` : `/map.html?neighborhood=${encodeURIComponent(nearbyHood)}`;
            const seeAllLabel = nhPage ? `All coffee in ${nearbyHood} →` : 'See all on map →';

            return `
                <div class="nearby-section">
                    <div class="nearby-header">
                        <h2>${label}</h2>
                        <a href="${seeAllHref}" class="nearby-see-all">${seeAllLabel}</a>
                    </div>
                    <div class="nearby-grid">${cardsHtml}</div>
                </div>`;
        }

        // ── Lightbox ───────────────────────────────────────────────────────
        let _lbImgs = [], _lbIdx = 0;

        function openLightbox(url) {
            // Collect all gallery images in DOM order — use getAttribute('src') to get
            // the original relative path, since n.src returns an absolute URL which
            // won't match the relative paths passed to openLightbox()
            const nodes = document.querySelectorAll('.gallery-hero img, .gallery-photo img');
            _lbImgs = Array.from(nodes).map(n => n.getAttribute('src')).filter(Boolean);
            _lbIdx  = _lbImgs.indexOf(url);
            if (_lbIdx === -1) { _lbImgs = [url]; _lbIdx = 0; }
            _lbShow();
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function _lbShow() {
            const img = document.getElementById('lightboxImg');
            img.src = _lbImgs[_lbIdx];
            img.alt = document.title.split(' —')[0];
            document.getElementById('lightboxPrev').hidden = _lbIdx === 0;
            document.getElementById('lightboxNext').hidden = _lbIdx === _lbImgs.length - 1;
            const counter = document.getElementById('lightboxCounter');
            counter.textContent = _lbImgs.length > 1 ? `${_lbIdx + 1} / ${_lbImgs.length}` : '';
        }

        function lightboxNav(dir) {
            _lbIdx = Math.max(0, Math.min(_lbImgs.length - 1, _lbIdx + dir));
            _lbShow();
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        // Close on backdrop click
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        // Keyboard: Escape closes, arrows navigate
        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('open')) return;
            if (e.key === 'Escape')     closeLightbox();
            if (e.key === 'ArrowLeft')  lightboxNav(-1);
            if (e.key === 'ArrowRight') lightboxNav(1);
        });

        // Touch swipe
        let _swipeX = 0;
        document.getElementById('lightbox').addEventListener('touchstart', e => {
            _swipeX = e.touches[0].clientX;
        }, { passive: true });
        document.getElementById('lightbox').addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - _swipeX;
            if (Math.abs(dx) > 50) lightboxNav(dx < 0 ? 1 : -1);
        }, { passive: true });

        // ── Community Likes & Reviews ───────────────────────────────────────

        async function loadCommunityData(locId) {
            try {
                const res = await fetch('/.netlify/functions/get-community-data');
                if (!res.ok) return;
                const data = await res.json();

                const likeCount = (data.likes || {})[locId] || 0;
                const reviews   = (data.reviews || {})[locId] || [];
                const isLiked   = localStorage.getItem('liked_' + locId) === 'true';

                const likeEl    = document.getElementById('community-like-section');
                const reviewsEl = document.getElementById('community-reviews-section');
                if (likeEl)    likeEl.innerHTML    = renderLikeButton(locId, likeCount, isLiked);
                if (reviewsEl) reviewsEl.innerHTML = renderCommunityReviews(locId, reviews);
            } catch (e) {
                // Community data is non-critical; fail silently
            }
        }

        function renderLikeButton(locId, count, isLiked) {
            const countText = count === 0
                ? 'Be the first to like this'
                : `${count} ${count === 1 ? 'person' : 'people'} liked this`;
            return `
                <div class="like-section">
                    <button class="like-btn${isLiked ? ' liked' : ''}" id="like-btn-${locId}"
                            onclick="toggleLike('${locId}', this)">
                        ${isLiked ? '♥ Liked' : '♡ Like this spot'}
                    </button>
                    <span class="like-count-text" id="like-count-${locId}">${countText}</span>
                </div>
            `;
        }

        function renderCommunityReviews(locId, reviews) {
            const reviewsHtml = reviews.length
                ? reviews.map(r => `
                    <div class="review-item">
                        <div class="review-text">"${escapeHtml(r.reviewText)}"</div>
                        <div class="review-meta">Community Member · ${formatReviewDate(r.timestamp)}</div>
                    </div>`).join('')
                : `<div style="color:#bbb; font-style:italic; font-size:0.88rem; padding:0.4rem 0;">No community reviews yet. Be the first!</div>`;

            return `
                <div class="section" id="reviews">
                    <div class="section-label">Community Reviews</div>
                    ${reviewsHtml}
                    <div class="review-form">
                        <textarea class="review-textarea" id="review-text-${locId}"
                            placeholder="Share your experience..." maxlength="500"></textarea>
                        <button class="review-submit-btn" onclick="submitReview('${locId}')">Submit Review</button>
                        <div id="review-msg-${locId}" style="display:none;"></div>
                    </div>
                </div>
            `;
        }

        function formatReviewDate(timestamp) {
            if (!timestamp) return '';
            try {
                const d = new Date(timestamp);
                if (isNaN(d.getTime())) return timestamp;
                return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            } catch { return timestamp; }
        }

        function escapeHtml(str) {
            return (str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        async function toggleLike(locId, btn) {
            btn.disabled = true;
            try {
                const res = await fetch('/.netlify/functions/toggle-like', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ locationId: locId }),
                });
                if (!res.ok) throw new Error('Request failed');
                const data = await res.json();

                localStorage.setItem('liked_' + locId, String(data.liked));
                btn.className = 'like-btn' + (data.liked ? ' liked' : '');
                btn.textContent = data.liked ? '♥ Liked' : '♡ Like this spot';

                const countEl = document.getElementById('like-count-' + locId);
                if (countEl) {
                    const c = data.newCount;
                    countEl.textContent = c === 0
                        ? 'Be the first to like this'
                        : `${c} ${c === 1 ? 'person' : 'people'} liked this`;
                }
            } catch (e) {
                // fail silently
            } finally {
                btn.disabled = false;
            }
        }

        async function submitReview(locId) {
            const textarea = document.getElementById('review-text-' + locId);
            const msgEl    = document.getElementById('review-msg-' + locId);
            const btn      = textarea.nextElementSibling;
            const text     = textarea.value.trim();

            msgEl.style.display = 'none';
            msgEl.className = '';

            if (text.length < 10) {
                msgEl.style.display = 'block';
                msgEl.className = 'review-form-err';
                msgEl.textContent = 'Please write at least 10 characters.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const res = await fetch('/.netlify/functions/submit-review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ locationId: locId, reviewText: text }),
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    msgEl.style.display = 'block';
                    msgEl.className = 'review-form-msg';
                    msgEl.textContent = 'Thanks! Your review will appear once approved.';
                    textarea.value = '';
                    textarea.disabled = true;
                    btn.textContent = 'Submitted';
                } else {
                    msgEl.style.display = 'block';
                    msgEl.className = 'review-form-err';
                    msgEl.textContent = data.error || 'Something went wrong. Please try again.';
                    btn.disabled = false;
                    btn.textContent = 'Submit Review';
                }
            } catch (e) {
                msgEl.style.display = 'block';
                msgEl.className = 'review-form-err';
                msgEl.textContent = 'Something went wrong. Please try again.';
                btn.disabled = false;
                btn.textContent = 'Submit Review';
            }
        }
    </script>
