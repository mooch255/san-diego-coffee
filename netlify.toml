[build]
  functions = "netlify/functions"

# 301 redirects for locations whose slugs changed (neighborhood added after initial indexing)
[[redirects]]
  from = "/locations/communal-coffee-loc_139"
  to   = "/locations/communal-coffee-north-park-university-ave"
  status = 301

[[redirects]]
  from = "/locations/achilles-coffee-roasters-loc_074"
  to   = "/locations/achilles-coffee-roasters-downtown-fourth-ave-suite-101"
  status = 301

# 301 redirects for old collision slugs (same name+neighborhood — now disambiguated by street)
[[redirects]]
  from = "/locations/achilles-coffee-roasters-downtown"
  to   = "/locations/achilles-coffee-roasters-downtown-fourth-ave-suite-101"
  status = 301

[[redirects]]
  from = "/locations/lofty-coffee-co-carlsbad"
  to   = "/locations/lofty-coffee-co-carlsbad-state-st"
  status = 301

[[redirects]]
  from = "/locations/communal-coffee-north-park"
  to   = "/locations/communal-coffee-north-park-university-ave"
  status = 301

[[redirects]]
  from = "/locations/coffee-n-talk-downtown"
  to   = "/locations/coffee-n-talk-downtown-w-broadway-suite-150"
  status = 301

[[redirects]]
  from = "/locations/lestat-s-normal-heights"
  to   = "/locations/lestat-s-normal-heights-park-blvd"
  status = 301

[[redirects]]
  from = "/locations/bird-rock-coffee-roasters-la-jolla"
  to   = "/locations/bird-rock-coffee-roasters-la-jolla-gilman-dr"
  status = 301

[[redirects]]
  from = "/locations/bird-rock-coffee-roasters-downtown"
  to   = "/locations/bird-rock-coffee-roasters-downtown-kettner-blvd"
  status = 301

[[redirects]]
  from = "/locations/lofty-coffee-co-encinitas"
  to   = "/locations/lofty-coffee-co-encinitas-n-coast-hwy-101"
  status = 301

# Clean URLs for location pages — /locations/slug serves location.html?id=slug
[[redirects]]
  from = "/locations/:id"
  to   = "/location.html?id=:id"
  status = 200

# Serve favicon.svg for legacy favicon and Apple touch icon requests
[[redirects]]
  from = "/favicon.ico"
  to   = "/favicon.svg"
  status = 200

[[redirects]]
  from = "/apple-touch-icon.png"
  to   = "/favicon.svg"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-precomposed.png"
  to   = "/favicon.svg"
  status = 200

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyDFVEZE3Q0NBXY15rL6muwB8nNATPftOmI"

[[notifications]]
  event = "submission_created"
  url = "/.netlify/functions/submit-to-sheets"
  form = "coffee-submissions"
