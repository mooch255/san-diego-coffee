    <style>
        :root {
            --espresso: #3D2817;
            --coffee-brown: #6B4E3D;
            --cream: #F8F5F0;
            --white: #FFFFFF;
            --latte: #C4A77D;
            --accent-red: #B85C38;
            --warm-brown: #5C4033;
            --light-tan: #E8DED2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Libre Franklin', -apple-system, sans-serif;
            color: var(--espresso);
            background: var(--white);
        }

        /* ── Header ──────────────────────────────────────────────────── */
        header {
            background: linear-gradient(160deg, #2A1508 0%, #4A2C18 45%, #3A2010 75%, #2A1508 100%);
            color: var(--white);
            border-top: 3px solid var(--accent-red);
            border-bottom: 3px solid var(--accent-red);
            overflow: hidden;
            position: relative;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 120% at 0% 50%, rgba(0,0,0,0.38) 0%, transparent 65%),
                radial-gradient(ellipse 55% 120% at 100% 50%, rgba(0,0,0,0.38) 0%, transparent 65%);
            pointer-events: none;
        }

        header::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 140% at 50% 110%, rgba(184,92,56,0.18) 0%, transparent 60%);
            pointer-events: none;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.85rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .header-brand-eyebrow {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(196,167,125,0.6);
            margin-bottom: 0.4rem;
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.45rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1;
            color: #EDE0CC;
            text-decoration: none;
            display: block;
        }

        .header-logo em { font-style: italic; color: #C9A97E; font-weight: 400; }
        .header-logo strong { font-family: 'Playfair Display', serif; font-style: normal; font-weight: 800; color: #EDE0CC; letter-spacing: -0.01em; }

        .header-subtitle {
            font-size: 0.6rem;
            color: rgba(196,167,125,0.55);
            margin-top: 0.4rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        /* ── Hamburger Nav ───────────────────────────────────────────── */
        .nav-toggle {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            background: rgba(196,167,125,0.08);
            border: 1px solid rgba(196,167,125,0.4);
            color: rgba(196,167,125,0.9);
            padding: 0.5rem 0.9rem;
            cursor: pointer;
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 0;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-toggle-icon { font-size: 1.15rem; line-height: 1; }

        .nav-toggle:hover, .nav-toggle.open {
            border-color: var(--latte);
            color: var(--latte);
            background: rgba(196,167,125,0.13);
        }

        .nav-dropdown {
            display: none;
            position: fixed;
            background: #2A1508;
            border-left: 1px solid rgba(196,167,125,0.25);
            border-bottom: 1px solid rgba(196,167,125,0.25);
            border-top: 2px solid var(--accent-red);
            min-width: 210px;
            z-index: 9999;
            box-shadow: -4px 8px 32px rgba(0,0,0,0.45);
        }

        .nav-dropdown.open { display: block; }

        .nav-dropdown a {
            display: block;
            padding: 0.9rem 1.5rem;
            color: rgba(196,167,125,0.8);
            text-decoration: none;
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(196,167,125,0.1);
            transition: background 0.15s, color 0.15s;
        }

        .nav-dropdown a:last-child { border-bottom: none; }

        .nav-dropdown a:hover {
            background: rgba(196,167,125,0.1);
            color: var(--latte);
        }

        .nav-dropdown a.active {
            color: var(--latte);
            border-left: 3px solid var(--accent-red);
            padding-left: calc(1.5rem - 3px);
        }

        /* ── Article Layout ──────────────────────────────────────────── */
        .article-wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--coffee-brown);
            text-decoration: none;
            border-bottom: 1px solid rgba(107,78,61,0.25);
            padding-bottom: 1px;
            margin-bottom: 1.75rem;
            transition: color 0.2s, border-color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-red);
            border-bottom-color: var(--accent-red);
        }

        /* ── Hero Image ──────────────────────────────────────────────── */
        .hero-image {
            aspect-ratio: 16/9;
            overflow: hidden;
            background: linear-gradient(135deg, #2A1508 0%, #4A2C18 60%, #3A2010 100%);
            margin-bottom: 1.75rem;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hero-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            opacity: 0.2;
        }

        /* ── Post Header Card ────────────────────────────────────────── */
        .post-header {
            border: 1px solid var(--light-tan);
            border-top: 3px solid var(--accent-red);
            background: var(--cream);
            padding: 1.75rem 2rem;
            margin-bottom: 2rem;
        }

        .post-eyebrow {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent-red);
            margin-bottom: 0.75rem;
        }

        .post-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--espresso);
            line-height: 1.2;
            margin-bottom: 0.6rem;
        }

        .post-meta {
            font-size: 0.8rem;
            color: var(--coffee-brown);
            font-weight: 600;
        }

        /* ── Body Content ────────────────────────────────────────────── */
        .post-body {
            margin-bottom: 2.5rem;
        }

        .text-block {
            font-size: 1rem;
            line-height: 1.85;
            color: #4A3728;
            margin-bottom: 1.5rem;
        }

        .text-block a {
            color: var(--accent-red);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid rgba(184,92,56,0.4);
            transition: border-color 0.2s;
        }

        .text-block a:hover { border-bottom-color: var(--accent-red); }

        .heading-block {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--espresso);
            margin: 2rem 0 0.75rem;
        }

        h2.heading-block { font-size: 1.5rem; line-height: 1.25; }
        h3.heading-block { font-size: 1.15rem; line-height: 1.3; }

        /* ── Q&A Block ───────────────────────────────────────────────── */
        .qa-block {
            border: 1px solid var(--light-tan);
            border-top: 3px solid var(--accent-red);
            margin: 1.5rem 0;
            overflow: hidden;
        }

        .qa-question {
            background: var(--cream);
            padding: 1.1rem 1.4rem;
            border-bottom: 1px solid var(--light-tan);
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--espresso);
            line-height: 1.5;
            margin: 0;
        }

        .qa-answer {
            padding: 1.1rem 1.4rem;
            font-size: 0.93rem;
            line-height: 1.85;
            color: var(--warm-brown);
        }

        .qa-answer p { margin: 0 0 0.75rem; }
        .qa-answer p:last-child { margin-bottom: 0; }

        /* ── Inline Image Block ──────────────────────────────────────── */
        .image-block {
            margin: 2rem 0;
        }

        .image-block img {
            width: 100%;
            display: block;
        }

        .image-block figcaption {
            font-size: 0.78rem;
            color: var(--coffee-brown);
            margin-top: 0.5rem;
            font-style: italic;
            text-align: center;
        }

        /* ── Related Location Callout ────────────────────────────────── */
        .location-callout {
            background: #fff8f0;
            border: 1px solid #e8d5c0;
            border-left: 3px solid var(--accent-red);
            border-radius: 0;
            padding: 1rem 1.25rem;
            margin: 2rem 0;
        }

        .location-callout-label {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent-red);
            margin-bottom: 0.4rem;
        }

        .location-callout-name {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--espresso);
            margin-bottom: 0.35rem;
        }

        .location-callout-link {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--accent-red);
            text-decoration: none;
        }

        .location-callout-link:hover { text-decoration: underline; }

        /* ── Not Found ───────────────────────────────────────────────── */
        .not-found {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            padding: 4rem 2rem;
        }

        .not-found h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--espresso);
            margin-bottom: 1rem;
        }

        .not-found p {
            color: var(--coffee-brown);
            margin-bottom: 1.5rem;
        }

        .not-found a {
            color: var(--accent-red);
            font-weight: 700;
            text-decoration: none;
        }

        /* ── Footer ──────────────────────────────────────────────────── */
        footer {
            background: var(--espresso);
            color: rgba(196,167,125,0.65);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            padding: 1.5rem 2rem;
            font-size: 0.78rem;
        }

        footer a { color: var(--latte); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        footer a:hover { color: #EDE0CC; }
        .footer-sep { opacity: 0.4; margin: 0 0.4rem; }
        .footer-row { display: flex; align-items: center; flex-wrap: wrap; justify-content: center; }

        /* ── Responsive ──────────────────────────────────────────────── */
        @media (max-width: 600px) {
            .article-wrap { padding: 1.5rem 1.25rem 3rem; }
            .post-header { padding: 1.25rem; }
            .post-header h1 { font-size: 1.5rem; }
            h2.heading-block { font-size: 1.25rem; }
        }
    </style>

    <script>
        // Nav dropdown
        (function() {
            const toggle = document.getElementById('navToggle');
            const dropdown = document.getElementById('navDropdown');
            if (!toggle || !dropdown) return;
            function closeNav() {
                dropdown.classList.remove('open');
                toggle.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
                toggle.querySelector('.nav-toggle-icon').textContent = '≡';
                toggle.querySelector('.nav-toggle-label').textContent = 'Menu';
            }
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                if (dropdown.classList.contains('open')) {
                    closeNav();
                } else {
                    toggle.querySelector('.nav-toggle-icon').textContent = '✕';
                    toggle.querySelector('.nav-toggle-label').textContent = 'Close';
                    toggle.classList.add('open');
                    toggle.setAttribute('aria-expanded', 'true');
                    const hBottom = document.querySelector('header').getBoundingClientRect().bottom;
                    const tRect = toggle.getBoundingClientRect();
                    dropdown.style.top = hBottom + 'px';
                    dropdown.style.right = Math.max(0, document.documentElement.clientWidth - tRect.right) + 'px';
                    dropdown.classList.add('open');
                }
            });
            document.addEventListener('click', closeNav);
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeNav(); });
        })();

        const CATEGORY_LABELS = {
            'cafe-visit': 'Cafe Visit',
            'roaster-guide': 'Roaster Guide',
            'neighborhood-guide': 'Neighborhood Guide',
            'gear': 'Gear',
            'community': 'Community',
        };

        function formatDate(iso) {
            const d = new Date(iso + 'T00:00:00');
            const day = d.getDate();
            const suffix = (day >= 11 && day <= 13) ? 'th' : (['th','st','nd','rd'][day % 10] || 'th');
            const month = d.toLocaleDateString('en-US', { month: 'long' });
            return `${month} ${day}${suffix}, ${d.getFullYear()}`;
        }

        function renderParagraphs(text) {
            return text.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('');
        }

        function renderBody(bodyArr, post) {
            return bodyArr.map(block => {
                if (block.type === 'text') {
                    const locationCount = window.COFFEE_LOCATIONS ? window.COFFEE_LOCATIONS.length : '';
                    const content = block.content.replace(/\{\{LOCATION_COUNT\}\}/g, locationCount);
                    // content may already be HTML or plain text
                    const isHtml = /<[a-z][\s\S]*>/i.test(content);
                    if (isHtml) {
                        return `<div class="text-block">${content}</div>`;
                    }
                    return content.split('\n\n').map(p => `<p class="text-block">${p.trim()}</p>`).join('');
                }
                if (block.type === 'heading') {
                    const tag = block.level === 3 ? 'h3' : 'h2';
                    return `<${tag} class="heading-block">${block.content}</${tag}>`;
                }
                if (block.type === 'qa') {
                    return `
                        <div class="qa-block">
                            <div class="qa-question">${block.question}</div>
                            <div class="qa-answer">${renderParagraphs(block.answer)}</div>
                        </div>`;
                }
                if (block.type === 'image') {
                    const alt = block.alt || post.title;
                    return `
                        <figure class="image-block">
                            <img src="${block.src}" alt="${alt}" loading="lazy">
                            ${block.caption ? `<figcaption>${block.caption}</figcaption>` : ''}
                        </figure>`;
                }
                return '';
            }).join('');
        }

        function renderLocationCallout(locationId) {
            if (!locationId) return '';
            const loc = (window.COFFEE_LOCATIONS || []).find(l => l.id === locationId);
            if (!loc) return '';
            const name = loc.basicInfo && loc.basicInfo.name ? loc.basicInfo.name : locationId;
            return `
                <div class="location-callout">
                    <div class="location-callout-label">On the Map</div>
                    <div class="location-callout-name">${name}</div>
                    <a href="location.html?id=${locationId}" class="location-callout-link">View location page →</a>
                </div>
            `;
        }

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const post = window.BLOG_POSTS && window.BLOG_POSTS.find(p => p.id === id);
        const container = document.getElementById('pageContent');

        if (!post) {
            document.title = 'Post Not Found · San Diego Specialty Coffee';
            container.innerHTML = `
                <div class="not-found">
                    <h2>Post Not Found</h2>
                    <p>We couldn't find that blog post.</p>
                    <a href="blog.html">← All Blog Posts</a>
                </div>`;
        } else {
            // ── Update meta tags ──────────────────────────────────────────
            document.title = post.title + ' · San Diego Coffee Blog';

            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.content = post.metaDescription || post.excerpt || '';

            const ogTitle = document.querySelector('meta[property="og:title"]');
            if (ogTitle) ogTitle.content = post.title + ' · San Diego Coffee Blog';

            const ogDesc = document.querySelector('meta[property="og:description"]');
            if (ogDesc) ogDesc.content = post.metaDescription || post.excerpt || '';

            const ogImage = document.querySelector('meta[property="og:image"]');
            if (ogImage && post.image) ogImage.content = 'https://sandiegocoffee.co' + post.image;

            const ogUrl = document.querySelector('meta[property="og:url"]');
            if (ogUrl) ogUrl.content = 'https://sandiegocoffee.co/blog-post.html?id=' + post.id;

            const twTitle = document.querySelector('meta[name="twitter:title"]');
            if (twTitle) twTitle.content = post.title + ' · San Diego Coffee Blog';

            const twDesc = document.querySelector('meta[name="twitter:description"]');
            if (twDesc) twDesc.content = post.metaDescription || post.excerpt || '';

            const twImage = document.querySelector('meta[name="twitter:image"]');
            if (twImage && post.image) twImage.content = 'https://sandiegocoffee.co' + post.image;

            // Set canonical
            let canonical = document.querySelector('link[rel="canonical"]');
            if (!canonical) { canonical = document.createElement('link'); canonical.rel = 'canonical'; document.head.appendChild(canonical); }
            canonical.href = 'https://sandiegocoffee.co/blog-post.html?id=' + post.id;

            // ── JSON-LD BlogPosting schema ────────────────────────────────
            (function injectSchema(p) {
                var schema = {
                    '@context': 'https://schema.org',
                    '@type': 'BlogPosting',
                    headline: p.title,
                    description: p.metaDescription || p.excerpt || undefined,
                    image: p.image ? 'https://sandiegocoffee.co' + p.image : undefined,
                    datePublished: p.date || undefined,
                    author: {
                        '@type': 'Organization',
                        name: 'r/SanDiegoCoffeeBeans',
                        url: 'https://reddit.com/r/SanDiegoCoffeeBeans'
                    },
                    publisher: {
                        '@type': 'Organization',
                        name: 'San Diego Specialty Coffee',
                        url: 'https://sandiegocoffee.co'
                    },
                    mainEntityOfPage: {
                        '@type': 'WebPage',
                        '@id': 'https://sandiegocoffee.co/blog-post.html?id=' + p.id
                    }
                };
                schema = JSON.parse(JSON.stringify(schema));
                var tag = document.getElementById('ld-schema');
                if (tag) tag.textContent = JSON.stringify(schema);
            })(post);

            // ── JSON-LD Breadcrumb ────────────────────────────────────────
            (function injectBreadcrumb(p) {
                var breadcrumb = {
                    '@context': 'https://schema.org',
                    '@type': 'BreadcrumbList',
                    itemListElement: [
                        { '@type': 'ListItem', position: 1, name: 'Home', item: 'https://sandiegocoffee.co/' },
                        { '@type': 'ListItem', position: 2, name: 'Blog', item: 'https://sandiegocoffee.co/blog.html' },
                        { '@type': 'ListItem', position: 3, name: p.title, item: 'https://sandiegocoffee.co/blog-post.html?id=' + p.id }
                    ]
                };
                var tag = document.getElementById('ld-breadcrumb');
                if (tag) tag.textContent = JSON.stringify(breadcrumb);
            })(post);

            // ── JSON-LD ItemList schema (curated list posts only) ─────────
            if (post.itemList && post.itemList.length) {
                (function injectItemList(p) {
                    var schema = {
                        '@context': 'https://schema.org',
                        '@type': 'ItemList',
                        name: p.title,
                        description: p.metaDescription || p.excerpt || undefined,
                        numberOfItems: p.itemList.length,
                        itemListElement: p.itemList.map(function(item) {
                            return { '@type': 'ListItem', position: item.position, name: item.name, url: item.url };
                        })
                    };
                    var tag = document.createElement('script');
                    tag.type = 'application/ld+json';
                    tag.textContent = JSON.stringify(schema);
                    document.head.appendChild(tag);
                })(post);
            }

            // ── Render page ───────────────────────────────────────────────
            const heroHtml = post.image
                ? `<div class="hero-image"><img src="${post.image}" alt="${post.title}"></div>`
                : `<div class="hero-image"><div class="hero-image-placeholder">☕</div></div>`;

            const categoryLabel = CATEGORY_LABELS[post.category] || post.category || 'Blog';

            container.innerHTML = `
                <div class="article-wrap">
                    <a href="blog.html" class="back-link">← All Blog Posts</a>
                    ${heroHtml}
                    <div class="post-header">
                        <div class="post-eyebrow">${categoryLabel}</div>
                        <h1>${post.title}</h1>
                        <div class="post-meta">${formatDate(post.date)}</div>
                    </div>
                    <div class="post-body">
                        ${renderBody(post.body, post)}
                    </div>
                    ${renderLocationCallout(post.relatedLocationId)}
                </div>`;
        }
    </script>

</body>
</html>
