<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Diego Specialty Coffee - Specialty Coffee Map</title>
    
    <!-- Marker Clusterer -->
    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;600;800&family=Lora:wght@400;600&family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --espresso: #3D2817;
            --coffee-brown: #6B4E3D;
            --cream: #F8F5F0;
            --white: #FFFFFF;
            --latte: #C4A77D;
            --accent-red: #B85C38;
            --warm-brown: #5C4033;
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Libre Franklin', -apple-system, sans-serif;
            color: var(--espresso);
            background-color: var(--white);
            overflow: hidden;
            height: 100vh;
        }

        /* ── Banner-Inspired Header (compact horizontal) ─────────────── */
        header {
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent, transparent 39px,
                    rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent, transparent 39px,
                    rgba(255,255,255,0.016) 39px, rgba(255,255,255,0.016) 40px
                ),
                linear-gradient(160deg, #2A1508 0%, #4A2C18 45%, #3A2010 75%, #2A1508 100%);
            color: var(--white);
            border-top: 3px solid var(--accent-red);
            border-bottom: 3px solid var(--accent-red);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 120% at 0% 50%, rgba(0,0,0,0.38) 0%, transparent 65%),
                radial-gradient(ellipse 55% 120% at 100% 50%, rgba(0,0,0,0.38) 0%, transparent 65%);
            pointer-events: none;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.85rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* Brand: eyebrow line + italic-serif+bold-sans logo */
        .header-brand-eyebrow {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(196,167,125,0.6);
            margin-bottom: 0.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.45rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1;
            color: #EDE0CC;
        }

        h1 em {
            font-style: italic;
            color: #C9A97E;
            font-weight: 400;
        }

        h1 strong {
            font-family: 'Playfair Display', serif;
            font-style: normal;
            font-weight: 800;
            color: #EDE0CC;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 0.6rem;
            color: rgba(196, 167, 125, 0.55);
            margin-top: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .header-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .header-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
            border: 1px solid rgba(196,167,125,0.32);
            color: rgba(196,167,125,0.8);
            background: transparent;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: 'Libre Franklin', sans-serif;
            border-radius: 0;
        }

        .header-btn:hover {
            border-color: var(--latte);
            color: var(--latte);
            background: rgba(196,167,125,0.07);
            transform: none;
        }

        .header-btn.secondary {
            background: transparent;
        }

        .header-btn.secondary:hover {
            background: rgba(196,167,125,0.07);
        }

        /* The "Submit" button gets accent-red fill */
        .header-btn:last-child {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
        }

        .header-btn:last-child:hover {
            background: #a04a28;
            border-color: #a04a28;
        }

        /* Controls Bar - Compact */
        .controls-bar {
            background: var(--white);
            padding: 1.25rem 2rem;
            border-bottom: 1px solid #E0DBD3;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .search-container {
            flex: 1;
            min-width: 500px;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 0.85rem 1.25rem;
            border: 2px solid var(--coffee-brown);
            border-radius: 0;
            font-size: 1rem;
            background: var(--white);
            transition: all 0.2s;
            font-family: 'Libre Franklin', sans-serif;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--accent-red);
            box-shadow: 0 0 0 3px rgba(184, 92, 56, 0.1);
        }

        /* Autocomplete Dropdown */
        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border: 2px solid var(--coffee-brown);
            border-top: none;
            max-height: 350px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .autocomplete-dropdown.show {
            display: block;
        }

        .autocomplete-item {
            padding: 0.85rem 1.25rem;
            cursor: pointer;
            border-bottom: 1px solid #E0DBD3;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover,
        .autocomplete-item.active {
            background: var(--cream);
        }
            transition: background 0.2s;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover,
        .autocomplete-item.selected {
            background: #f5f5f5;
        }

        .autocomplete-name {
            font-weight: 600;
            color: #333;
            display: block;
        }

        .autocomplete-type {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-top: 0.3rem;
        }

        .autocomplete-type.roaster {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .autocomplete-type.cafe {
            background: #e3f2fd;
            color: #1565c0;
        }

        .autocomplete-new {
            border-left: 4px solid #2e7d32;
            background: #f1f8f4;
        }

        #clearBtn {
            padding: 0.6rem 1.2rem;
            background: #6F4E37;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.3s;
            white-space: nowrap;
        }

        #clearBtn:hover {
            background: #5a3d2b;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        button {
            padding: 0.7rem 1.25rem;
            background: var(--coffee-brown);
            color: var(--white);
            border: 2px solid var(--coffee-brown);
            border-radius: 0;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: 'Libre Franklin', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        button:hover {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }

        .toggle-filters-btn {
            background: var(--white);
            color: var(--coffee-brown);
        }

        #openNowBtn {
            min-width: 6.5rem;
        }

        .toggle-filters-btn:hover {
            background: var(--cream);
        }

        #clearBtn {
            background: var(--white) !important;
            color: var(--coffee-brown) !important;
            border-color: var(--coffee-brown) !important;
        }

        #clearBtn:hover {
            background: var(--cream) !important;
        }

        /* Filters Panel */
        .filters-panel {
            background: var(--warm-white);
            border-bottom: 1px solid rgba(107, 78, 61, 0.1);
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s ease;
        }

        .filters-panel.expanded {
            max-height: 210px;
            padding: 0;
            overflow-y: auto;
        }

        .filters-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .filters-section {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .filters-section h3 {
            font-family: 'Crimson Pro', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--rich-brown);
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
        }

        .filter-label input[type="checkbox"],
        .filter-label input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .filter-count {
            color: #999;
            font-size: 0.85rem;
            margin-left: 0.25rem;
            font-weight: 400;
        }

        .neighborhood-select {
            width: 100%;
            padding: 0.35rem 0.5rem;
            font-size: 0.85rem;
            font-family: inherit;
            border: 1px solid rgba(107, 78, 61, 0.25);
            border-radius: 6px;
            background: var(--warm-white);
            color: var(--rich-brown);
            cursor: pointer;
            appearance: auto;
        }
        .neighborhood-select:focus {
            outline: none;
            border-color: var(--coffee-brown);
        }

        .location-btn {
            padding: 0.6rem 1.2rem;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.3s;
            width: 100%;
        }

        .location-btn:hover {
            background: #1b5e20;
        }

        .location-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .roaster-badge, .cafe-badge {
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .roaster-badge {
            background: var(--coffee-brown);
            color: var(--white);
        }

        .cafe-badge {
            background: var(--accent-red);
            color: var(--white);
        }

        /* Split Layout */
        .map-layout {
            display: flex;
            height: calc(100vh - 70px); /* header ~70px */
            overflow: hidden;
        }

        /* Left Panel */
        .list-panel {
            width: 460px;
            min-width: 400px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--cream);
            border-right: 1px solid #E0DBD3;
            overflow: hidden;
        }

        .list-panel-controls {
            background: var(--white);
            padding: 0.65rem 0.85rem;
            border-bottom: 1px solid #E0DBD3;
            flex-shrink: 0;
        }

        .list-panel-controls .search-container {
            position: relative;
            margin-bottom: 0.5rem;
        }

        .list-panel-controls #searchInput {
            width: 100%;
            padding: 0.5rem 0.85rem;
            border: 1.5px solid #c4b8ac;
            font-size: 0.85rem;
            background: var(--cream);
            font-family: 'Libre Franklin', sans-serif;
        }

        .list-panel-controls .button-row {
            display: flex;
            gap: 0.4rem;
        }

        .list-panel-controls button {
            padding: 0.35rem 0.65rem;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            flex: 1;
        }

        /* Active filter dot indicator */
        #toggleFilters {
            position: relative;
        }
        #toggleFilters .filter-dot {
            display: none;
            position: absolute;
            top: 3px;
            right: 3px;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-red);
        }
        #toggleFilters.filters-active .filter-dot {
            display: block;
        }

        /* Sort toggle — now lives inside filters panel */
        .sort-toggle {
            display: flex;
            gap: 0;
            border: 1.5px solid #c4b8ac;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.15rem;
        }
        .sort-btn {
            flex: 1;
            padding: 0.28rem 0.4rem;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: var(--white);
            color: #999;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Libre Franklin', sans-serif;
        }
        .sort-btn + .sort-btn {
            border-left: 1.5px solid #c4b8ac;
        }
        .sort-btn.active {
            background: var(--espresso);
            color: var(--cream);
        }
        .sort-btn:hover:not(.active) {
            background: var(--cream);
            color: var(--espresso);
        }

        /* Location Cards */
        .list-panel-cards {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .list-panel-header {
            padding: 0.6rem 1rem;
            font-size: 0.75rem;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--cream);
            border-bottom: 1px solid #E0DBD3;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .location-card {
            display: flex;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #E0DBD3;
            background: var(--white);
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
            color: inherit;
        }

        .location-card:hover {
            background: #fdf8f3;
        }

        .location-card.map-hover {
            background: #fdf3eb;
            border-left: 3px solid var(--latte);
        }

        .location-card.active {
            background: #fdf3eb;
            border-left: 3px solid var(--accent-red);
        }

        .location-card-img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            flex-shrink: 0;
            background: #e8e0d8;
        }

        .location-card-img-placeholder {
            width: 72px;
            height: 72px;
            flex-shrink: 0;
            background: linear-gradient(145deg, #2A1508 0%, #5C3420 50%, #3D2010 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .location-card-img-placeholder .card-initials {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(196, 167, 125, 0.9);
            letter-spacing: 0.04em;
            line-height: 1;
        }
        .location-card-img-placeholder .card-initials-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(196, 167, 125, 0.35);
        }

        .location-card-body {
            flex: 1;
            min-width: 0;
        }

        .location-card-name {
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--espresso);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .location-card-type {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
        }

        .location-card-type.roaster { color: #2e7d32; }
        .location-card-type.cafe { color: #1565c0; }

        .location-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-bottom: 0.3rem;
        }

        .location-card-tag {
            background: #f3ece4;
            color: #6F4E37;
            border: 1px solid #d4c4b0;
            border-radius: 2px;
            padding: 0.1rem 0.4rem;
            font-size: 0.68rem;
            font-weight: 500;
        }

        .location-card-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .location-card-badge {
            font-size: 0.67rem;
            padding: 0.1rem 0.4rem;
            border-radius: 2px;
            font-weight: 500;
        }

        .location-card-badge.yes {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .card-detail-line {
            font-size: 0.7rem;
            color: #8a7060;
            margin-bottom: 0.2rem;
            line-height: 1.3;
        }
        .card-description {
            color: #aaa;
            font-style: italic;
            margin-top: 0.15rem;
        }
        .location-card-desc {
            font-size: 0.72rem;
            color: #777;
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Map Legend */
        .map-legend {
            position: absolute;
            bottom: 2.25rem;
            left: 0.75rem;
            background: rgba(255,255,255,0.93);
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 0.4rem 0.6rem;
            font-size: 0.7rem;
            font-family: 'Libre Franklin', sans-serif;
            color: #555;
            box-shadow: 0 1px 6px rgba(0,0,0,0.15);
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        @media (max-width: 768px) {
            .map-legend { display: none; }
        }
        .map-legend-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .map-legend-item img {
            width: 14px;
            height: 14px;
            object-fit: contain;
        }

        /* Right Map */
        .map-right {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Mobile toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10200;
            background: var(--espresso);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            white-space: nowrap;
        }
        /* Filters panel inside left panel */
        #filtersPanel {
            background: var(--white);
            border-bottom: 1px solid #E0DBD3;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            flex-shrink: 0;
        }

        #filtersPanel.expanded {
            max-height: 280px;
            overflow-y: auto;
        }

        /* On all screen sizes: overlay the card list when expanded */
        #filtersPanel.overlay-open {
            position: fixed;
            left: auto;
            z-index: 10100;
            border-bottom: 2px solid #c4b8ac;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            max-height: 50vh;
            overflow-y: auto;
        }

        /* On mobile, always use fixed overlay when open */
        @media (max-width: 768px) {
            .list-panel-controls {
                position: relative;
                z-index: 60;
            }
            #filtersPanel.overlay-open {
                left: 0;
                right: 0;
                width: 100%;
            }
        }

        .filters-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            padding: 0.75rem 0.85rem;
        }

        @media (max-width: 768px) {
            .filters-inner {
                display: flex;
                flex-wrap: wrap;
                gap: 0;
                padding: 0;
            }
            .filters-section {
                flex: 1 1 50%;
                padding: 0.65rem 0.85rem;
                box-sizing: border-box;
            }
            .filters-section:nth-child(2) { /* Neighborhood */
                border-left: 1px solid #f0ebe4;
            }
            .filters-section:nth-child(3) { /* Sort — full-width second row */
                flex: 0 0 100%;
                border-top: 1px solid #f0ebe4;
            }
        }

        @media (max-width: 768px) {
            .filters-panel.expanded {
                max-height: 260px;
            }
        }

        .filters-section h3 {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            font-size: 0.8rem;
            margin-bottom: 0.3rem;
        }

        .filter-label input { cursor: pointer; }

        .filter-count {
            color: #aaa;
            font-size: 0.75rem;
        }

        /* Loading Indicator */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: var(--white);
            padding: 2rem 2.5rem;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        #loading.hidden { display: none; }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 1rem;

    </div>

    <!-- Locations data -->

    <!-- Map JavaScript -->
    <script>
// Map JavaScript - Embedded
let map, markers = [], markerCluster, infoWindow, allLocations = [], userLocationMarker = null;
// Use coffeeDetails already merged into locations.js by sync-locations.js
// Build lookup from the already-loaded COFFEE_LOCATIONS array
let sheetDataByLocation = {};
function loadSheetData() {
    (window.COFFEE_LOCATIONS || []).forEach(loc => {
        if (loc.coffeeDetails) {
            sheetDataByLocation[loc.id] = loc.coffeeDetails;
        }
    });
    // Re-render cards with coffee details
    const visibleMarkers = markers.filter(m => shouldShowMarker(m));
    renderLocationCards(visibleMarkers);
}
let autocompleteIndex = -1;

function initMap() {
    // Custom map styling - warm, minimal, coffee-themed
    const mapStyles = [
        {
            "featureType": "all",
            "elementType": "geometry",
            "stylers": [{ "color": "#F5F1E8" }]
        },
        {
            "featureType": "all",
            "elementType": "labels.text.fill",
            "stylers": [{ "color": "#6B4E3D" }]
        },
        {
            "featureType": "all",
            "elementType": "labels.text.stroke",
            "stylers": [{ "color": "#FFFFFF" }, { "weight": 3 }]
        },
        {
            "featureType": "road",
            "elementType": "geometry",
            "stylers": [{ "color": "#FFFFFF" }]
        },
        {
            "featureType": "road",
            "elementType": "geometry.stroke",
            "stylers": [{ "color": "#E8DCC8" }]
        },
        {
            "featureType": "road.highway",
            "elementType": "geometry",
            "stylers": [{ "color": "#F5EFE3" }]
        },
        {
            "featureType": "road.highway",
            "elementType": "geometry.stroke",
            "stylers": [{ "color": "#D4C4A8" }]
        },
        {
            "featureType": "water",
            "elementType": "geometry",
            "stylers": [{ "color": "#B8D4E8" }]
        },
        {
            "featureType": "landscape.natural",
            "elementType": "geometry",
            "stylers": [{ "color": "#EBE7DB" }]
        },
        {
            "featureType": "poi.park",
            "elementType": "geometry",
            "stylers": [{ "color": "#D4E4CD" }]
        },
        {
            "featureType": "poi",
            "elementType": "labels.icon",
            "stylers": [{ "saturation": -30 }]
        }
    ];
    
    map = new google.maps.Map(document.getElementById('map'), {
        zoom: 10,
        center: { lat: 32.9, lng: -117.2 },
        mapTypeControl: true,
        streetViewControl: false,
        gestureHandling: 'greedy',
        fullscreenControl: true,
        zoomControl: true,
        styles: mapStyles,
        mapTypeControlOptions: {
            style: google.maps.MapTypeControlStyle.HORIZONTAL_BAR,
            position: google.maps.ControlPosition.TOP_RIGHT,
        },
        // On mobile, pan/info windows clear the bottom Show List button row
        padding: window.innerWidth <= 768 ? { bottom: 70 } : undefined,
    });
    
    infoWindow = new google.maps.InfoWindow();
    loadLocations();
    setupEventListeners();
    loadSheetData();
    document.getElementById('loading').classList.add('hidden');
    updateAllFilterCounts();
    
    // Handle URL parameters for filtering and searching
    const urlParams = new URLSearchParams(window.location.search);
    const searchQuery = urlParams.get('search');
    const filterParam = urlParams.get('filter');
    
    // Apply filter from URL
    if (filterParam === 'roasters') {
        document.getElementById('filterCafes').checked = false;
        applyFilters();
    } else if (filterParam === 'cafes') {
        document.getElementById('filterRoasters').checked = false;
        applyFilters();
    } else if (filterParam === 'online') {
        document.getElementById('filterRoasters').checked = false;
        document.getElementById('filterCafes').checked = false;
        applyFilters();
    }
    
    // Apply search from URL
    if (searchQuery) {
        document.getElementById('searchInput').value = searchQuery;
        performSearch();
    }

    // Handle ?location=id deep links from share button
    const locationParam = urlParams.get('location');
    if (locationParam) {
        setTimeout(() => {
            const loc = allLocations.find(l => l.id === locationParam);
            const marker = markers.find(m => m.locationData?.id === locationParam);
            if (marker && loc) {
                map.setZoom(16);
                map.panTo(marker.getPosition());
                setTimeout(() => showInfoWindow(marker, loc), 300);
                selectLocationCard(locationParam);
            }
        }, 800);
    }
}

function loadLocations() {
    allLocations = COFFEE_LOCATIONS;
    allLocations.forEach(location => {
        if (!location.basicInfo?.onlineOnly) {
            createMarker(location);
        }
    });
    
    // Custom renderer for color-coded clusters
    const renderer = {
        render: ({ count, position, markers }) => {
            // Count types in this cluster
            let roasterCount = 0;
            markers.forEach(m => {
                if (m.locationType === 'roaster') roasterCount++;
            });
            
            // Determine color based on majority
            const color = roasterCount > markers.length / 2 ? '#0F9D58' : '#0288D1';
            
            return new google.maps.Marker({
                position,
                icon: {
                    url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
                            <circle cx="30" cy="30" r="28" fill="${color}" opacity="0.3"/>
                            <circle cx="30" cy="30" r="20" fill="${color}" opacity="0.6"/>
                            <circle cx="30" cy="30" r="15" fill="white" stroke="${color}" stroke-width="2"/>
                            <text x="30" y="36" text-anchor="middle" fill="${color}" font-size="14" font-weight="bold" font-family="Arial">${count}</text>
                        </svg>
                    `)}`,
                    scaledSize: new google.maps.Size(60, 60),
                },
                zIndex: Number(google.maps.Marker.MAX_ZINDEX) + count,
            });
        }
    };
    
    markerCluster = new markerClusterer.MarkerClusterer({ 
        map,
        markers: markers,
        algorithmOptions: { maxZoom: 14 },
        renderer: renderer
    });
    
    fitMapToBounds();
    const initialOnlineCount = allLocations.filter(loc => loc.basicInfo?.onlineOnly).length;
    updateVisibleCount(markers.length + initialOnlineCount);
    renderLocationCards(markers);
}

function createMarker(location) {
    const markerColor = location.basicInfo.type === 'roaster' ? 
        'http://maps.google.com/mapfiles/ms/icons/green-dot.png' :
        'http://maps.google.com/mapfiles/ms/icons/blue-dot.png';
    
    const marker = new google.maps.Marker({
        position: {
            lat: location.basicInfo.address.coordinates.lat,
            lng: location.basicInfo.address.coordinates.lng
        },
        map: null,
        title: location.basicInfo.name,
        icon: markerColor,
        locationType: location.basicInfo.type,
        locationData: location,
    });
    
    marker.addListener('click', () => {
        showInfoWindow(marker, location);
        // Highlight the card
        document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));
        const card = document.querySelector(`.location-card[data-id="${location.id}"]`);
        if (card) card.classList.add('active');
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    // Map → List: hovering a marker highlights its card
    marker.addListener('mouseover', () => {
        const card = document.querySelector(`.location-card[data-id="${location.id}"]`);
        if (card) card.classList.add('map-hover');
    });
    marker.addListener('mouseout', () => {
        const card = document.querySelector(`.location-card[data-id="${location.id}"]`);
        if (card) card.classList.remove('map-hover');
    });

    markers.push(marker);
}

function showInfoWindow(marker, location) {
    infoWindow.setContent(createInfoWindowContent(location, sheetDataByLocation[location.id] || {}));
    infoWindow.open(map, marker);
}

function createInfoWindowContent(location, custom) {
    custom = custom || {};
    const info = location.basicInfo;
    const hours = location.hours || {};
    const contact = info.contact || {};
    const jsDay = new Date().getDay(); // 0=Sun, weekdayDescriptions is Mon-indexed
    const monIdx = jsDay === 0 ? 6 : jsDay - 1;
    const todayEntry = hours.weekdayDescriptions ? hours.weekdayDescriptions[monIdx] : '';
    const todayHours = todayEntry ? todayEntry.replace(/^\w+:\s*/, '') : '';
    const isOnline = info.onlineOnly || location.basicInfo?.onlineOnly || false;
    const isRoaster = info.type === 'roaster';
    const typeLabel = isOnline ? '🌐 Online Roaster' : (isRoaster ? '📍 Roaster' : '☕ Multi-Roaster Cafe');
    const hasUserLocation = userLocationMarker !== null;

    let html = `<div class="info-window"><h3>${info.name}</h3>`;

    // Line 1: type badge + address (clickable Google Maps link)
    const mapsUrl = contact.googleMapsUrl || (info.address.fullAddress ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(info.address.fullAddress)}` : null);
    const addrText = isOnline ? 'Online Only' : (info.address.street || info.address.fullAddress || '');
    const addrLink = mapsUrl && addrText ? `<a href="${mapsUrl}" target="_blank" style="color:#5a8fc2; text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${addrText}</a>` : addrText;
    html += `<div class="info-window-section" style="font-size:0.73rem; color:#666; margin-bottom:0.15rem;">`;
    html += `<span style="font-weight:600; color:#8B6552; margin-right:0.4rem;">${typeLabel}</span>`;
    if (addrText) html += `<span style="color:#bbb;">·</span> <span style="margin-left:0.3rem;">${addrLink}</span>`;
    html += `</div>`;

    // Line 2: hours + website (only if either exists)
    const line2Parts = [];
    if (todayHours) line2Parts.push(`<span>🕐 ${todayHours}</span>`);
    if (contact.website) line2Parts.push(`<a href="${contact.website}" target="_blank" style="color:#5a8fc2; text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">🌐 Website</a>`);
    if (line2Parts.length) {
        html += `<div class="info-window-section" style="font-size:0.72rem; color:#777; margin-bottom:0.25rem;">${line2Parts.join(' <span style="color:#ddd; margin:0 0.3rem;">·</span> ')}</div>`;
    }

    // ── Coffee details from Sheet ──────────────────────────────────────
    const hasAnyCustom = custom.description || custom.roastScale || custom.roastStyle ||
                         custom.visitorExperience || custom.multipleLocations ||
                         custom.amenities?.length || custom.roastersServed?.length;

    if (hasAnyCustom) {
        html += `<hr class="info-window-divider">`;

        if (custom.description) {
            html += `<div class="info-window-description">"${custom.description}"</div>`;
        }

        const gridItems = [];
        if (isRoaster) {
            if (custom.roastScale) gridItems.push(['Roast Scale', custom.roastScale + ' Roaster']);
            if (custom.visitorExperience) gridItems.push(['Experience', custom.visitorExperience]);
        } else {
            if (custom.roastersServed?.length) {
                const preview = custom.roastersServed.slice(0, 2).join(', ') + (custom.roastersServed.length > 2 ? ` +${custom.roastersServed.length - 2} more` : '');
                gridItems.push(['Roasters', preview]);
            }
            if (custom.specialtyBarista) gridItems.push(['Specialty Barista', custom.specialtyBarista]);
        }
        if (custom.multipleLocations) gridItems.push(['Multiple Locations', custom.multipleLocations]);

        if (gridItems.length) {
            html += `<div class="info-window-coffee-grid">`;
            gridItems.forEach(([label, val], i) => {
                if (i > 0) html += `<span class="cg-sep">·</span>`;
                html += `<span class="cg-item"><span class="cg-label">${label}</span><span class="cg-val">${val}</span></span>`;
            });
            html += `</div>`;
        }

        if (custom.amenities?.length) {
            const a = custom.amenities;
            const amenityBits = [];
            if (a.some(x => x.includes('Dog')))                             amenityBits.push('🐾 Dog Friendly');
            if (a.some(x => x.includes('Wifi') || x.includes('Working')))   amenityBits.push('💻 WiFi');
            if (a.some(x => x.includes('Food') || x.includes('Pastries')))  amenityBits.push('🥐 Food');
            if (a.some(x => x.includes('Beans Online')))                     amenityBits.push('🛒 Online Beans');
            if (a.some(x => x.includes('Decaf')))                            amenityBits.push('☕ Decaf');
            if (a.some(x => x.includes('Seating')))                          amenityBits.push('🪑 Seating');
            if (amenityBits.length) {
                html += `<div class="info-window-badges-row">`;
                amenityBits.forEach(b => { html += `<span class="info-window-badge yes">${b}</span>`; });
                html += `</div>`;
            }
        }
    }

    // ── Buttons ────────────────────────────────────────────────────────
    const shareUrl = `${window.location.origin}${window.location.pathname}?location=${encodeURIComponent(location.id)}`;

    // Each button is full-width stacked — no flex squishing, no clipping possible
    const w = 'display:block;width:100%;box-sizing:border-box;text-align:center;margin-bottom:0.3rem;';
    const primaryBtn = `<a href="location.html?id=${location.id}" class="directions-btn" style="${w}background:#6F4E37;color:white !important;">&#128203; View Details</a>`;
    const editBtn    = `<a href="edit.html?id=${location.id}&return=map.html" class="directions-btn" style="${w}background:transparent;color:#6B4E3D !important;border-color:#C8B9AC;">&#9999;&#65039; Suggest Edit</a>`;
    const shareBtn   = `<button onclick="copyShareLink('${shareUrl}', this)" class="directions-btn" style="${w}background:transparent;color:#6B4E3D !important;border-color:#C8B9AC;cursor:pointer;">&#128279; Share Location</button>`;

    let dirBtn = '';
    if (hasUserLocation && !isOnline) {
        const lat = info.address.coordinates.lat;
        const lng = info.address.coordinates.lng;
        const userPos = userLocationMarker.getPosition();
        const directionsUrl = `https://www.google.com/maps/dir/${userPos.lat()},${userPos.lng()}/${lat},${lng}`;
        dirBtn = `<a href="${directionsUrl}" target="_blank" class="directions-btn" style="${w}background:#2e7d32;color:white !important;">&#129517; Get Directions</a>`;
    }

    html += `<div style="margin-top:0.6rem;">${primaryBtn}${editBtn}${dirBtn}${shareBtn}</div></div>`;
    return html;
}

function setupAutocomplete() {
    const searchInput = document.getElementById('searchInput');
    const dropdown = document.getElementById('autocompleteDropdown');
    let searchTimeout;
    
    console.log('🔧 Setting up autocomplete (existing locations only)...');
    
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        
        clearTimeout(searchTimeout);
        
        if (query.length < 2) {
            dropdown.classList.remove('show');
            return;
        }
        
        console.log('🔍 Searching for:', query);
        
        // Debounce
        searchTimeout = setTimeout(() => {
            updateAutocompleteDropdown(query);
        }, 300);
    });
    
    function updateAutocompleteDropdown(query) {
        // Search our existing locations
        const isZip = /^\d{3,5}$/.test(query.trim());
        const matches = allLocations.filter(loc => {
            const name = loc.basicInfo.name.toLowerCase();
            const address = loc.basicInfo.address.fullAddress?.toLowerCase() || '';
            const zip = (loc.basicInfo.address.zip || '').trim();
            if (isZip) {
                return zip.startsWith(query) || address.includes(query.toLowerCase());
            }
            return name.includes(query.toLowerCase()) || address.includes(query.toLowerCase());
        }).slice(0, 8); // Show up to 8 results
        
        console.log('📍 Found', matches.length, 'matches');
        
        if (matches.length === 0) {
            dropdown.classList.remove('show');
            return;
        }
        
        let html = '';
        
        matches.forEach((loc) => {
            const isOnlineLoc = loc.basicInfo?.onlineOnly || false;
            const typeClass = loc.basicInfo.type === 'roaster' ? 'roaster' : 'cafe';
            const typeBase = isOnlineLoc ? '🌐 Online Roaster' : (loc.basicInfo.type === 'roaster' ? '📍 Roaster' : '☕ Cafe');
            const neighborhood = loc.coffeeDetails?.neighborhood || '';
            const typeLabel = neighborhood ? `${typeBase} · ${neighborhood}` : typeBase;
            html += `
                <div class="autocomplete-item" data-type="existing" data-id="${loc.id}" style="cursor: pointer;">
                    <span class="autocomplete-name">${loc.basicInfo.name}</span>
                    <span class="autocomplete-type ${typeClass}">${typeLabel}</span>
                </div>`;
        });
        
        // For zip code searches, append a "show all" prompt at the bottom
        if (isZip && matches.length > 0) {
            html += `
                <div class="autocomplete-item autocomplete-zip-all" style="cursor:pointer; border-top: 1px solid #eee; font-style: italic; color: #666;">
                    <span class="autocomplete-name" style="font-size:0.85em;">Press Enter to show all locations in ${query}</span>
                </div>`;
        }

        dropdown.innerHTML = html;
        dropdown.classList.add('show');
        console.log('✅ Dropdown shown with', matches.length, 'results');
        
        // Add click handlers
        dropdown.querySelectorAll('.autocomplete-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const id = item.getAttribute('data-id');
                console.log('📍 Selecting location:', id);
                selectLocation(id);
            });
        });
    }
    
    // Keyboard navigation - Arrow keys + Enter
    searchInput.addEventListener('keydown', (e) => {
        const items = dropdown.querySelectorAll('.autocomplete-item');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            autocompleteIndex = Math.min(autocompleteIndex + 1, items.length - 1);
            items.forEach((item, i) => item.classList.toggle('selected', i === autocompleteIndex));
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            autocompleteIndex = Math.max(autocompleteIndex - 1, 0);
            items.forEach((item, i) => item.classList.toggle('selected', i === autocompleteIndex));
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (autocompleteIndex >= 0) {
                // User arrow-navigated to a specific item — select that single location
                const selectedItem = dropdown.querySelector('.autocomplete-item.selected');
                if (selectedItem) selectLocation(selectedItem.getAttribute('data-id'));
            } else {
                // No item highlighted — run full filter search (works for zip codes & names)
                dropdown.classList.remove('show');
                autocompleteIndex = -1;
                performSearch();
            }
        } else if (e.key === 'Escape') {
            dropdown.classList.remove('show');
            autocompleteIndex = -1;
        }
    });
    
    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('show');
        }
    });
}

function selectLocation(locationId) {
    const location = allLocations.find(loc => loc.id === locationId);
    if (!location) return;
    
    document.getElementById('autocompleteDropdown').classList.remove('show');
    // Clear input so applyFilters doesn't keep calling performSearch on every idle event
    document.getElementById('searchInput').value = '';

    const marker = markers.find(m => m.locationData.id === locationId);
    if (marker) {
        suppressIdleFilter = true;
        map.setZoom(16);
        map.panTo(marker.getPosition());
        setTimeout(() => {
            showInfoWindow(marker, location);
            setTimeout(() => { suppressIdleFilter = false; }, 500);
        }, 300);
    }

    // Highlight and jump card to top of panel
    document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));
    const card = document.querySelector(`.location-card[data-id="${locationId}"]`);
    if (card) {
        card.classList.add('active');
        const panelCards = document.getElementById('locationCards');
        if (panelCards) panelCards.scrollTop = card.offsetTop - panelCards.offsetTop;
    }
}

function updateAllFilterCounts(visibleMarkers) {
    // If visibleMarkers passed (e.g. when Open Now active), count those; otherwise count all
    const source = visibleMarkers || markers;
    const types = {roasters: 0, cafes: 0};
    source.forEach(marker => {
        if (marker.locationType === 'roaster') types.roasters++;
        else types.cafes++;
    });

    // Count online-only separately (they don't have markers)
    const onlineCount = (window.COFFEE_LOCATIONS || []).filter(loc => loc.basicInfo?.onlineOnly).length;

    if (document.getElementById('count-roasters')) document.getElementById('count-roasters').textContent = `(${types.roasters})`;
    if (document.getElementById('count-cafes')) document.getElementById('count-cafes').textContent = `(${types.cafes})`;
    if (document.getElementById('count-online')) document.getElementById('count-online').textContent = `(${onlineCount})`;

}

function fitMapToBounds(useAllMarkers) {
    const bounds = new google.maps.LatLngBounds();
    let hasMarkers = false;
    
    markers.forEach(marker => {
        // useAllMarkers=true: include every marker (used by clear)
        // default: only currently visible markers
        if (useAllMarkers || marker.getMap() !== null) {
            bounds.extend(marker.getPosition());
            hasMarkers = true;
        }
    });
    
    if (hasMarkers) {
        map.fitBounds(bounds);
        const listener = google.maps.event.addListener(map, 'idle', () => {
            if (map.getZoom() > 15) map.setZoom(15);
            google.maps.event.removeListener(listener);
        });
    }
}

function setupEventListeners() {
    setupAutocomplete();
    
    // Enter key handled by keydown listener above (supports zip codes + name search)
    document.getElementById('clearBtn').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('autocompleteDropdown').classList.remove('show');
        // Reset Open Now if active
        if (openNowActive) {
            openNowActive = false;
            const onBtn = document.getElementById('openNowBtn');
            if (onBtn) {
                onBtn.style.background = '';
                onBtn.style.color = '';
                onBtn.style.borderColor = '';
                onBtn.textContent = '🕐 Open Now';
            }
        }
        // Reset all type filters back to checked
        document.getElementById('filterRoasters').checked = true;
        document.getElementById('filterCafes').checked = true;
        const onlineFilter = document.getElementById('filterOnlineOnly');
        if (onlineFilter) onlineFilter.checked = true;
        const nbrFilter = document.getElementById('filterNeighborhood');
        if (nbrFilter) nbrFilter.value = '';

        // Reset nearest sort back to A-Z
        currentSort = 'az';
        document.getElementById('sortAZ').classList.add('active');
        document.getElementById('sortNearest').classList.remove('active');
        pendingScrollTop = true; // renderLocationCards will scroll to top after next render
        // Remove user location marker
        if (userLocationMarker) {
            userLocationMarker.setMap(null);
            userLocationMarker = null;
        }
        userLatLng = null;
        // Show ALL markers then fit bounds.
        // suppressIdleFilter blocks idle events during the animation so the
        // bounds filter doesn't re-run mid-flight. After 600ms the animation
        // is settled, we release the flag and call applyFilters() explicitly
        // with the correct full-SD bounds — works on both desktop and mobile.
        markers.forEach(m => m.setMap(map));
        markerCluster.clearMarkers();
        markerCluster.addMarkers(markers);
        suppressIdleFilter = true;
        fitMapToBounds(true);
        setTimeout(() => {
            suppressIdleFilter = false;
            applyFilters();
        }, 700);
    });
    // Populate neighborhood select with optgroups
    (function buildNeighborhoodSelect() {
        const regionMap = {
            'North County Coastal':  ['Carlsbad','Cardiff-by-the-Sea','Encinitas','Oceanside','Solana Beach'],
            'North County Inland':   ['Escondido','La Mesa','Poway','San Marcos','Vista'],
            'North San Diego Inland': ['Carmel Mountain Ranch','Carmel Valley','Mira Mesa','Rancho Bernardo','Sorrento Valley'],
            'Downtown & Uptown':     ["Banker's Hill",'Downtown','Golden Hill','Hillcrest','Mission Hills','Normal Heights','North Park','South Park'],
            'Beach Communities':     ['Bay Park','Bird Rock','La Jolla','Ocean Beach','Pacific Beach','Point Loma'],
            'Central & East SD':     ['Allied Gardens','Barrio Logan','City Heights','College Area','Del Cerro','El Cajon','Lemon Grove','Logan Heights','Mission Valley','Old Town'],
            'South Bay':             ['Chula Vista','Coronado','Imperial Beach'],
        };
        // Collect neighborhoods that actually exist in the data
        const present = new Set(
            allLocations.map(l => l.coffeeDetails?.neighborhood).filter(Boolean)
        );
        const sel = document.getElementById('filterNeighborhood');
        Object.entries(regionMap)
            .map(([region, hoods]) => [region, hoods.filter(h => present.has(h))])
            .filter(([, inData]) => inData.length > 0)
            .sort(([, a], [, b]) => b.length - a.length)
            .forEach(([region, inData]) => {
                const grp = document.createElement('optgroup');
                grp.label = region;
                inData.forEach(h => {
                    const opt = document.createElement('option');
                    opt.value = h;
                    opt.textContent = h;
                    grp.appendChild(opt);
                });
                sel.appendChild(grp);
            });
    })();

    document.getElementById('filterNeighborhood').addEventListener('change', () => {
        neighborhoodZoomPending = true;
        applyFilters();
    });
    document.getElementById('filterRoasters').addEventListener('change', applyFilters);
    document.getElementById('filterCafes').addEventListener('change', applyFilters);
    if (document.getElementById('filterOnlineOnly')) {
        document.getElementById('filterOnlineOnly').addEventListener('change', applyFilters);
    }

    // Update card list whenever map finishes moving (idle fires once movement settles)
    // Debounced so rapid zoom steps don't re-render on every tick
    let idleDebounce = null;
    google.maps.event.addListener(map, 'idle', () => {
        if (suppressIdleFilter) return;
        clearTimeout(idleDebounce);
        idleDebounce = setTimeout(() => applyFilters(), 150);
    });
    
    document.querySelectorAll('input[name="ratingFilter"]').forEach(radio => {
        radio.addEventListener('change', applyFilters);
    });
    

    
    document.getElementById('toggleFilters').addEventListener('click', () => {
        const panel = document.getElementById('filtersPanel');
        const controls = document.querySelector('.list-panel-controls');
        const isExpanding = !panel.classList.contains('expanded');

        panel.classList.toggle('expanded');
        panel.classList.toggle('overlay-open', isExpanding);

        if (isExpanding && controls) {
            const rect = controls.getBoundingClientRect();
            panel.style.top = rect.bottom + 'px';
            // On desktop: match the width and left of the list panel controls
            if (window.innerWidth > 768) {
                panel.style.left = rect.left + 'px';
                panel.style.width = rect.width + 'px';
            } else {
                panel.style.left = '0';
                panel.style.width = '100%';
            }
        } else if (!isExpanding) {
            // Remove overlay positioning when closing
            panel.style.top = '';
            panel.style.left = '';
            panel.style.width = '';
        }
    });
    
    document.getElementById('showMyLocation').addEventListener('click', showUserLocation);

    // Close filter panel when clicking outside it
    document.addEventListener('click', (e) => {
        const panel = document.getElementById('filtersPanel');
        const toggleBtn = document.getElementById('toggleFilters');
        if (panel && panel.classList.contains('expanded')) {
            if (!panel.contains(e.target) && e.target !== toggleBtn && !toggleBtn.contains(e.target)) {
                panel.classList.remove('expanded', 'overlay-open');
                panel.style.top = '';
                panel.style.left = '';
                panel.style.width = '';
            }
        }
    });
}

function showUserLocation() {
    const floatBtn = document.getElementById('mapFloatNearMe');
    if (floatBtn) { floatBtn.disabled = true; floatBtn.textContent = '⏳'; }
    
    if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const userPos = { lat: position.coords.latitude, lng: position.coords.longitude };
                userLatLng = userPos; // store globally for distance sorting

                if (userLocationMarker) userLocationMarker.setMap(null);
                
                userLocationMarker = new google.maps.Marker({
                    position: userPos,
                    map: map,
                    title: 'Your Location',
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 10,
                        fillColor: '#4285F4',
                        fillOpacity: 1,
                        strokeColor: '#ffffff',
                        strokeWeight: 2
                    },
                    zIndex: 1000
                });
                
                map.setCenter(userPos);
                map.setZoom(12);
                if (floatBtn) { floatBtn.disabled = false; floatBtn.textContent = '📍'; }
                // Hide the location hint now that we have a position
                const hint = document.getElementById('locationHint');
                if (hint) hint.style.display = 'none';

                // Switch to nearest sort and re-render — preserves any active zip/name search
                currentSort = 'nearest';
                document.getElementById('sortNearest').classList.add('active');
                document.getElementById('sortAZ').classList.remove('active');
                applyFilters(); // respects active search query + all other filters
            },
            () => {
                alert('Could not get your location. Please enable location services.');
                if (floatBtn) { floatBtn.disabled = false; floatBtn.textContent = '📍'; }
            }
        );
    }
}

        markerCluster.clearMarkers();
        markerCluster.addMarkers(visibleMarkers);
        updateVisibleCount(visibleMarkers.length);
        renderLocationCards(visibleMarkers);
        
        map.setCenter({ lat: neighborhood.lat, lng: neighborhood.lng });
        map.setZoom(neighborhood.zoom);
        
        setTimeout(() => {
            infoWindow.setContent(`<div class="info-window"><h3>Viewing: ${query.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}</h3><p>Zoomed to show coffee locations in this area</p></div>`);
            infoWindow.setPosition(map.getCenter());
            infoWindow.open(map);
        }, 500);
    } else {
        const isZipSearch = /^\d{5}$/.test(query);

        if (isZipSearch) {
            // Zip search: filter by zip field only (bypass bounds check so current
            // map position doesn't exclude results in the target zip)
            const zipMarkers = markers.filter(marker => {
                const loc = marker.locationData;
                const zip = (loc.basicInfo.address.zip || '').trim();
                const addr = loc.basicInfo.address.fullAddress?.toLowerCase() || '';
                // Type filters still apply
                if (marker.locationType === 'roaster' && !document.getElementById('filterRoasters').checked) return false;
                if (marker.locationType === 'cafe' && !document.getElementById('filterCafes').checked) return false;
                return zip === query || addr.includes(query);
            });

            markerCluster.clearMarkers();
            markerCluster.addMarkers(zipMarkers);
            updateVisibleCount(zipMarkers.length);
            renderLocationCards(zipMarkers);

            // Clear input so idle → applyFilters doesn't re-trigger performSearch loop
            document.getElementById('searchInput').value = '';

            // Zoom to fit the matched markers — no async, no race conditions.
            // If we have matches, fit the map to their bounding box.
            // If somehow no coords, fall back to geocoding the zip.
            suppressIdleFilter = true;
            if (zipMarkers.length > 0) {
                const bounds = new google.maps.LatLngBounds();
                zipMarkers.forEach(m => bounds.extend(m.getPosition()));
                map.fitBounds(bounds);
                // Don't zoom in closer than 14 (single-pin case)
                const listener = google.maps.event.addListener(map, 'idle', () => {
                    if (map.getZoom() > 14) map.setZoom(14);
                    google.maps.event.removeListener(listener);
                    suppressIdleFilter = false;
                });
            } else {
                // No matching markers — geocode and pan to the zip area
                const geocoder = new google.maps.Geocoder();
                geocoder.geocode({ address: query + ', San Diego, CA' }, (results, status) => {
                    if (status === 'OK' && results[0]) {
                        map.fitBounds(results[0].geometry.viewport || results[0].geometry.bounds);
                    }
                    suppressIdleFilter = false;
                });
            }
        } else {
            const visibleMarkers = markers.filter(marker => {
                const location = marker.locationData;
                const name = location.basicInfo.name.toLowerCase();
                const address = location.basicInfo.address.fullAddress?.toLowerCase() || '';
                return (name.includes(query) || address.includes(query)) && shouldShowMarker(marker);
            });

            markerCluster.clearMarkers();
            markerCluster.addMarkers(visibleMarkers);
            updateVisibleCount(visibleMarkers.length);
            renderLocationCards(visibleMarkers);

            if (visibleMarkers.length === 0) {
                searchGooglePlaces(query);
            }
        }
    }
}

// Global variable to track Google Places markers
let googlePlacesMarker = null;

function searchGooglePlaces(query) {
    const service = new google.maps.places.PlacesService(map);
    
    // Search for coffee shops in San Diego area with the query
    const request = {
        query: query + ' coffee San Diego',
        fields: ['name', 'geometry', 'formatted_address', 'place_id', 'rating', 'user_ratings_total', 'formatted_phone_number', 'website', 'opening_hours', 'photos', 'types'],
        locationBias: {
            center: { lat: 32.7157, lng: -117.1611 },
            radius: 50000 // 50km radius around San Diego
        }
    };
    
    service.textSearch(request, (results, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
            const place = results[0];
            
            // Check if this place is a coffee-related business
            const isCoffee = place.types?.some(type => 
                type.includes('cafe') || 
                type.includes('coffee') || 
                type.includes('restaurant') ||
                type.includes('food')
            );
            
            if (isCoffee || true) { // Allow all results for now
                displayGooglePlace(place, query);
            } else {
                showNoResults(query);
            }
        } else {
            showNoResults(query);
        }
    });
}

function displayGooglePlace(place, originalQuery) {
    // Remove any existing Google Places marker
    if (googlePlacesMarker) {
        googlePlacesMarker.setMap(null);
    }
    
    // Create a yellow marker for the Google Places result
    googlePlacesMarker = new google.maps.Marker({
        position: place.geometry.location,
        map: map,
        icon: {
            url: 'http://maps.google.com/mapfiles/ms/icons/yellow-dot.png'
        },
        title: place.name,
        zIndex: 1000
    });
    
    // Center map on the result
    map.setCenter(place.geometry.location);
    map.setZoom(16);
    
    // Get detailed place information (fetch once, reuse on marker click)
    const service = new google.maps.places.PlacesService(map);
    service.getDetails({
        placeId: place.place_id,
        fields: ['name', 'formatted_address', 'formatted_phone_number', 'website', 'rating', 'user_ratings_total', 'opening_hours', 'photos', 'url']
    }, (placeDetails, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK) {
            showGooglePlaceInfo(placeDetails, googlePlacesMarker);
            // Reuse already-fetched data on click instead of calling API again
            googlePlacesMarker.addListener('click', () => {
                showGooglePlaceInfo(placeDetails, googlePlacesMarker);
            });
        }
    });
}
