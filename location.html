<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location — San Diego Specialty Coffee</title>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sandiegocoffee.co/location.html">
    <meta property="og:title" content="Location — San Diego Specialty Coffee">
    <meta property="og:description" content="">
    <meta property="og:image" content="https://sandiegocoffee.co/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Location — San Diego Specialty Coffee">
    <meta name="twitter:description" content="">
    <meta name="twitter:image" content="https://sandiegocoffee.co/og-image.png">
    <meta name="description" content="">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
    <script type="application/ld+json" id="ld-schema"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,400;0,600;0,800;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --espresso: #3D2817;
            --coffee-brown: #6B4E3D;
            --cream: #F8F5F0;
            --white: #FFFFFF;
            --latte: #C4A77D;
            --accent-red: #B85C38;
            --warm-brown: #5C4033;
            --light-tan: #E8DED2;
            --green: #2D6A4F;
            --green-light: #EAF4EE;
            --roaster-color: #0F9D58;
            --cafe-color: #0288D1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Libre Franklin', sans-serif;
            color: var(--espresso);
            background: var(--cream);
            line-height: 1.6;
        }

        /* ── Header ─────────────────────────────────────────────────────── */
        header {
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent, transparent 39px,
                    rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent, transparent 39px,
                    rgba(255,255,255,0.016) 39px, rgba(255,255,255,0.016) 40px
                ),
                linear-gradient(160deg, #2A1508 0%, #4A2C18 45%, #3A2010 75%, #2A1508 100%);
            color: var(--white);
            border-top: 3px solid var(--accent-red);
            border-bottom: 3px solid var(--accent-red);
            position: sticky;
            top: 0;
            z-index: 100;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 120% at 0% 50%, rgba(0,0,0,0.38) 0%, transparent 65%),
                radial-gradient(ellipse 55% 120% at 100% 50%, rgba(0,0,0,0.38) 0%, transparent 65%);
            pointer-events: none;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.85rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .header-brand-eyebrow {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(196,167,125,0.6);
            margin-bottom: 0.5rem;
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.45rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1;
            color: #EDE0CC;
            text-decoration: none;
            display: block;
        }

        .header-logo em {
            font-style: italic;
            color: #C9A97E;
            font-weight: 400;
        }

        .header-logo strong {
            font-family: 'Playfair Display', serif;
            font-style: normal;
            font-weight: 800;
            color: #EDE0CC;
            letter-spacing: -0.01em;
        }

        .header-subtitle {
            font-size: 0.6rem;
            color: rgba(196,167,125,0.55);
            margin-top: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        /* ── Hamburger Nav ───────────────────────────────────────────── */
        .nav-toggle {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            background: rgba(196,167,125,0.08);
            border: 1px solid rgba(196,167,125,0.4);
            color: rgba(196,167,125,0.9);
            padding: 0.5rem 0.9rem;
            cursor: pointer;
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 0;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-toggle-icon { font-size: 1.15rem; line-height: 1; }

        .nav-toggle:hover, .nav-toggle.open {
            border-color: var(--latte);
            color: var(--latte);
            background: rgba(196,167,125,0.13);
        }

        .nav-dropdown {
            display: none;
            position: fixed;
            background: #2A1508;
            border-left: 1px solid rgba(196,167,125,0.25);
            border-bottom: 1px solid rgba(196,167,125,0.25);
            border-top: 2px solid var(--accent-red);
            min-width: 210px;
            z-index: 9999;
            box-shadow: -4px 8px 32px rgba(0,0,0,0.45);
        }

        .nav-dropdown.open { display: block; }

        .nav-dropdown a {
            display: block;
            padding: 0.9rem 1.5rem;
            color: rgba(196,167,125,0.8);
            text-decoration: none;
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(196,167,125,0.1);
            transition: background 0.15s, color 0.15s;
        }

        .nav-dropdown a:last-child { border-bottom: none; }

        .nav-dropdown a:hover {
            background: rgba(196,167,125,0.1);
            color: var(--latte);
        }

        .nav-dropdown a.active {
            color: var(--latte);
            border-left: 3px solid var(--accent-red);
            padding-left: calc(1.5rem - 3px);
        }

        /* ── Loading / Error states ─────────────────────────────────────── */
        .state-container {
            max-width: 700px;
            margin: 6rem auto;
            text-align: center;
            padding: 0 2rem;
        }

        .state-container h2 {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--espresso);
        }

        .state-container p { color: var(--coffee-brown); margin-bottom: 2rem; }

        .btn-back {
            display: inline-block;
            background: var(--coffee-brown);
            color: white;
            padding: 0.75rem 1.75rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 3px;
        }

        /* ── Hero ───────────────────────────────────────────────────────── */
        .hero {
            background: linear-gradient(135deg, var(--espresso) 0%, var(--warm-brown) 100%);
            padding: 1.5rem 2rem 0;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 40px,
                rgba(255,255,255,0.015) 40px,
                rgba(255,255,255,0.015) 41px
            );
        }

        .hero-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--latte);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: white; }

        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.85rem;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.85rem;
        }

        .type-badge.roaster {
            background: rgba(15, 157, 88, 0.2);
            color: #6FCF97;
            border: 1px solid rgba(15, 157, 88, 0.3);
        }

        .type-badge.cafe {
            background: rgba(2, 136, 209, 0.2);
            color: #7EC8E3;
            border: 1px solid rgba(2, 136, 209, 0.3);
        }

        .hero h1 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 600;
            color: var(--white);
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 0.6rem;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            padding-bottom: 1.25rem;
        }

        .rating-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            width: 16px;
            height: 16px;
            fill: #FFA000;
        }

        .star.half { fill: url(#halfGrad); }
        .star.empty { fill: rgba(255,255,255,0.2); }

        .rating-num {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
        }

        .rating-count {
            font-size: 0.85rem;
            color: var(--latte);
        }

        .rating-link {
            font-size: 0.78rem;
            color: var(--latte);
            text-decoration: underline;
            transition: color 0.2s;
        }

        .rating-link:hover { color: white; }

        .hero-address {
            color: var(--latte);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* ── Photo Gallery ──────────────────────────────────────────────── */
        .gallery-section {
            background: var(--espresso);
            border-bottom: 3px solid var(--accent-red);
        }

        .gallery-track {
            display: flex;
            gap: 3px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            max-width: 100%;
        }

        .gallery-track::-webkit-scrollbar { display: none; }

        .gallery-photo {
            flex-shrink: 0;
            height: 200px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .gallery-photo:first-child { flex: 2; min-width: 300px; }
        .gallery-photo:not(:first-child) { flex: 1; min-width: 160px; }

        .gallery-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }

        .gallery-photo:hover img { transform: scale(1.04); }

        .gallery-placeholder {
            background: linear-gradient(135deg, var(--warm-brown) 0%, var(--espresso) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            height: 140px;
            color: var(--latte);
        }

        .gallery-placeholder-initials {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: rgba(196, 167, 125, 0.9);
            letter-spacing: 0.08em;
            line-height: 1;
        }
        .gallery-placeholder .placeholder-icon {
            font-size: 4rem;
            opacity: 0.4;
        }

        .gallery-placeholder p {
            font-size: 0.85rem;
            opacity: 0.5;
            font-style: italic;
        }

        .gallery-hero {
            position: relative;
            width: 100%;
            height: 260px;
            overflow: hidden;
        }

        .gallery-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-maps-link {
            position: absolute;
            bottom: 0.75rem;
            right: 0.75rem;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 0.78rem;
            padding: 0.35rem 0.7rem;
            border-radius: 4px;
            text-decoration: none;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }

        .gallery-maps-link:hover {
            background: rgba(0,0,0,0.8);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.open { display: flex; }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .lightbox-close:hover { opacity: 1; }

        /* ── Main Content ───────────────────────────────────────────────── */
        .content-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 2rem;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 2.5rem;
            align-items: start;
        }

        /* ── Left Column ────────────────────────────────────────────────── */

        /* Hours */
        .section {
            margin-bottom: 1.75rem;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent-red);
            margin-bottom: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--light-tan);
        }

        .hours-grid {
            display: grid;
            gap: 0;
        }

        .hours-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.85rem;
            border-bottom: 1px solid var(--light-tan);
            font-size: 0.88rem;
            transition: background 0.15s;
        }

        .hours-row:first-child { border-top: 1px solid var(--light-tan); }

        .hours-row.today {
            background: var(--cream);
            border-left: 3px solid var(--accent-red);
            font-weight: 600;
        }

        .hours-row .day { color: var(--coffee-brown); }
        .hours-row.today .day { color: var(--espresso); }

        .hours-row .time { color: var(--espresso); font-variant-numeric: tabular-nums; }

        .today-tag {
            background: var(--accent-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.15rem 0.4rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 2px;
            margin-left: 0.5rem;
        }

        .open-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .open-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .open-status.open .dot { background: #0F9D58; }
        .open-status.open { color: #0F9D58; }
        .open-status.closed .dot { background: #E53935; }
        .open-status.closed { color: #E53935; }

        /* Contact */
        .contact-grid {
            display: grid;
            gap: 0.75rem;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--white);
            border: 1px solid var(--light-tan);
            border-left: 3px solid transparent;
            transition: border-left-color 0.2s;
        }

        .contact-item:hover { border-left-color: var(--accent-red); }

        .contact-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

        .contact-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--coffee-brown);
            margin-bottom: 0.15rem;
        }

        .contact-value {
            font-size: 0.9rem;
            color: var(--espresso);
            word-break: break-all;
        }

        .contact-value a {
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-value a:hover { text-decoration: underline; }

        /* Description */
        .description-text {
            font-family: 'Lora', serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--coffee-brown);
            font-style: italic;
            padding: 1.25rem 1.5rem;
            background: var(--white);
            border-left: 3px solid var(--accent-red);
        }

        /* ── Right Column — Coffee Details Card ─────────────────────────── */
        .details-card {
            background: var(--white);
            border: 1px solid var(--light-tan);
            border-top: 3px solid var(--accent-red);
        }

        .suggest-edit-btn {
            display: block;
            margin-top: 0.75rem;
            margin-bottom: 2rem;
            padding: 0.7rem 1rem;
            background: transparent;
            border: 2px solid var(--light-tan);
            color: var(--coffee-brown);
            text-align: center;
            text-decoration: none;
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: all 0.2s;
        }
        .suggest-edit-btn:hover {
            border-color: var(--coffee-brown);
            background: var(--cream);
        }

        .details-card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--light-tan);
            background: var(--cream);
        }

        .details-card-header h2 {
            font-family: 'Lora', serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--espresso);
        }

        .details-card-header p {
            font-size: 0.78rem;
            color: #999;
            margin-top: 0.2rem;
        }

        .detail-rows { padding: 0.5rem 0; }

        .detail-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--light-tan);
        }

        .detail-row:last-child { border-bottom: none; }

        .detail-key {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--coffee-brown);
            flex-shrink: 0;
            padding-top: 1px;
        }

        .detail-val {
            font-size: 0.88rem;
            color: var(--espresso);
            text-align: right;
            line-height: 1.4;
        }

        .detail-val.unknown { color: #bbb; font-style: italic; }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            justify-content: flex-end;
        }

        .tag {
            background: var(--cream);
            border: 1px solid var(--light-tan);
            color: var(--coffee-brown);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.55rem;
            border-radius: 2px;
        }

        .bool-yes {
            color: var(--green);
            font-weight: 700;
        }

        .bool-no { color: #bbb; }

        /* ── Map Embed ──────────────────────────────────────────────────── */
        .map-section {
            background: var(--white);
            border-top: 2px solid var(--light-tan);
        }

        .map-section-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .map-section h2 {
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: var(--espresso);
        }

        .map-embed {
            width: 100%;
            height: 340px;
            border: none;
            border-top: 3px solid var(--accent-red);
        }

        /* ── Action Buttons ─────────────────────────────────────────────── */
        .action-strip {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem 3rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 1.75rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 3px;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }

        .action-btn.primary {
            background: var(--accent-red);
            color: white;
        }

        .action-btn.primary:hover { background: #a04e30; transform: translateY(-1px); }

        .action-btn.secondary {
            background: var(--white);
            color: var(--coffee-brown);
            border: 2px solid var(--coffee-brown);
        }

        .action-btn.secondary:hover { background: var(--cream); }

        /* ── Footer ─────────────────────────────────────────────────────── */
        footer {
            background: var(--espresso);
            color: var(--latte);
            text-align: center;
            padding: 2rem;
            font-size: 0.85rem;
            border-top: 3px solid var(--accent-red);
        }

        footer a { color: var(--latte); }
        footer a:hover { color: white; }

        /* Right column — sits in natural layout position, does not follow scroll */
        .right-col {
            position: static;
        }


        /* ── Responsive ─────────────────────────────────────────────────── */
        @media (max-width: 900px) {
            .content-wrap {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .details-card { position: static; }
            .gallery-photo:first-child { min-width: 240px; }
            .gallery-photo:not(:first-child) { min-width: 150px; }
            .gallery-photo { height: 160px; }

        }

        @media (max-width: 600px) {
            .hero { padding: 1rem 1.25rem 0; }
            .content-wrap { padding: 1.5rem 1.25rem; }
            .action-strip { padding: 0 1.25rem 2rem; flex-direction: column; }
            .action-btn { justify-content: center; }

        /* Animate in */

            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }

        .fade-up:nth-child(1) { animation-delay: 0.05s; }
        .fade-up:nth-child(2) { animation-delay: 0.1s; }
        .fade-up:nth-child(3) { animation-delay: 0.15s; }
        .fade-up:nth-child(4) { animation-delay: 0.2s; }

        /* ── Community Likes ────────────────────────────────────────────── */
        .like-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.75rem;

            display: inline-flex;
            align-items: center;

            cursor: pointer;

            border-color: var(--accent-red);

            background: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
        }

        .like-btn:disabled { opacity: 0.6; cursor: default; }

        .like-count-text {
            font-size: 0.82rem;
            color: #aaa;
            font-style: italic;
        }

        /* ── Community Reviews ──────────────────────────────────────────── */
        .review-item {
            padding: 1rem 1.25rem;
            background: var(--white);
            border: 1px solid var(--light-tan);
            border-left: 3px solid var(--latte);
            margin-bottom: 0.75rem;
        }

        .review-text {
            font-family: 'Lora', serif;
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--coffee-brown);
            font-style: italic;
            margin-bottom: 0.35rem;
        }

        .review-meta {
            font-size: 0.72rem;
            color: #aaa;
            font-family: 'Libre Franklin', sans-serif;
        }

        .review-textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--light-tan);
            background: var(--white);
            font-family: 'Lora', serif;
            font-size: 0.95rem;
            color: var(--espresso);
            resize: vertical;
            min-height: 90px;
            outline: none;
            transition: border-color 0.2s;
            display: block;
            box-sizing: border-box;
        }

        .review-textarea:focus { border-color: var(--accent-red); }

        .review-submit-btn {
            margin-top: 0.5rem;
            padding: 0.65rem 1.5rem;
            background: var(--coffee-brown);
            color: white;
            border: 2px solid var(--coffee-brown);
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;

        .review-submit-btn:hover { background: var(--accent-red); border-color: var(--accent-red); }
        .review-submit-btn:disabled { opacity: 0.6; cursor: default; }

        .review-form-msg {

<body>

    <!-- Footer -->
    <footer>
        <p>Community-driven guide for <a href="https://reddit.com/r/SanDiegoCoffeeBeans" target="_blank">r/SanDiegoCoffeeBeans</a></p>
        <p style="margin-top:0.5rem; opacity:0.5; font-size:0.78rem;"><span id="footerCount">150+</span> locations and counting</p>
    </footer>

    <script src="locations.js"></script>
    <script>
        // Footer count
        (function() {
            const fc = document.getElementById('footerCount');
            if (fc && window.COFFEE_LOCATIONS) fc.textContent = window.COFFEE_LOCATIONS.length;
        })();

        // Nav dropdown
        (function() {
            const toggle = document.getElementById('navToggle');
            const dropdown = document.getElementById('navDropdown');
            if (!toggle || !dropdown) return;
            function closeNav() {
                dropdown.classList.remove('open');
                toggle.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
                toggle.querySelector('.nav-toggle-icon').textContent = '≡';
                toggle.querySelector('.nav-toggle-label').textContent = 'Menu';
            }
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                if (dropdown.classList.contains('open')) {
                    closeNav();
                } else {
                    toggle.querySelector('.nav-toggle-icon').textContent = '✕';
                    toggle.querySelector('.nav-toggle-label').textContent = 'Close';
                    toggle.classList.add('open');
                    toggle.setAttribute('aria-expanded', 'true');
                    const hBottom = document.querySelector('header').getBoundingClientRect().bottom;
                    const tRect = toggle.getBoundingClientRect();
                    dropdown.style.top = hBottom + 'px';
                    dropdown.style.right = Math.max(0, document.documentElement.clientWidth - tRect.right) + 'px';
                    dropdown.classList.add('open');
                }
            });
            document.addEventListener('click', closeNav);
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeNav(); });
        })();

        const API_KEY = 'AIzaSyDFVEZE3Q0NBXY15rL6muwB8nNATPftOmI';
        const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

        // ── Get location from URL ──────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const locationId = params.get('id');
        const fromParam = params.get('from');
        const highlightId = params.get('highlightId');

        let backHref, backLabel, useHistoryBack = false;
        if (fromParam === 'home') {
            backHref  = 'index.html';
            backLabel = '← Back to Homepage';
        } else if (fromParam === 'highlight' && highlightId) {
            backHref  = `highlight.html?id=${highlightId}`;
            backLabel = '← Back to Roaster Highlight';
        } else {
            backHref  = 'map.html';
            backLabel = '← Back to Map';
            useHistoryBack = true;
        }

        if (!locationId) {
            showError('No location specified.', 'Head back to the map to find a location.');
        } else {
            const location = (window.COFFEE_LOCATIONS || []).find(l => l.id === locationId);
            if (!location) {
                showError('Location not found.', 'This location may have been removed or the link is incorrect.');
            } else {
                document.title = location.basicInfo.name + ' — San Diego Specialty Coffee';
                const ogTitle = document.querySelector('meta[property="og:title"]');
                if (ogTitle) ogTitle.content = location.basicInfo.name + ' — San Diego Specialty Coffee';
                // Set canonical
                let canonical = document.querySelector('link[rel="canonical"]');
                if (!canonical) { canonical = document.createElement('link'); canonical.rel = 'canonical'; document.head.appendChild(canonical); }
                canonical.href = `https://sandiegocoffee.co/location.html?id=${locationId}`;
                const ogDesc = document.querySelector('meta[property="og:description"]');
                if (ogDesc && location.coffeeDetails?.description) ogDesc.content = location.coffeeDetails.description;
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc && location.coffeeDetails?.description) metaDesc.content = location.coffeeDetails.description;
                const ogUrl = document.querySelector('meta[property="og:url"]');
                if (ogUrl) ogUrl.content = 'https://sandiegocoffee.co/location.html?id=' + location.id;
                const ogImage = document.querySelector('meta[property="og:image"]');
                if (ogImage && location.localImage) ogImage.content = 'https://sandiegocoffee.co' + location.localImage;
                const twTitle = document.querySelector('meta[name="twitter:title"]');
                if (twTitle) twTitle.content = location.basicInfo.name + ' — San Diego Specialty Coffee';
                const twDesc = document.querySelector('meta[name="twitter:description"]');
                if (twDesc && location.coffeeDetails?.description) twDesc.content = location.coffeeDetails.description;
                const twImage = document.querySelector('meta[name="twitter:image"]');
                if (twImage && location.localImage) twImage.content = 'https://sandiegocoffee.co' + location.localImage;

                // ── JSON-LD LocalBusiness schema ──────────────────────────
                (function injectSchema(loc) {
                    function parseTime(str) {
                        var m = str.match(/(\d+):(\d+)\s*(AM|PM)/i);
                        if (!m) return null;
                        var h = parseInt(m[1]), mins = m[2], ampm = m[3].toUpperCase();
                        if (ampm === 'PM' && h !== 12) h += 12;
                        if (ampm === 'AM' && h === 12) h = 0;
                        return String(h).padStart(2, '0') + ':' + mins;
                    }
                    var dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
                    var hoursSpecs = [];
                    (loc.hours && loc.hours.weekdayDescriptions || []).forEach(function(desc) {
                        var ci = desc.indexOf(':');
                        if (ci === -1) return;
                        var day = desc.slice(0, ci).trim();
                        var range = desc.slice(ci + 1).trim();
                        if (range.toLowerCase() === 'closed') return;
                        var parts = range.split(/\s*[–—-]\s*/);
                        if (parts.length !== 2) return;
                        var opens = parseTime(parts[0].trim());
                        var closes = parseTime(parts[1].trim());
                        if (!opens || !closes) return;
                        if (dayNames.indexOf(day) === -1) return;
                        hoursSpecs.push({
                            '@type': 'OpeningHoursSpecification',
                            dayOfWeek: 'https://schema.org/' + day,
                            opens: opens,
                            closes: closes
                        });
                    });

                    var addr = loc.basicInfo.address || {};
                    var contact = loc.basicInfo.contact || {};
                    var rating = loc.googleRating || {};
                    var type = loc.basicInfo.type === 'cafe' ? 'CafeOrCoffeeShop' : 'LocalBusiness';

                    var schema = {
                        '@context': 'https://schema.org',
                        '@type': type,
                        name: loc.basicInfo.name,
                        url: contact.website || ('https://sandiegocoffee.co/location.html?id=' + loc.id),
                        image: loc.localImage ? 'https://sandiegocoffee.co' + loc.localImage : undefined,
                        telephone: contact.phone || undefined,
                        address: {
                            '@type': 'PostalAddress',
                            streetAddress: addr.street || undefined,
                            addressLocality: addr.city || undefined,
                            addressRegion: addr.state || undefined,
                            postalCode: addr.zip || undefined,
                            addressCountry: 'US'
                        },
                        geo: (addr.coordinates && addr.coordinates.lat) ? {
                            '@type': 'GeoCoordinates',
                            latitude: addr.coordinates.lat,
                            longitude: addr.coordinates.lng
                        } : undefined,
                        aggregateRating: (rating.rating && rating.reviewCount) ? {
                            '@type': 'AggregateRating',
                            ratingValue: rating.rating,
                            reviewCount: rating.reviewCount,
                            bestRating: 5
                        } : undefined,
                        openingHoursSpecification: hoursSpecs.length ? hoursSpecs : undefined,
                        sameAs: contact.googleMapsUrl || undefined
                    };

                    // Strip undefined values
                    schema = JSON.parse(JSON.stringify(schema));

                    var tag = document.getElementById('ld-schema');
                    if (tag) tag.textContent = JSON.stringify(schema);
                })(location);

                // coffeeDetails is always populated by sync-locations.js — no live Sheets fetch needed
                renderPage(location, location.coffeeDetails || {});
                loadCommunityData(location.id);
            }
        }

        // ── Render ─────────────────────────────────────────────────────────
        function renderPage(loc, custom) {
            custom = custom || {};
            const info = loc.basicInfo;
            const isRoaster = info.type === 'roaster';
            const rating = loc.googleRating || {};
            const hours = loc.hours || {};
            const contact = info.contact || {};
            const placeId = loc.googleData?.placeId || '';
            const today = new Date().getDay(); // 0=Sun

            document.getElementById('pageContent').innerHTML = `
                ${renderHero(loc, isRoaster, rating, info, contact, today, hours)}
                ${renderGallery(loc.localImage, loc.localImage2, loc.localImage3, placeId, info.name)}
                <div class="content-wrap">
                    <div class="left-col fade-up">
                        ${renderDescription(custom, loc.legacyData)}
                        ${renderDetailsCard(isRoaster, custom, loc)}
                        ${renderContact(contact, info, custom)}
                    </div>
                    <div class="right-col fade-up">
                        ${renderHours(hours, today)}
                        <div id="community-like-section"></div>
                        <div id="community-reviews-section"></div>
                    </div>
                </div>
                ${renderActions(contact, placeId)}
                ${renderMapEmbed(placeId)}
            `;

            // Use history.back() for map navigation so filters/zoom are preserved
            if (useHistoryBack && window.history.length > 1 && document.referrer) {
                document.querySelectorAll('a[href="map.html"]').forEach(el => {
                    el.addEventListener('click', e => { e.preventDefault(); history.back(); });
                });
            }
        }

        function renderHero(loc, isRoaster, rating, info, contact, today, hours) {
            const typeLabel = info.onlineOnly ? '🌐 Online Only Roaster' : isRoaster ? '📍 Roaster' : '☕ Multi-Roaster Cafe';
            const typeClass = isRoaster ? 'roaster' : 'cafe';
            const starsHtml = renderStars(rating.rating || 0);
            const reviewUrl = contact.googleMapsUrl || '#';
            const city = (info.address.fullAddress || '').split(',').slice(1, 3).join(',').trim();

            return `
                <div class="hero">
                    <div class="hero-inner">
                        <a href="${backHref}" class="back-link">${backLabel}</a>
                        <div class="type-badge ${typeClass}">${typeLabel}</div>
                        <h1>${info.name}</h1>
                        <div class="hero-meta">
                            ${rating.rating ? `
                                <div class="rating-display">
                                    <div class="stars">${starsHtml}</div>
                                    <span class="rating-num">${rating.rating}</span>
                                    <span class="rating-count">(${(rating.reviewCount || 0).toLocaleString()} reviews)</span>
                                    <a href="${reviewUrl}" target="_blank" class="rating-link">See on Google →</a>
                                </div>
                            ` : ''}
                            ${city ? `<div class="hero-address">📍 ${city}</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStars(rating) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                const diff = rating - (i - 1);
                let cls = 'empty';
                if (diff >= 1) cls = 'full';
                else if (diff >= 0.4) cls = 'half';
                html += `<svg class="star ${cls}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
                </svg>`;
            }
            return html;
        }

        function getLocationInitials(name) {
            const FILLER = new Set(['the','a','an','of','and','&','at','by','for','in','on','to']);
                const clean = name
                    .replace(/\s*[-\u2013]\s*.+$/, '')
                    .replace(/\s*\(.*?\)\s*$/, '')
                    .trim();
                const words = clean.split(/\s+/).filter(w => w.length > 0 && !FILLER.has(w.toLowerCase()));
                if (words.length === 0) return name.slice(0, 2).toUpperCase();
                if (words.length === 1) return words[0].slice(0, Math.min(4, words[0].length)).toUpperCase();
                return words.map(w => w[0]).join('').toUpperCase().slice(0, 4);
        }

        function renderGallery(localImage, localImage2, localImage3, placeId, name) {
            const mapsUrl = placeId ? `https://www.google.com/maps/place/?q=place_id:${placeId}` : '';

            if (!localImage) {
                return `
                    <div class="gallery-section">
                        <div class="gallery-placeholder">
                            <div class="gallery-placeholder-initials">${getLocationInitials(name)}</div>
                            <p>No photos yet</p>
                        </div>
                    </div>
                `;
            }

            const imgs = [localImage, localImage2, localImage3].filter(Boolean);

            if (imgs.length === 1) {
                return `
                    <div class="gallery-section">
                        <div class="gallery-hero">
                            <img src="${localImage}" alt="${name}" loading="eager"
                                 onerror="this.parentElement.style.display='none'">
                            ${mapsUrl ? `<a class="gallery-maps-link" href="${mapsUrl}" target="_blank" rel="noopener">More photos on Google Maps ↗</a>` : ''}
                        </div>
                    </div>
                `;
            }

            const labels = [name, `${name} — interior`, `${name} — detail`];
            const photoHtml = imgs.map((src, i) => `
                <div class="gallery-photo">
                    <img src="${src}" alt="${labels[i]}" loading="${i === 0 ? 'eager' : 'lazy'}"
                         onerror="this.parentElement.style.display='none'">
                </div>
            `).join('');

            return `
                <div class="gallery-section" style="position:relative;">
                    <div class="gallery-track">
                        ${photoHtml}
                    </div>
                    ${mapsUrl ? `<a class="gallery-maps-link" href="${mapsUrl}" target="_blank" rel="noopener">More photos on Google Maps ↗</a>` : ''}
                </div>
            `;
        }

        function renderDescription(custom, legacyData) {
            const desc = custom.description || legacyData?.originalDescription || '';
            if (!desc) return '';
            return `
                <div class="section fade-up">
                    <div class="section-label">About</div>
                    <div class="description-text">${desc}</div>
                </div>
            `;
        }

        function renderHours(hours, today) {
            if (!hours.weekdayDescriptions || !hours.weekdayDescriptions.length) {
                return `
                    <div class="section">
                        <div class="section-label">Hours</div>
                        <div style="color:#bbb; font-style:italic; font-size:0.88rem;">Hours not available</div>
                    </div>
                `;
            }

            // weekdayDescriptions starts Monday (index 0 = Monday)
            // JS getDay() 0=Sun, 1=Mon ... 6=Sat
            // Map JS day to weekdayDescriptions index
            const dayMap = [6, 0, 1, 2, 3, 4, 5]; // Sun=6, Mon=0, etc.
            const todayIndex = dayMap[today];

            const rowsHtml = hours.weekdayDescriptions.map((desc, i) => {
                const parts = desc.split(': ');
                const dayName = parts[0];
                const time = parts.slice(1).join(': ') || 'Closed';
                const isToday = i === todayIndex;
                return `
                    <div class="hours-row ${isToday ? 'today' : ''}">
                        <span class="day">
                            ${dayName}
                            ${isToday ? '<span class="today-tag">Today</span>' : ''}
                        </span>
                        <span class="time">${time}</span>
                    </div>
                `;
            }).join('');

            return `
                <div class="section">
                    <div class="section-label">Hours</div>
                    <div class="hours-grid">${rowsHtml}</div>
                </div>
            `;
        }

        function renderContact(contact, info, custom) {
            custom = custom || {};
            let html = '';

            // For online-only roasters, show their links prominently instead of address
            if (info.onlineOnly) {
                if (custom.onlineWebsite) {
                    const display = custom.onlineWebsite.replace(/https?:\/\//, '').replace(/\/$/, '');
                    html += contactItem('🌐', 'Website', `<a href="${custom.onlineWebsite}" target="_blank">${display}</a>`);
                }
                if (custom.onlineInstagram) {
                    const display = custom.onlineInstagram.replace(/https?:\/\/(www\.)?instagram\.com\//, '@').replace(/\/$/, '');
                    html += contactItem('📸', 'Instagram', `<a href="${custom.onlineInstagram}" target="_blank">${display}</a>`);
                }
                if (!html) return '';
                return `
                    <div class="section">
                        <div class="section-label">Find Them Online</div>
                        <div class="contact-grid">${html}</div>
                    </div>
                `;
            }

            if (info.address.fullAddress) {
                html += contactItem('📍', 'Address', info.address.fullAddress);
            }
            if (contact.phone) {
                html += contactItem('📞', 'Phone', `<a href="tel:${contact.phone}">${contact.phone}</a>`);
            }
            if (contact.website) {
                const display = contact.website.replace(/https?:\/\//, '').replace(/\/$/, '');
                html += contactItem('🌐', 'Website', `<a href="${contact.website}" target="_blank">${display}</a>`);
            }
            if (contact.googleMapsUrl) {
                html += contactItem('🗺️', 'Google Maps', `<a href="${contact.googleMapsUrl}" target="_blank">Open in Google Maps →</a>`);
            }

            if (!html) return '';
            return `
                <div class="section">
                    <div class="section-label">Contact & Location</div>
                    <div class="contact-grid">${html}</div>
                </div>
            `;
        }

        function contactItem(icon, label, value) {
            return `
                <div class="contact-item">
                    <span class="contact-icon">${icon}</span>
                    <div>
                        <div class="contact-label">${label}</div>
                        <div class="contact-value">${value}</div>
                    </div>
                </div>
            `;
        }

        function renderDetailsCard(isRoaster, custom, loc) {
            const u = (val) => val
                ? `<span class="detail-val">${val}</span>`
                : `<span class="detail-val unknown">Unknown <span style="font-size:0.72rem;opacity:0.7;">(Edit Below)</span></span>`;

            const bool = (val) => val === true
                ? `<span class="detail-val bool-yes">✓ Yes</span>`
                : val === false
                    ? `<span class="detail-val bool-no">No</span>`
                    : `<span class="detail-val unknown">Unknown</span>`;

            const tags = (arr) => arr && arr.length
                ? `<div class="tag-list">${arr.map(t => `<span class="tag">${t}</span>`).join('')}</div>`
                : `<span class="detail-val unknown">Unknown</span>`;

            let rows = '';

            if (isRoaster) {
                rows = `
                    ${detailRow('Neighborhood', u(custom.neighborhood))}
                    ${detailRow('Roast Style', u(custom.roastStyle))}
                    ${detailRow('Roast Scale', u(custom.roastScale))}
                    ${detailRow('Visitor Experience', u(custom.visitorExperience))}
                    ${detailRow('Multiple Locations', u(custom.multipleLocations))}
                    ${detailRow('Year Established', u(custom.yearEstablished))}
                    ${custom.amenities && custom.amenities.length ? detailRow('Amenities', tags(custom.amenities)) : ''}
                    ${custom.notes ? detailRow('Notes', u(custom.notes)) : ''}
                `;
            } else {
                rows = `
                    ${detailRow('Neighborhood', u(custom.neighborhood))}
                    ${detailRow('Specialty Barista Service', u(custom.specialtyBarista))}
                    ${detailRow('Multiple Locations', u(custom.multipleLocations))}
                    ${detailRow('Year Established', u(custom.yearEstablished))}
                    ${custom.roastersServed && custom.roastersServed.length ? detailRow('Roasters Served', tags(custom.roastersServed)) : ''}
                    ${custom.brewingOptions && custom.brewingOptions.length ? detailRow('Brewing Options', tags(custom.brewingOptions)) : ''}
                    ${custom.amenities && custom.amenities.length ? detailRow('Amenities', tags(custom.amenities)) : ''}
                    ${custom.notes ? detailRow('Notes', u(custom.notes)) : ''}
                `;
            }

            const cardTitle = isRoaster ? 'Roaster Details' : 'Cafe Details';
            return `
                <div class="details-card">
                    <div class="details-card-header">
                        <h2>${cardTitle}</h2>
                        <p>Community-sourced coffee details</p>
                    </div>
                    <div class="detail-rows">${rows}</div>
                </div>
                <a href="edit.html?id=${loc.id}&return=location.html?id=${loc.id}" class="suggest-edit-btn">
                    ✏️ Suggest an Edit
                </a>
            `;
        }

        function detailRow(key, valHtml) {
            return `
                <div class="detail-row">
                    <span class="detail-key">${key}</span>
                    ${valHtml}
                </div>
            `;
        }

        function renderActions(contact, placeId) {
            let html = '';
            html += `<a href="${backHref}" class="action-btn secondary">${backLabel}</a>`;
            return `<div class="action-strip">${html}</div>`;
        }

        function renderMapEmbed(placeId) {
            if (!placeId) return '';
            return `
                <div class="map-section">
                    <div class="map-section-inner">
                        <h2>📍 Find It</h2>
                        <iframe
                            class="map-embed"
                            src="https://www.google.com/maps/embed/v1/place?key=${API_KEY}&q=place_id:${placeId}"
                            allowfullscreen loading="lazy">
                        </iframe>
                    </div>
                </div>
            `;
        }

        function showError(title, msg) {
            document.getElementById('pageContent').innerHTML = `
                <div class="state-container">
                    <h2>${title}</h2>
                    <p>${msg}</p>
                    <a href="${backHref}" class="btn-back">${backLabel}</a>
                </div>
            `;
        }

        // ── Lightbox ───────────────────────────────────────────────────────
        function openLightbox(url) {
            const img = document.getElementById('lightboxImg');
            img.src = url;
            img.alt = document.title.split(' —')[0];
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });

        // ── Community Likes & Reviews ───────────────────────────────────────

        async function loadCommunityData(locId) {
            try {
                const res = await fetch('/.netlify/functions/get-community-data');
                if (!res.ok) return;
                const data = await res.json();

                const likeCount = (data.likes || {})[locId] || 0;
                const reviews   = (data.reviews || {})[locId] || [];
                const isLiked   = localStorage.getItem('liked_' + locId) === 'true';

                const likeEl    = document.getElementById('community-like-section');
                const reviewsEl = document.getElementById('community-reviews-section');
                if (likeEl)    likeEl.innerHTML    = renderLikeButton(locId, likeCount, isLiked);
                if (reviewsEl) reviewsEl.innerHTML = renderCommunityReviews(locId, reviews);
            } catch (e) {
                // Community data is non-critical; fail silently
            }
        }

        function renderLikeButton(locId, count, isLiked) {
            const countText = count === 0
                ? 'Be the first to like this'
                : `${count} ${count === 1 ? 'person' : 'people'} liked this`;
            return `
                <div class="like-section">
                    <button class="like-btn${isLiked ? ' liked' : ''}" id="like-btn-${locId}"
                            onclick="toggleLike('${locId}', this)">
                        ${isLiked ? '♥ Liked' : '♡ Like this spot'}
                    </button>
                    <span class="like-count-text" id="like-count-${locId}">${countText}</span>
                </div>
            `;
        }

        function renderCommunityReviews(locId, reviews) {
            const reviewsHtml = reviews.length
                ? reviews.map(r => `
                    <div class="review-item">
                        <div class="review-text">"${escapeHtml(r.reviewText)}"</div>
                        <div class="review-meta">Community Member · ${formatReviewDate(r.timestamp)}</div>
                    </div>`).join('')
                : `<div style="color:#bbb; font-style:italic; font-size:0.88rem; padding:0.4rem 0;">No community reviews yet. Be the first!</div>`;

            return `
                <div class="section" id="reviews">
                    <div class="section-label">Community Reviews</div>
                    ${reviewsHtml}
                    <div class="review-form">
                        <textarea class="review-textarea" id="review-text-${locId}"
                            placeholder="Share your experience..." maxlength="500"></textarea>
                        <button class="review-submit-btn" onclick="submitReview('${locId}')">Submit Review</button>
                        <div id="review-msg-${locId}" style="display:none;"></div>
                    </div>
                </div>
            `;
        }

        function formatReviewDate(timestamp) {
            if (!timestamp) return '';
            try {
                const d = new Date(timestamp);
                if (isNaN(d.getTime())) return timestamp;
                return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            } catch { return timestamp; }
        }

        function escapeHtml(str) {
            return (str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        async function toggleLike(locId, btn) {
            btn.disabled = true;
            try {
                const res = await fetch('/.netlify/functions/toggle-like', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ locationId: locId }),
                });
                if (!res.ok) throw new Error('Request failed');
                const data = await res.json();

                localStorage.setItem('liked_' + locId, String(data.liked));
                btn.className = 'like-btn' + (data.liked ? ' liked' : '');
                btn.textContent = data.liked ? '♥ Liked' : '♡ Like this spot';

                const countEl = document.getElementById('like-count-' + locId);
                if (countEl) {
                    const c = data.newCount;
                    countEl.textContent = c === 0
                        ? 'Be the first to like this'
                        : `${c} ${c === 1 ? 'person' : 'people'} liked this`;
                }
            } catch (e) {
                // fail silently
            } finally {
                btn.disabled = false;
            }
        }

        async function submitReview(locId) {
            const textarea = document.getElementById('review-text-' + locId);
            const msgEl    = document.getElementById('review-msg-' + locId);
            const btn      = textarea.nextElementSibling;
            const text     = textarea.value.trim();

            msgEl.style.display = 'none';
            msgEl.className = '';

            if (text.length < 10) {
                msgEl.style.display = 'block';
                msgEl.className = 'review-form-err';
                msgEl.textContent = 'Please write at least 10 characters.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const res = await fetch('/.netlify/functions/submit-review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ locationId: locId, reviewText: text }),
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    msgEl.style.display = 'block';
                    msgEl.className = 'review-form-msg';
                    msgEl.textContent = 'Thanks! Your review will appear once approved.';
                    textarea.value = '';
                    textarea.disabled = true;
                    btn.textContent = 'Submitted';
                } else {
                    msgEl.style.display = 'block';
                    msgEl.className = 'review-form-err';
                    msgEl.textContent = data.error || 'Something went wrong. Please try again.';
                    btn.disabled = false;
                    btn.textContent = 'Submit Review';
                }
            } catch (e) {
                msgEl.style.display = 'block';
                msgEl.className = 'review-form-err';
                msgEl.textContent = 'Something went wrong. Please try again.';
                btn.disabled = false;
                btn.textContent = 'Submit Review';
            }
        }
    </script>

</body>
</html>
